<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ATLANTIS · New York</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Space+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:"Cormorant Garamond",Georgia,serif;color:#e9f5f6}
/* VIDEO LAYER */
#stage{position:fixed;inset:0;z-index:0}
.vslot{position:absolute;inset:0;opacity:0;transition:opacity 1.4s ease}
.vslot.active{opacity:1}
.vslot video{width:100%;height:100%;object-fit:cover}
/* BILLBOARD CANVAS */
#billboard{position:fixed;inset:0;z-index:2;pointer-events:none}
/* GRADIENT OVERLAY */
#vignette{position:fixed;inset:0;z-index:3;pointer-events:none;
  background:radial-gradient(ellipse 120% 80% at 50% 60%,transparent 20%,rgba(0,0,0,.55) 100%),
  linear-gradient(to top,rgba(0,0,0,.72) 0%,rgba(0,0,0,.18) 38%,transparent 65%)}
/* SLIDE CONTENT */
#slide{position:fixed;bottom:0;left:0;right:0;z-index:10;padding:0 8vw 7vh;text-align:center;pointer-events:none}
#slide.interactive{pointer-events:auto}
.s-cap{font-style:italic;font-weight:300;font-size:clamp(22px,3.8vw,44px);line-height:1.35;
  color:rgba(240,250,252,.96);text-shadow:0 2px 40px rgba(0,0,0,.9);
  opacity:0;transform:translateY(18px);transition:opacity 1.8s ease,transform 1.8s ease}
.s-cap.show{opacity:1;transform:translateY(0)}
.s-sub{font-style:italic;font-weight:300;font-size:clamp(14px,1.9vw,20px);
  color:rgba(200,230,240,.72);margin-top:10px;line-height:1.6;
  opacity:0;transition:opacity 1.4s ease 0.5s}
.s-sub.show{opacity:1}
/* INPUT BLOCK */
#inputBlock{margin-top:22px;display:flex;flex-direction:column;align-items:center;gap:12px;
  opacity:0;transition:opacity 1.2s ease 1.2s;pointer-events:none}
#inputBlock.show{opacity:1;pointer-events:auto}
.ifield{background:transparent;border:none;border-bottom:1px solid rgba(127,236,224,.45);
  color:rgba(240,252,252,.95);font-family:"Cormorant Garamond",serif;font-style:italic;
  font-size:clamp(18px,2.8vw,28px);text-align:center;outline:none;
  padding:10px 0;width:min(320px,60vw);letter-spacing:.04em;transition:border-color .3s}
.ifield::placeholder{color:rgba(127,236,224,.3);font-style:italic}
.ifield:focus{border-bottom-color:rgba(127,236,224,.9)}
/* NUMBER GRID */
#numGrid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:240px}
.nb{width:58px;height:58px;background:rgba(3,10,22,.55);border:1px solid rgba(127,236,224,.32);
  color:rgba(190,248,240,.88);font-family:"Cinzel",serif;font-size:20px;cursor:pointer;
  border-radius:2px;transition:.22s;display:flex;align-items:center;justify-content:center}
.nb:hover,.nb.sel{background:rgba(127,236,224,.14);border-color:rgba(127,236,224,.9);color:#7fece0}
/* ADVANCE BUTTON */
#advance{margin-top:18px;font-family:"Space Mono",monospace;font-size:10px;
  letter-spacing:.5em;text-transform:uppercase;color:rgba(200,235,240,.4);
  cursor:pointer;background:none;border:none;opacity:0;transition:opacity 1.2s ease 2.2s;
  pointer-events:none;animation:pulse 3s ease-in-out infinite}
#advance.show{opacity:1;pointer-events:auto}
@keyframes pulse{0%,100%{opacity:.4}50%{opacity:.7}}
/* LETTER INPUT PAIR */
#letterRow{display:flex;gap:16px;align-items:flex-end;justify-content:center}
/* REVEAL OVERLAY */
#reveal{position:fixed;inset:0;z-index:20;background:#02060e;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:4vh 8vw 8vh;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity 1.4s}
#reveal.show{opacity:1;pointer-events:auto}
#glyphCv{border-radius:50%;margin:3vh auto 20px;display:block;
  box-shadow:0 0 80px rgba(255,190,40,.18),0 0 160px rgba(127,236,224,.08)}
.rline{opacity:0;transform:translateY(8px);transition:opacity 1.6s,transform 1.6s;
  font-style:italic;font-weight:300;font-size:clamp(18px,2.8vw,28px);
  line-height:1.7;color:rgba(233,245,246,.88);margin:8px 0;max-width:620px;text-align:center}
.rline.show{opacity:1;transform:translateY(0)}
.rconn{opacity:0;transform:translateY(8px);transition:opacity 1.6s,transform 1.6s;
  font-style:italic;font-weight:300;font-size:clamp(19px,2.8vw,26px);
  color:rgba(190,248,240,.9);line-height:1.8;margin:10px 0;max-width:620px;text-align:center}
.rconn.show{opacity:1;transform:translateY(0)}
.rsep{width:0;height:1px;background:rgba(127,236,224,.25);margin:16px auto;
  opacity:0;transition:width 1.6s,opacity 1s}
.rsep.show{width:52px;opacity:1}
.rtot{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.28em;
  text-transform:uppercase;color:rgba(255,230,140,.75);margin-top:14px}
/* ENIGMA */
#enigma{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:8vw;background:transparent;
  pointer-events:none;transition:background 1.8s}
#enigma.solo{background:rgba(2,2,8,1)}
.e1{opacity:0;transition:opacity 3s;font-style:italic;font-weight:300;
  font-size:clamp(24px,4.5vw,52px);color:rgba(235,248,246,.75);text-align:center}
.e2{opacity:0;transition:opacity 2.2s;font-style:italic;font-weight:300;
  font-size:clamp(28px,5.5vw,62px);color:rgba(255,252,248,.96);text-align:center;margin-top:16px}
.e1.show,.e2.show{opacity:1}
/* WHITEOUT */
#wo{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:99;transition:opacity 2.6s}
#wo.on{opacity:1;pointer-events:auto}
/* LOAD */
#load{position:fixed;inset:0;z-index:50;background:#000;
  display:flex;align-items:center;justify-content:center;transition:opacity 1.2s}
#load.out{opacity:0;pointer-events:none}
#load span{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.4em;
  text-transform:uppercase;color:rgba(127,236,224,.55);animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}
</style>
</head>
<body>

<div id="stage">
  <div class="vslot active" id="va"><video playsinline muted loop preload="auto"></video></div>
  <div class="vslot" id="vb"><video playsinline muted loop preload="auto"></video></div>
</div>

<canvas id="billboard"></canvas>
<div id="vignette"></div>

<div id="slide">
  <div class="s-cap" id="cap"></div>
  <div class="s-sub" id="sub"></div>
  <div id="inputBlock">
    <input class="ifield" id="nameField" type="text" maxlength="32" autocomplete="off" spellcheck="false" placeholder="a name...">
    <input class="ifield" id="wordField" type="text" maxlength="32" autocomplete="off" spellcheck="false" placeholder="one word...">
    <div id="letterRow">
      <input class="ifield" id="letterField" type="text" maxlength="1" autocomplete="off" style="width:80px" placeholder="A">
      <div id="numGrid"></div>
    </div>
  </div>
  <button id="advance">continue ↓</button>
</div>

<div id="reveal">
  <canvas id="glyphCv" width="260" height="260"></canvas>
</div>

<div id="enigma">
  <div class="e1" id="e1">Either this was random.</div>
  <div class="e2" id="e2">Or you already knew.</div>
</div>

<div id="wo"></div>
<div id="load"><span>the water is rising…</span></div>

<script>
/* ═══════════════════════════════════════════════════ CONFIG */
const VIDEOS = [
  'videos/01-nyc-flooding-2K.mp4',
  'videos/02-flooded-shore-2K.mp4',
  'videos/03-times-square-2K.mp4',
  'videos/04-subway-2K.mp4',
  'videos/05-central-park-2K.mp4',
  'videos/03-deep-2K.mp4'
];

const SLIDES = [
  { cap:'New York went underwater on a Tuesday.',
    sub:'No one believed it until it happened.',
    input:null },
  { cap:'The tide took everything it wanted.',
    sub:'Someone you knew was there.\nWhat was their name?',
    input:'name' },
  { cap:'Someone was here before you.',
    sub:'They left a word. What will you leave?',
    input:'word' },
  { cap:'Times Square. Forty-Second Street.\nThe coral remembers the route.',
    sub:'The water kept the directions.',
    input:null },
  { cap:'It was never about the city.',
    sub:'A letter. Then a number — not your favourite.\nThe one you always come back to.',
    input:'letter+number' },
  { cap:null, sub:null, input:null } // reveal
];

/* ═══════════════════════════════════════════════════ STATE */
const FP = { word:null, name:null, letter:'E', number:5, hour:12, min:0, dow:1, dom:1 };
let slide=0, advancing=false, glyphRunning=false, glyphT=0, glyphAF=null;
let billTyping=false, billWord2='', billSubmitted=false;
const d = new Date();
FP.hour=d.getHours(); FP.min=d.getMinutes(); FP.dow=d.getDay(); FP.dom=d.getDate();

/* ═══════════════════════════════════════════════════ FIREBASE / STORE */
const SEED='water';
let incoming=SEED;
async function fetchLast(){try{const v=localStorage.getItem('atl_last');if(v)return v;}catch(e){}return SEED;}
async function store(w){if(!w)return;try{localStorage.setItem('atl_last',w);}catch(e){}}
fetchLast().then(w=>{incoming=w;});
function san(w){return(w||'').replace(/\s+/g,' ').trim().slice(0,32);}

/* ═══════════════════════════════════════════════════ VIDEO CROSSFADE */
const va=document.getElementById('va'), vb=document.getElementById('vb');
const vva=va.querySelector('video'), vvb=vb.querySelector('video');
let activeSlot='a';

function loadSlide(idx){
  if(idx>=VIDEOS.length)return;
  const src=VIDEOS[idx];
  if(activeSlot==='a'){
    vvb.src=src; vvb.load(); vvb.play().catch(()=>{});
    setTimeout(()=>{vb.classList.add('active');va.classList.remove('active');activeSlot='b';},50);
  } else {
    vva.src=src; vva.load(); vva.play().catch(()=>{});
    setTimeout(()=>{va.classList.add('active');vb.classList.remove('active');activeSlot='a';},50);
  }
}

/* ═══════════════════════════════════════════════════ SLIDE RENDERING */
const capEl=document.getElementById('cap'), subEl=document.getElementById('sub');
const slideEl=document.getElementById('slide'), advBtn=document.getElementById('advance');
const inputBlock=document.getElementById('inputBlock');
const nameF=document.getElementById('nameField'), wordF=document.getElementById('wordField');
const letterF=document.getElementById('letterField');

function hideAll(){
  [capEl,subEl,advBtn].forEach(e=>e.classList.remove('show'));
  inputBlock.classList.remove('show');
  [nameF,wordF,document.getElementById('letterRow')].forEach(e=>e.style.display='none');
}

function showSlide(idx){
  if(idx>=SLIDES.length){startReveal();return;}
  const s=SLIDES[idx];
  hideAll();
  loadSlide(idx);
  billTyping=false; billSubmitted=false; billWord2='';

  if(s.cap){
    capEl.innerHTML=s.cap.replace(/\n/g,'<br>');
    setTimeout(()=>capEl.classList.add('show'),300);
  }
  if(s.sub){
    subEl.innerHTML=s.sub.replace(/\n/g,'<br>');
    setTimeout(()=>subEl.classList.add('show'),600);
  }

  if(!s.input){
    setTimeout(()=>{advBtn.textContent='continue ↓';advBtn.classList.add('show');},1400);
  } else {
    inputBlock.classList.add('show');
    if(s.input==='name'){
      nameF.style.display=''; nameF.value='';
      setTimeout(()=>nameF.focus(),1200);
    } else if(s.input==='word'){
      wordF.style.display=''; wordF.value='';
      billTyping=true;
      setTimeout(()=>wordF.focus(),1200);
    } else if(s.input==='letter+number'){
      document.getElementById('letterRow').style.display='flex';
      letterF.value=''; FP.number=null;
      document.querySelectorAll('.nb').forEach(b=>b.classList.remove('sel'));
      setTimeout(()=>letterF.focus(),1200);
    }
  }
  slideEl.classList.toggle('interactive',!!s.input);
}

/* ═══════════════════════════════════════════════════ ADVANCE LOGIC */
function tryAdvance(){
  if(advancing)return;
  const s=SLIDES[slide];
  if(s.input==='name'){
    const v=san(nameF.value); if(!v)return nameF.focus();
    FP.name=v;
  } else if(s.input==='word'){
    const v=san(wordF.value)||billWord2; if(!v)return wordF.focus();
    FP.word=v; store(v); billSubmitted=true; billTyping=false;
    flashBill(); return; // wait for flash then advance
  } else if(s.input==='letter+number'){
    const l=letterF.value.toUpperCase()[0]; if(!l)return letterF.focus();
    if(!FP.number)return;
    FP.letter=l;
  }
  doAdvance();
}

function flashBill(){
  const fl=document.createElement('div');
  fl.style.cssText='position:fixed;inset:0;z-index:15;background:rgba(244,200,80,.22);pointer-events:none;transition:opacity .4s';
  document.body.appendChild(fl);
  requestAnimationFrame(()=>{fl.style.opacity='1';
    setTimeout(()=>{fl.style.opacity='0';setTimeout(()=>fl.remove(),400);doAdvance();},220);});
}

function doAdvance(){
  if(advancing)return;
  advancing=true;
  slide++;
  showSlide(slide);
  setTimeout(()=>advancing=false,1600);
}

advBtn.addEventListener('click',tryAdvance);
nameF.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();tryAdvance();}});
wordF.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();tryAdvance();}});
wordF.addEventListener('input',e=>{billWord2=san(e.target.value)||'';});
letterF.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();tryAdvance();}});
document.addEventListener('keydown',e=>{
  if(['Enter','ArrowRight','ArrowDown',' '].includes(e.key)){
    const s=SLIDES[slide];
    if(!s||s.input)return;
    e.preventDefault();tryAdvance();
  }});
document.getElementById('stage').addEventListener('click',()=>{
  const s=SLIDES[slide];if(s&&s.input)return;tryAdvance();});

/* ═══════════════════════════════════════════════════ NUMBER GRID */
const numGrid=document.getElementById('numGrid');
for(let i=1;i<=9;i++){
  const b=document.createElement('button');
  b.className='nb';b.textContent=i;
  b.addEventListener('click',()=>{
    FP.number=i;
    document.querySelectorAll('.nb').forEach(n=>n.classList.remove('sel'));
    b.classList.add('sel');
  });
  numGrid.appendChild(b);
}

/* ═══════════════════════════════════════════════════ BILLBOARD CANVAS */
const bc=document.getElementById('billboard');
const bctx=bc.getContext('2d');
let W,H;

function resizeBill(){W=bc.width=innerWidth;H=bc.height=innerHeight;}
addEventListener('resize',resizeBill);

function drawBill(){
  if(slide!==2){bctx.clearRect(0,0,W,H);return;}
  let word=billSubmitted?(FP.word||incoming):billTyping&&billWord2?billWord2+(Math.floor(Date.now()/500)%2?'|':''):incoming;
  const bx=W*.28,by=H*.2,bw=W*.44,bh=H*.26;
  bctx.save();bctx.beginPath();bctx.rect(bx,by,bw,bh);bctx.clip();
  bctx.globalCompositeOperation='source-over';
  bctx.fillStyle='rgba(4,14,26,.88)';bctx.fillRect(bx,by,bw,bh);
  if(!window.matchMedia('(prefers-reduced-motion:reduce)').matches){
    for(let ly=by;ly<by+bh;ly+=3){bctx.fillStyle='rgba(0,0,0,.16)';bctx.fillRect(bx,ly,bw,1.2);}
  }
  bctx.globalCompositeOperation='lighter';
  const ig=bctx.createRadialGradient(bx+bw/2,by+bh*.42,0,bx+bw/2,by+bh*.42,Math.max(bw,bh)*.55);
  ig.addColorStop(0,'rgba(244,200,100,.14)');ig.addColorStop(1,'rgba(244,200,100,0)');
  bctx.fillStyle=ig;bctx.fillRect(bx,by,bw,bh);
  bctx.globalCompositeOperation='source-over';
  bctx.strokeStyle='rgba(244,210,130,.6)';bctx.lineWidth=2;bctx.strokeRect(bx+1,by+1,bw-2,bh-2);
  bctx.fillStyle='rgba(244,218,152,.98)';bctx.textAlign='center';bctx.textBaseline='middle';
  let fs=Math.round(bh*.34);const maxW=bw*.84;
  do{bctx.font=`300 italic ${fs}px "Cormorant Garamond",serif`;
    if(bctx.measureText(word||'—').width<=maxW)break;fs=Math.max(8,Math.round(fs*.85));}while(fs>8);
  bctx.fillText(word||'—',bx+bw/2,by+bh*.43);
  if(bh>60){const lfs=Math.round(Math.min(bh*.08,bw*.028,10));if(lfs>=7){
    bctx.font=`${lfs}px "Space Mono",monospace`;bctx.fillStyle='rgba(127,236,224,.48)';
    bctx.fillText('CARRY THIS TO THE SURFACE',bx+bw/2,by+bh*.82);}}
  bctx.restore();}

/* ═══════════════════════════════════════════════════ AUDIO */
let A=null,muted=false;
function mkI(dur,dec){if(!A)return null;const r=A.sampleRate,l=r*dur,b=A.createBuffer(2,l,r);for(let c=0;c<2;c++){const d=b.getChannelData(c);for(let i=0;i<l;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/l,dec);}return b;}
function initAudio(){if(A)return;try{A=new(window.AudioContext||window.webkitAudioContext)();}catch(e){}}
function ambientNote(freq,vol,dur){if(!A)return;const t=A.currentTime,o=A.createOscillator(),g=A.createGain(),rev=A.createConvolver();rev.buffer=mkI(8,.9);const rg=A.createGain();rg.gain.value=.6;rev.connect(rg);rg.connect(A.destination);o.type='sine';o.frequency.value=freq;o.connect(g);g.connect(rev);g.connect(A.destination);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+1.5);g.gain.exponentialRampToValueAtTime(.001,t+dur);o.start(t);o.stop(t+dur+.5);}
function connDing(){if(!A)return;const t=A.currentTime,o=A.createOscillator(),g=A.createGain();o.type='sine';o.frequency.value=880+Math.random()*220;o.connect(g);g.connect(A.destination);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.028,t+.04);g.gain.exponentialRampToValueAtTime(.001,t+2.2);o.start(t);o.stop(t+2.5);}
function enigmaSound(){if(!A)return;const t=A.currentTime,rev=A.createConvolver();rev.buffer=mkI(16,1.1);const rg=A.createGain();rg.gain.value=.78;rev.connect(rg);rg.connect(A.destination);const o=A.createOscillator(),g=A.createGain();o.type='sine';o.frequency.value=220;const lfo=A.createOscillator(),lg=A.createGain();lfo.type='sine';lfo.frequency.value=.3;lg.gain.value=.8;lfo.connect(lg);lg.connect(o.frequency);o.connect(g);g.connect(rev);g.connect(A.destination);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.016,t+3);g.gain.exponentialRampToValueAtTime(.001,t+16);o.start(t);lfo.start(t);o.stop(t+17);lfo.stop(t+17);}

/* ═══════════════════════════════════════════════════ CONCORDANCES */
function sfx(n){return n===1?'st':n===2?'nd':n===3?'rd':'th';}
function analyse(L,N,word,name,h,min,dow,dom,iw){
  const l=(L||'E').toUpperCase(),n=parseInt(N)||1;
  const w=(word||'').trim().toLowerCase(),nm=(name||'').trim(),nml=nm.toLowerCase();
  const lp=l.charCodeAt(0)-64,vow='aeiou';
  const p2=x=>x<10?'0'+x:String(x);
  const ds=x=>String(x).split('').reduce((a,b)=>a+parseInt(b),0);
  const cl=s=>s.replace(/\s/g,'');
  const c=[];const add=(t,wt,fact)=>{if(!c.find(x=>x.t===t))c.push({t,w:wt,fact});};
  // Letter+Name
  if(nm&&nm[0].toUpperCase()===l)add('li',5,`You chose ${l}. ${nm} begins with ${l}. You chose the same letter twice without knowing it.`);
  if(nm&&cl(nm).length===n)add('ln',5,`You chose ${n}. ${nm} has exactly ${n} letters. You didn't know that.`);
  if(nm&&nm[n-1]&&nm[n-1].toUpperCase()===l)add('lnn',4,`${l} is the ${n}${sfx(n)} letter of ${nm}. Your number was ${n}.`);
  const nmV=nml.split('').filter(c=>vow.includes(c)).length;if(nmV===n)add('nmv',3,`${nm} has ${n} vowel${n>1?'s':''}. Your number was ${n}.`);
  // Letter+Word
  if(w&&w[0].toUpperCase()===l&&!c.find(z=>z.t==='li'))add('lw',3,`You chose ${l}. You left "${w}". It begins with ${l}. You chose the same thing twice.`);
  if(w&&cl(w).length===n&&!c.find(z=>z.t==='ln'))add('wn',3,`"${w}" has ${n} letters. Your number was ${n}.`);
  const liW=(w.match(new RegExp(l.toLowerCase(),'g'))||[]).length;if(liW===n&&liW>0)add('lcw',4,`${l} appears exactly ${n} time${n>1?'s':''} in "${w}". You chose ${n}.`);
  const wV=w.split('').filter(c=>vow.includes(c)).length;if(wV===n)add('vwn',3,`"${w}" holds ${n} vowel${n>1?'s':''}. Your number was ${n}.`);
  if(lp===n)add('lp',4,`${l} is the ${n}${sfx(n)} letter of the alphabet. You chose ${n}. Same thing, two different ways.`);
  // Word+Name
  if(w&&nm&&cl(w).length===cl(nm).length&&cl(w).length===n)add('wneq',5,`"${w}" has ${n} letters. ${nm} has ${n} letters. Your number was ${n}. Three different answers. All the same.`);
  if(w&&nm&&w.includes(l.toLowerCase())&&nml.includes(l.toLowerCase()))add('lboth',4,`${l} lives inside both "${w}" and ${nm}. You chose ${l}. It was already everywhere.`);
  // Hour
  if(h===n)add('heq',5,`You arrived at ${p2(h)}h. Your number was ${n}. The hour was already your answer.`);
  if(ds(h)===n&&h>9)add('hrs',4,`You came at ${p2(h)}h. Its digits add to ${n}. Your number was already in the clock.`);
  // Minute
  if(min===n)add('meq',5,`The descent began at :${p2(min)}. Your number was ${n}. Exact.`);
  if(ds(min)===n&&min>9)add('mds',4,`You started at :${p2(min)}. Those digits sum to ${n}. Your number.`);
  // Incoming
  if(iw&&iw[0]?.toUpperCase()===l)add('iwl',4,`"${iw}" — the word left here before yours — also begins with ${l}. You chose ${l}. The chain was already set.`);
  if(iw&&cl(iw).length===n)add('iwn',4,`"${iw}" — the word before yours — has ${n} letters. Someone you never met gave you your number.`);
  // Day
  if(dom===n)add('dom',4,`You came on the ${dom}${sfx(dom)}. Your number was ${n}. The date already knew.`);
  return c.sort((a,b)=>b.w-a.w).filter(x=>x.w>=3);}

function buildOracle(L,N,word,name,h,min,conns){
  const l=(L||'E').toUpperCase(),n=parseInt(N)||1;
  const w=(word||'water').trim().toLowerCase(),nm=(name||'').trim();
  const p2=x=>x<10?'0'+x:String(x);const has=t=>conns.find(c=>c.t===t);
  if(has('li')&&has('ln')&&nm)return`You chose ${l} and ${n}. ${nm} begins with ${l} and has ${n} letters. None of this was coordinated. Or it was.`;
  if(has('wneq')&&nm)return`"${w}", ${nm}, and ${n}. Different things you offered. The same answer came back each time.`;
  if(has('li')&&has('heq')&&nm)return`At ${p2(h)}h, you chose ${n}. ${nm} begins with ${l}. You chose ${l}. The hour, the name, the letter, the number — they converge.`;
  if(has('ln')&&has('heq')&&nm)return`It was ${p2(h)}h. ${nm} — ${n} letters. Your number: ${n}. The hour and the name already agreed.`;
  if(has('iwl')&&has('li')&&nm)return`The word before yours starts with ${l}. ${nm} starts with ${l}. You chose ${l}. The water had already arranged this.`;
  if(has('li')&&nm)return`You wrote ${nm}. You chose ${l}. They begin the same way. The water noticed before you did.`;
  if(has('ln')&&nm)return`You chose ${n}. ${nm} has ${n} letters. You wrote the name and chose the number and they were already the same.`;
  if(has('heq'))return`It was ${p2(h)}h. Your number was ${n}. The moment and the choice were the same.`;
  if(has('meq'))return`The descent began at :${p2(min)}. You chose ${n}. The clock had your answer before you did.`;
  if(nm)return`${nm}. "${w}". ${n}. ${l}. Four things you offered freely. The water found a pattern you didn't put there.`;
  return`"${w}". ${n}. ${l}. You left three things. The water found what connects them.`;}

/* ═══════════════════════════════════════════════════ GLYPH */
let gctx=null;
function initGlyph(){const cv=document.getElementById('glyphCv');const s=Math.min(innerWidth*.72,innerHeight*.38,320);cv.width=cv.height=s;cv.style.width=cv.style.height=s+'px';gctx=cv.getContext('2d');}
function drawGlyph(){
  const cv=document.getElementById('glyphCv');if(!cv||!gctx)return;
  const gW=cv.width,gH=cv.height,cx=gW/2,cy=gH/2;
  const L=FP.letter||'E',N=FP.number||5,n=Math.max(3,Math.min(9,N)),lc=L.charCodeAt(0);
  const ph=-Math.PI/2,t=glyphT;
  gctx.clearRect(0,0,gW,gH);gctx.save();gctx.translate(cx,cy);
  // Background
  const bgr=gctx.createRadialGradient(0,0,0,0,0,cy);bgr.addColorStop(0,'rgba(6,28,44,.96)');bgr.addColorStop(.5,'rgba(3,14,24,.92)');bgr.addColorStop(1,'rgba(1,4,10,0)');
  gctx.fillStyle=bgr;gctx.beginPath();gctx.arc(0,0,cy,0,Math.PI*2);gctx.fill();
  // Caustic beams
  gctx.globalCompositeOperation='lighter';
  for(let i=0;i<6;i++){const a=i/6*Math.PI*2+t*.12;const cg=gctx.createLinearGradient(0,-cy*.2,0,-cy*.88);const op=(.025+Math.sin(t*.6+i*1.4)*.013).toFixed(3);cg.addColorStop(0,`rgba(127,220,210,${op})`);cg.addColorStop(1,'rgba(127,220,210,0)');gctx.save();gctx.rotate(a);gctx.fillStyle=cg;gctx.beginPath();gctx.moveTo(-7,0);gctx.lineTo(7,0);gctx.lineTo(4,-cy*.7);gctx.lineTo(-4,-cy*.7);gctx.closePath();gctx.fill();gctx.restore();}
  gctx.globalCompositeOperation='source-over';
  // Aura
  gctx.globalCompositeOperation='lighter';
  const pulse=Math.sin(t*.42)*.5+.5;
  const aura=gctx.createRadialGradient(0,0,cy*.3,0,0,cy*.95);aura.addColorStop(0,'rgba(255,190,40,0)');aura.addColorStop(.5,`rgba(255,190,40,${(.015+pulse*.012).toFixed(3)})`);aura.addColorStop(1,'rgba(255,190,40,0)');
  gctx.fillStyle=aura;gctx.fillRect(-cx,-cy,gW,gH);
  // Outer ring
  gctx.save();gctx.rotate(t*.02);gctx.shadowColor='rgba(127,220,210,.8)';gctx.shadowBlur=10;
  gctx.strokeStyle=`rgba(127,220,210,${(.42+Math.sin(t*.38)*.06).toFixed(3)})`;gctx.lineWidth=1.5;
  gctx.beginPath();gctx.arc(0,0,cy*.72,0,Math.PI*2);gctx.stroke();
  const tc=n*8;for(let i=0;i<tc;i++){const a=i*Math.PI*2/tc,big=i%n===0;gctx.strokeStyle=`rgba(127,220,210,${big?.58:.2})`;gctx.lineWidth=big?1.2:.5;gctx.shadowBlur=big?7:2;const r0=cy*.72,r1=r0+(big?cy*.12:cy*.07);gctx.beginPath();gctx.moveTo(Math.cos(a)*r0,Math.sin(a)*r0);gctx.lineTo(Math.cos(a)*r1,Math.sin(a)*r1);gctx.stroke();}
  gctx.restore();
  // Counter ring
  gctx.save();gctx.rotate(-t*.036);gctx.strokeStyle=`rgba(255,180,40,${(.26+Math.sin(t*.5)*.06).toFixed(3)})`;gctx.lineWidth=.9;gctx.shadowColor='rgba(255,180,40,.5)';gctx.shadowBlur=8;gctx.beginPath();gctx.arc(0,0,cy*.54,0,Math.PI*2);gctx.stroke();gctx.restore();
  // Organic star
  const so=cy*.42,si=cy*.24;gctx.shadowColor='rgba(255,200,50,1)';gctx.shadowBlur=18;
  gctx.strokeStyle=`rgba(255,200,60,${(.54+Math.sin(t*.52)*.09).toFixed(3)})`;gctx.lineWidth=1.4;
  gctx.beginPath();for(let i=0;i<n*2;i++){const a=ph+i*Math.PI/n;const jit=1+Math.sin(t*.28+i*1.44+lc*.1)*.055;const r=(i%2===0)?so*jit:si*(2-jit);i===0?gctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):gctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}
  gctx.closePath();gctx.stroke();gctx.fillStyle='rgba(255,180,30,.06)';gctx.shadowBlur=0;gctx.fill();
  // Bezier tendrils
  for(let i=0;i<n;i++){const a=ph+i*Math.PI*2/n;const tx2=Math.cos(a)*so,ty2=Math.sin(a)*so;const wave=Math.sin(t*.35+i*1.08+lc*.05);const ca=a+Math.PI*.5*(i%2?1:-1);const cr=so*.32+Math.abs(wave)*so*.14;const cpx=tx2*.52+Math.cos(ca)*cr,cpy=ty2*.52+Math.sin(ca)*cr;const er=so*(1.26+wave*.1);const ea=a+wave*.2;const ex=Math.cos(ea)*er,ey=Math.sin(ea)*er;const tg=gctx.createLinearGradient(tx2,ty2,ex,ey);tg.addColorStop(0,'rgba(255,195,50,.58)');tg.addColorStop(.5,'rgba(127,220,180,.38)');tg.addColorStop(1,'rgba(127,220,180,0)');gctx.strokeStyle=tg;gctx.lineWidth=1.2;gctx.shadowColor='rgba(255,200,50,.8)';gctx.shadowBlur=8;gctx.beginPath();gctx.moveTo(tx2,ty2);gctx.quadraticCurveTo(cpx,cpy,ex,ey);gctx.stroke();const oz=2.4+Math.sin(t*.68+i)*.6;gctx.fillStyle=`rgba(220,255,200,${(.6+wave*.12).toFixed(3)})`;gctx.shadowBlur=8;gctx.beginPath();gctx.arc(ex,ey,oz,0,Math.PI*2);gctx.fill();}
  // Medallion
  gctx.shadowColor='rgba(255,200,50,.9)';gctx.shadowBlur=16;gctx.strokeStyle=`rgba(255,210,80,${(.5+Math.sin(t*.55)*.08).toFixed(3)})`;gctx.lineWidth=1.5;gctx.beginPath();gctx.arc(0,0,cy*.18,0,Math.PI*2);gctx.stroke();
  // Letter — 5 glow passes
  gctx.globalCompositeOperation='source-over';
  const fs=Math.round(cy*.44),ly=fs*.04,an=Math.sin(t*.72)*.06;
  gctx.font=`700 ${fs}px "Cinzel",serif`;gctx.textAlign='center';gctx.textBaseline='middle';
  gctx.shadowColor='rgba(255,150,20,.2)';gctx.shadowBlur=88;gctx.fillStyle='rgba(255,160,30,.1)';gctx.fillText(L,0,ly);
  gctx.shadowColor='rgba(255,190,40,.55)';gctx.shadowBlur=46;gctx.fillStyle=`rgba(255,195,50,${(.28+an).toFixed(3)})`;gctx.fillText(L,0,ly);
  gctx.shadowColor='rgba(255,215,70,.75)';gctx.shadowBlur=20;gctx.fillStyle=`rgba(255,215,70,${(.58+an).toFixed(3)})`;gctx.fillText(L,0,ly);
  gctx.shadowColor='rgba(255,235,100,.9)';gctx.shadowBlur=7;gctx.fillStyle=`rgba(255,232,120,${(.82+an).toFixed(3)})`;gctx.fillText(L,0,ly);
  gctx.shadowBlur=2;gctx.fillStyle='rgba(255,252,235,1)';gctx.fillText(L,0,ly);
  // Number
  const na=ph+.24+t*.06;gctx.shadowColor='rgba(127,220,210,1)';gctx.shadowBlur=8;gctx.fillStyle='rgba(180,245,235,.88)';gctx.font=`300 ${Math.round(cy*.065)}px "Space Mono",monospace`;gctx.fillText(N,Math.cos(na)*cy*.17,Math.sin(na)*cy*.17);
  gctx.restore();}

/* ═══════════════════════════════════════════════════ REVEAL */
function startReveal(){
  initAudio();
  const rv=document.getElementById('reveal');rv.classList.add('show');
  slideEl.style.display='none';
  initGlyph();
  glyphRunning=true;
  (function loop(){glyphT+=1/60;drawGlyph();glyphAF=requestAnimationFrame(loop);})();
  ambientNote(110,.035,20);

  const conns=analyse(FP.letter,FP.number,FP.word,FP.name,FP.hour,FP.min,FP.dow,FP.dom,incoming);
  const oracle=buildOracle(FP.letter,FP.number,FP.word,FP.name,FP.hour,FP.min,conns);
  let delay=1800;

  function append(cls,txt,d){
    setTimeout(()=>{
      const p=document.createElement('p');p.className=cls;p.textContent=txt;rv.appendChild(p);
      requestAnimationFrame(()=>requestAnimationFrame(()=>p.classList.add('show')));
    },d);}

  // Oracle
  append('rline',oracle,delay);delay+=2400;
  // Sep
  setTimeout(()=>{const s=document.createElement('div');s.className='rsep';rv.appendChild(s);requestAnimationFrame(()=>requestAnimationFrame(()=>s.classList.add('show')));},delay);delay+=600;
  // Connections
  const good=conns.slice(0,8);
  good.forEach((c,i)=>{setTimeout(()=>{connDing();append('rconn',c.fact,0);},delay+i*2600);});
  const afterAll=delay+good.length*2600;
  // Count
  if(good.length>0)setTimeout(()=>{append('rtot',`${good.length} concordance${good.length>1?'s':''} · the water knew`,0);},afterAll+300);
  // Enigma
  setTimeout(()=>{
    cancelAnimationFrame(glyphAF);glyphRunning=false;
    rv.style.opacity='0';
    const en=document.getElementById('enigma');en.classList.add('solo');
    setTimeout(()=>document.getElementById('e1').classList.add('show'),500);
    setTimeout(()=>document.getElementById('e2').classList.add('show'),5000);
    enigmaSound();
  },afterAll+5500);
  // Whiteout
  setTimeout(()=>{document.getElementById('wo').classList.add('on');setTimeout(()=>location.reload(),2800);},afterAll+13500);}

/* ═══════════════════════════════════════════════════ BOOT */
function boot(){
  resizeBill();
  // Preload first 3 videos
  VIDEOS.slice(0,3).forEach(src=>{const v=document.createElement('video');v.src=src;v.preload='auto';v.load();});
  // Init first video
  const fv=activeSlot==='a'?vva:vvb;
  fv.src=VIDEOS[0];fv.load();fv.play().catch(()=>{});
  // Show slide after short delay
  setTimeout(()=>{
    document.getElementById('load').classList.add('out');
    showSlide(0);
    loop();
  },1200);
  // Unlock audio on first interaction
  document.addEventListener('click',()=>{initAudio();try{if(A&&A.state==='suspended')A.resume();}catch(e){}},{once:true});}

window.addEventListener('load',boot);
