<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ATLANTIS · New York — the water remembers</title>
<meta property="og:title" content="ATLANTIS · New York — the water remembers">
<meta property="og:description" content="Leave one thing with the water. Carry back what the last person left.">
<meta property="og:image" content="https://bdaury-wq.github.io/atlantis/03-times-square.png">
<meta property="og:url" content="https://bdaury-wq.github.io/atlantis/">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root{--ink:#e9f5f6;--teal:#7fece0;--gold:#f4dca6}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#02060e}
body{font-family:"Cormorant Garamond",Georgia,serif;color:var(--ink);-webkit-tap-highlight-color:transparent}
body.lite #scan{display:none}
#stage{position:fixed;inset:0;z-index:1;overflow:hidden;filter:saturate(1.15) contrast(1.06)}
#stage.dive{filter:url(#water) saturate(1.15) contrast(1.06)}
body.lite #stage.dive{filter:saturate(1.15) contrast(1.06)}
.layer{position:absolute;inset:-5%;background-size:cover;background-position:center;will-change:transform,opacity;opacity:0;transform:translateZ(0);transition:none}
#sfx,#endWater{position:fixed;inset:0;display:block;pointer-events:none}
#sfx{z-index:26;opacity:0;transition:opacity .5s}
#endWater{z-index:23;opacity:0;transition:opacity 1.2s}
#endWater.show{opacity:1}
#fx{position:fixed;inset:0;z-index:2;pointer-events:none}
#cgrade{position:fixed;inset:0;z-index:3;pointer-events:none;mix-blend-mode:soft-light}
#grade{position:fixed;inset:0;z-index:3;pointer-events:none;background:radial-gradient(110% 90% at 50% 40%,transparent 28%,rgba(2,6,14,.88) 100%)}
#scan{position:fixed;inset:0;z-index:4;pointer-events:none;opacity:.35;mix-blend-mode:overlay;background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0,rgba(0,0,0,.2) 1px,rgba(0,0,0,0) 3px)}
#tools{position:fixed;top:22px;right:24px;z-index:6;display:flex;flex-direction:column;gap:11px;opacity:0;transition:opacity 1.4s;pointer-events:none}
#tools.on{opacity:1;pointer-events:auto}
.tool{width:42px;height:42px;border-radius:50%;cursor:pointer;border:1px solid rgba(127,236,224,.4);background:rgba(3,12,20,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;transition:.3s}
.tool:hover{border-color:var(--teal);background:rgba(127,236,224,.12)}
.tool svg{width:18px;height:18px;fill:none;stroke:var(--teal);stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.tool.off svg{stroke:rgba(127,236,224,.4)}
#hint{position:fixed;left:50%;bottom:42px;transform:translateX(-50%);z-index:6;font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.44em;text-transform:uppercase;color:rgba(127,236,224,.55);opacity:0;transition:opacity 1.2s;pointer-events:none;text-align:center;white-space:nowrap}
#hint.on{opacity:1;animation:bob 3.2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(8px)}}
#cap{position:fixed;left:50%;bottom:16%;transform:translate(-50%,16px);z-index:6;text-align:center;max-width:min(680px,84vw);opacity:0;transition:opacity 1.2s ease,transform 1.2s ease;pointer-events:none}
#cap.show{opacity:1;transform:translate(-50%,0)}
#cap .l{font-style:italic;font-weight:300;font-size:clamp(17px,2.6vw,26px);line-height:1.42;text-shadow:0 2px 42px rgba(0,0,0,.96),0 0 32px rgba(127,236,224,.2)}
#heart{position:fixed;inset:0;z-index:7;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8vw;opacity:0;pointer-events:none;transition:opacity 1.2s}
#heart.show{opacity:1}
.hline{opacity:0;transform:translateY(16px);transition:opacity 1.8s ease,transform 1.8s ease;font-style:italic;font-weight:300;font-size:clamp(17px,2.4vw,22px);line-height:1.55;max-width:580px;margin-bottom:8px;text-shadow:0 2px 36px rgba(0,0,0,.9)}
.hline.show{opacity:1;transform:translateY(0)}
.hline.word{font-size:clamp(28px,5.5vw,54px);color:var(--gold);margin:18px 0;text-shadow:0 0 52px rgba(244,220,166,.4);font-style:italic}
#surfaceBtn{margin-top:32px;opacity:0;transition:opacity 1.4s;pointer-events:none}
#surfaceBtn.show{opacity:1;pointer-events:auto}
/* overlays */
.ov{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:7vw;transition:opacity 1.4s}
.ov.hide{opacity:0;pointer-events:none}
/* start/offer overlays: fully opaque so image doesn't distract while interacting */
#start,#offer{background:radial-gradient(140% 120% at 50% 30%,rgba(4,14,28,.92),rgba(2,6,14,.97))}
#end{background:transparent;z-index:24}
.kick{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.5em;text-transform:uppercase;color:var(--teal);opacity:.85}
h1{font-family:"Cinzel",serif;font-weight:700;font-size:clamp(46px,12vw,138px);line-height:.86;letter-spacing:.06em;margin:20px 0 0;text-shadow:0 0 80px rgba(127,236,224,.28),0 6px 50px rgba(0,0,0,.7)}
h1 .s{display:block;font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:300;font-size:.22em;letter-spacing:.28em;color:var(--gold);margin-top:22px;text-shadow:none}
.tag{max-width:520px;font-size:clamp(16px,2.1vw,19px);font-weight:300;line-height:1.6;color:rgba(233,245,246,.84);margin:28px auto 0}
.btn{margin-top:38px;pointer-events:auto;cursor:pointer;background:none;font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--ink);border:1px solid rgba(127,236,224,.45);padding:18px 42px;border-radius:2px;transition:.45s;backdrop-filter:blur(4px)}
.btn:hover{background:rgba(127,236,224,.1);border-color:var(--teal);letter-spacing:.42em;box-shadow:0 0 52px rgba(127,236,224,.22)}
.foot{position:absolute;bottom:22px;font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.32em;color:rgba(233,245,246,.32)}
#offer .ofield{width:min(380px,82vw);margin-top:28px}
#oword{width:100%;border:none;border-bottom:1px solid rgba(127,236,224,.4);padding:14px 0;color:var(--ink);font-family:"Cormorant Garamond",serif;font-style:italic;font-size:19px;outline:none;transition:border-color .3s;text-align:center;background:transparent}
#oword::placeholder{color:rgba(127,236,224,.38);font-style:italic}
#oword:focus{border-bottom-color:var(--teal)}
#oskip{margin-top:20px;pointer-events:auto;cursor:pointer;background:none;border:none;font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(233,245,246,.38);text-decoration:underline;text-underline-offset:4px}
#oskip:hover{color:rgba(233,245,246,.65)}
#again{pointer-events:auto;cursor:pointer;background:rgba(3,12,20,.38);border:1px solid rgba(127,236,224,.5);color:var(--ink);font-family:"Space Mono",monospace;font-size:13px;letter-spacing:.38em;text-transform:uppercase;padding:20px 48px;border-radius:2px;transition:.45s;backdrop-filter:blur(6px)}
#again:hover{background:rgba(127,236,224,.1);border-color:var(--teal);box-shadow:0 0 52px rgba(127,236,224,.28)}
#load{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;background:#02060e;transition:opacity 1s}
#load.hide{opacity:0;pointer-events:none}
#load .l{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.4em;text-transform:uppercase;color:rgba(127,236,224,.6);animation:bob 2s ease-in-out infinite}
@media(prefers-reduced-motion:reduce){#hint.on,#load .l{animation:none}#scan{display:none}}
</style>
</head>
<body>
<div id="stage">
  <div class="layer" id="L0" style="background-image:url('01-surface.png')"></div>
  <div class="layer" id="L1" style="background-image:url('05-flood.jpg')"></div>
  <div class="layer" id="L2" style="background-image:url('02-descent.png')"></div>
  <div class="layer" id="L3" style="background-image:url('03-times-square.png')"></div>
  <div class="layer" id="L4" style="background-image:url('06-bridge.png')"></div>
  <div class="layer" id="L5" style="background-image:url('04-garden.png')"></div>
</div>
<canvas id="sfx"></canvas><canvas id="endWater"></canvas><canvas id="fx"></canvas>
<div id="cgrade"></div><div id="grade"></div><div id="scan"></div>
<div id="tools">
  <button class="tool" id="snd" aria-label="sound"><svg id="sndIcon" viewBox="0 0 24 24"></svg></button>
  <button class="tool" id="lite" aria-label="effects"><svg viewBox="0 0 24 24"><path d="M4 14c2 2 4 2 6 0s4-2 6 0 4 2 4 0"/><path d="M4 9c2 2 4 2 6 0s4-2 6 0 4 2 4 0"/></svg></button>
</div>
<div id="hint">hold to descend</div>
<div id="cap"><div class="l" id="capL"></div></div>
<div id="heart"><button id="surfaceBtn" class="btn">Surface</button></div>
<div class="ov hide" id="start">
  <div class="kick">New York · the water remembers</div>
  <h1>ATLANTIS<span class="s">what the city left behind</span></h1>
  <p class="tag">Everyone who comes down here leaves something with the water. You will too.</p>
  <button class="btn" id="go">Descend</button>
  <div class="foot">atlantisnyc.com</div>
</div>
<div class="ov hide" id="offer">
  <p class="tag" style="font-size:clamp(17px,2.4vw,22px);opacity:.9;font-style:italic">One word.<br>The water will keep it.</p>
  <div class="ofield"><input id="oword" type="text" maxlength="32" placeholder="..." autocomplete="off" spellcheck="false"/></div>
  <button class="btn" id="osubmit" style="margin-top:22px">Leave it here</button>
  <button id="oskip">descend without a word</button>
</div>
<div class="ov hide" id="end"><button class="btn" id="again">Dive again</button></div>
<div id="load"><div class="l">the water is rising…</div></div>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <filter id="water" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.007 0.012" numOctaves="1" seed="7" result="n">
      <animate attributeName="baseFrequency" dur="22s" repeatCount="indefinite" values="0.007 0.012;0.009 0.015;0.007 0.012"/>
    </feTurbulence>
    <feDisplacementMap id="disp" in="SourceGraphic" in2="n" scale="0" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</defs></svg>

<script async src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script async src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
/* === FIREBASE (optional) === */
const FB={apiKey:"YOUR_API_KEY",authDomain:"YOUR_PROJECT.firebaseapp.com",projectId:"YOUR_PROJECT"};
let fdb=null;
try{if(typeof firebase!=='undefined'&&FB.apiKey!=='YOUR_API_KEY'){firebase.initializeApp(FB);fdb=firebase.firestore();}}catch(e){}
const SEED="i'm still here";
function san(w){return(w||'').replace(/\s+/g,' ').trim().slice(0,32);}
async function fetchLast(){if(fdb){try{const s=await fdb.collection('traces').orderBy('ts','desc').limit(1).get();if(!s.empty)return s.docs[0].data().word||SEED;}catch(e){}}try{const lw=localStorage.getItem('atl_last');if(lw)return lw;}catch(e){}return SEED;}
async function store(w){if(!w)return;if(fdb){try{await fdb.collection('traces').add({word:w,ts:firebase.firestore.FieldValue.serverTimestamp()});}catch(e){}}try{localStorage.setItem('atl_last',w);}catch(e){}}
let incoming=SEED;fetchLast().then(w=>{incoming=w;});

/* === CORE === */
const RM=matchMedia('(prefers-reduced-motion:reduce)').matches;
let LITE=false,started=false,ended=false,heartShown=false,heartScorePlaying=false;
let W,H,DPR;
const stage=document.getElementById('stage');
const disp=document.getElementById('disp');
const fx=document.getElementById('fx'),fctx=fx.getContext('2d');
const cgrade=document.getElementById('cgrade');
const L=[0,1,2,3,4,5].map(i=>document.getElementById('L'+i));

/* colour grade */
const GRADE=[[0,[28,88,88]],[0.32,[16,52,82]],[0.60,[8,26,54]],[0.82,[10,14,28]],[1,[42,22,22]]];
function gradeCol(d){d=Math.max(0,Math.min(1,d));for(let i=0;i<GRADE.length-1;i++){const a=GRADE[i][0],c0=GRADE[i][1],b=GRADE[i+1][0],c1=GRADE[i+1][1];if(d>=a&&d<=b){const t=(d-a)/(b-a);return[c0[0]+(c1[0]-c0[0])*t|0,c0[1]+(c1[1]-c0[1])*t|0,c0[2]+(c1[2]-c0[2])*t|0];}}return GRADE[GRADE.length-1][1];}
function smoothstep(e){return e*e*e*(e*(e*6-15)+10);}

/* image anchors — wider overlap = smoother */
const N_IMG=6, IMG_SEG=0.24;
const ANCHORS=[0,.17,.34,.51,.68,.85];

/* depth fragments */
const FRAGS=[
  [0.02,"The city the water kept first."],
  [0.19,"The tide that came for everything."],
  [0.36,"Where the avenues used to be."],
  [0.52,"It refused to turn off its signs."],
  [0.70,"A shore no one crosses anymore."],
  [0.87,"Still here. Still lit."],
];
let fragIdx=0,capTimer=0;

/* === VELOCITY DESCENT — no auto-gravity until first push === */
let depth=0,dVel=0,pushing=false,T=0,t0=0,prevDepth=0,vel=0,diveStep=-1;
let everPushed=false; // gate: descent only after first intentional input
const GRAVITY=0.006;  // gentle pull — about 28s per chapter without tapping
const PUSH_IMP=0.055; // single tap impulse
const PUSH_HOLD=0.07; // extra/s while holding
const DRAG=0.80;      // velocity decay per second
const MAX_VEL=0.22;
const clamp=v=>Math.max(0,Math.min(1,v));

function applyImpulse(){if(!everPushed)everPushed=true;dVel=Math.min(dVel+PUSH_IMP,MAX_VEL);}
function applyRise(){dVel=Math.max(dVel-PUSH_IMP*.7,-0.05);}

/* input */
let tsY=0,tDown=0;
function onDown(y){pushing=true;tsY=y;tDown=performance.now();}
function onUp(y){pushing=false;}
stage.addEventListener('mousedown',e=>{if(!started||ended)return;if(!everPushed)everPushed=true;onDown(e.clientY);});
addEventListener('mouseup',e=>{if(!started||ended)return;const quick=performance.now()-tDown<220;onUp(e.clientY);if(quick)applyImpulse();});
let tpx=0.5,tpy=0.5;
addEventListener('mousemove',e=>{tpx=e.clientX/W;tpy=e.clientY/H;});
stage.addEventListener('touchstart',e=>{if(!started||ended)return;if(!everPushed)everPushed=true;onDown(e.touches[0].clientY);},{passive:true});
stage.addEventListener('touchend',e=>{if(!started||ended)return;const quick=performance.now()-tDown<220;const dy=tsY-e.changedTouches[0].clientY;if(dy>55){applyImpulse();pushing=false;}else if(dy<-35){applyRise();pushing=false;}else{if(quick)applyImpulse();pushing=false;}},{passive:true});
addEventListener('wheel',e=>{if(!started||ended)return;if(!everPushed&&e.deltaY>0)everPushed=true;if(e.deltaY>0)dVel=Math.min(dVel+PUSH_IMP*.6,MAX_VEL);else applyRise();},{passive:true});
addEventListener('keydown',e=>{if(!started||ended)return;if(document.activeElement?.tagName==='INPUT')return;const k=e.key.toLowerCase();if(['arrowdown','s',' '].includes(k)){applyImpulse();e.preventDefault();}if(['arrowup','w'].includes(k)){applyRise();e.preventDefault();}});
let px=0.5,py=0.5;

/* === PARTICLES === */
let snow=[],abyss=[],bub=[];
function resize(){DPR=Math.min(devicePixelRatio||1,1.5);W=innerWidth;H=innerHeight;
  fx.width=W*DPR;fx.height=H*DPR;fx.style.width=W+'px';fx.style.height=H+'px';fctx.setTransform(DPR,0,0,DPR,0,0);
  snow=[];const n=RM?40:110;for(let i=0;i<n;i++)snow.push({x:Math.random()*W,y:Math.random()*H,z:.3+Math.random(),s:.4+Math.random()*1.7});
  abyss=[];const na=RM?8:22;for(let i=0;i<na;i++)abyss.push({x:Math.random()*W,y:Math.random()*H,r:4+Math.random()*18,life:Math.random(),spd:0.07+Math.random()*0.11,vy:-(3+Math.random()*10),hue:Math.random()<0.58?'127,236,224':'190,215,255'});
  sfResize();ewResize();}
addEventListener('resize',resize);

function showCap(txt){document.getElementById('capL').textContent=txt;document.getElementById('cap').classList.add('show');capTimer=5.5;}
function tickCap(dt){if(capTimer>0){capTimer-=dt;if(capTimer<=0)document.getElementById('cap').classList.remove('show');}}
function checkFrags(){if(!started||!everPushed||fragIdx>=FRAGS.length)return;if(depth>=FRAGS[fragIdx][0]){showCap(FRAGS[fragIdx][1]);fragIdx++;}}

/* === SOUND ENGINE === */
let A=null,muted=false,AU={},submergedOnce=false,nextMotifT=0;
function osc(t,f){const o=A.createOscillator();o.type=t;o.frequency.value=f;return o;}
function gn(v){const g=A.createGain();g.gain.value=v;return g;}
function mkImpulse(dur,dec){const r=A.sampleRate,len=r*dur,b=A.createBuffer(2,len,r);for(let c=0;c<2;c++){const d=b.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,dec);}return b;}
function mkNoise(dur){const len=A.sampleRate*dur,b=A.createBuffer(1,len,A.sampleRate),d=b.getChannelData(0);for(let i=0;i<len;i++)d[i]=Math.random()*2-1;return b;}
function initAudio(){if(A)return;A=new (window.AudioContext||window.webkitAudioContext)();
  AU.master=gn(0);AU.master.connect(A.destination);AU.master.gain.setTargetAtTime(.85,A.currentTime,1.6);
  const conv=A.createConvolver();conv.buffer=mkImpulse(5.2,2.3);const wet=gn(.4),dry=gn(.86);
  AU.bus=gn(1);AU.bus.connect(dry);dry.connect(AU.master);AU.bus.connect(conv);conv.connect(wet);wet.connect(AU.master);
  AU.filt=A.createBiquadFilter();AU.filt.type='lowpass';AU.filt.frequency.value=600;AU.filt.connect(AU.bus);
  const cur=A.createBufferSource();cur.buffer=mkNoise(3);cur.loop=true;
  const cf=A.createBiquadFilter();cf.type='bandpass';cf.frequency.value=420;cf.Q.value=.6;
  AU.curG=gn(0);cur.connect(cf);cf.connect(AU.curG);AU.curG.connect(AU.filt);cur.start();
  const lfo=osc('sine',.045);const lfoG=gn(220);lfo.connect(lfoG);lfoG.connect(cf.frequency);lfo.start();
  AU.subG=gn(0);AU.subG.connect(AU.filt);[36.0,36.9].forEach(f=>{const o=osc('sine',f);const g=gn(.5);o.connect(g);g.connect(AU.subG);o.start();});
  AU.surfG=gn(0);AU.surfG.connect(AU.master);
  const wind=A.createBufferSource();wind.buffer=mkNoise(2.6);wind.loop=true;const wlp=A.createBiquadFilter();wlp.type='lowpass';wlp.frequency.value=520;const whp=A.createBiquadFilter();whp.type='highpass';whp.frequency.value=130;const wg=gn(.5);wind.connect(wlp);wlp.connect(whp);whp.connect(wg);wg.connect(AU.surfG);wind.start();
  const sir=osc('sine',740);const slf=osc('sine',.07);const slfG=gn(40);slf.connect(slfG);slfG.connect(sir.frequency);const sirG=gn(.014);sir.connect(sirG);sirG.connect(AU.surfG);sir.start();slf.start();
  AU.surfG.gain.setTargetAtTime(.4,A.currentTime,2.5);setIcon();}
const MOTIF=[440,349.23,293.66,220];
function motif(f,I){if(!A)return;const o=osc('triangle',f),o2=osc('triangle',f*2.001);const g=gn(0),g2=gn(0);const lp=A.createBiquadFilter();lp.type='lowpass';lp.frequency.value=2200;const t=A.currentTime;o.connect(g);g.connect(lp);o2.connect(g2);g2.connect(lp);lp.connect(AU.bus);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.1*I,t+.04);g.gain.exponentialRampToValueAtTime(.0008,t+2.4);g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(.026*I,t+.04);g2.gain.exponentialRampToValueAtTime(.0006,t+1.8);o.start(t);o2.start(t);o.stop(t+2.5);o2.stop(t+2.5);}
function motifTick(){if(!A||A.state!=='running')return;const now=A.currentTime;if(now<nextMotifT)return;const d=depth;const sp=3+Math.random()*(5-d*2.5);nextMotifT=now+sp;if(d>.05)motif(MOTIF[Math.floor(Math.random()*MOTIF.length)]*(Math.random()<.18?2:1),.4+.5*d);}
function submerge(){if(!A)return;const t=A.currentTime+.02;const s=A.createBufferSource();s.buffer=mkNoise(2);const lp=A.createBiquadFilter();lp.type='lowpass';lp.frequency.setValueAtTime(7200,t);lp.frequency.exponentialRampToValueAtTime(160,t+1.4);const g=gn(0);s.connect(lp);lp.connect(g);g.connect(AU.bus);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.5,t+.14);g.gain.exponentialRampToValueAtTime(.001,t+1.9);s.start(t);s.stop(t+2);const osc2=osc('sine',58);const og=gn(0);osc2.connect(og);og.connect(AU.bus);og.gain.setValueAtTime(0,t);og.gain.linearRampToValueAtTime(.34,t+.1);og.gain.exponentialRampToValueAtTime(.001,t+1.3);osc2.start(t);osc2.stop(t+1.4);AU.surfG.gain.linearRampToValueAtTime(0,t+.08);}

/* === INTRO + WORD-SINK STATE === */
let introActive=false,introT=0;
let sinkActive=false,sinkT=0,sinkWord=null;

/* === MAIN LOOP === */
function frame(ts){requestAnimationFrame(frame);
  if(!t0)t0=ts;const dt=Math.min(.05,(ts-t0)/1000);t0=ts;T+=dt;
  prevDepth=depth;

  /* intro cinematic */
  if(introActive&&!started){introT+=dt;
    L[0].style.opacity='1';L[0].style.transform='scale(1.03)';L[0].style.zIndex='1';
    if(introT>4.8)document.getElementById('start').classList.remove('hide');}

  /* word-sink timer */
  if(sinkActive){sinkT+=dt;if(sinkT>2.9){sinkActive=false;proceedFromOffer(sinkWord);sinkWord=null;}}

  if(started&&!ended){
    /* velocity with gate — no movement until first intentional push */
    if(everPushed){
      if(pushing)dVel=Math.min(dVel+PUSH_HOLD*dt,MAX_VEL);
      dVel=dVel*Math.pow(DRAG,dt)+GRAVITY*dt;
      if(depth>0.95)dVel*=Math.pow(.25,dt); // soft brake near Heart
      depth=clamp(depth+dVel*dt);
    }
    vel=Math.abs(depth-prevDepth)/Math.max(dt,.001);
    if(depth>.22&&!submergedOnce){submergedOnce=true;submerge();}
    if(depth>.06)document.getElementById('hint').classList.remove('on');
    checkFrags();
    if(depth>=.999&&!heartShown)enterHeart();
    px+=(tpx-px)*(1-Math.exp(-dt*2.5));py+=(tpy-py)*(1-Math.exp(-dt*2.5));
  }

  /* image layers — wider overlap, slower breathing */
  for(let i=0;i<N_IMG;i++){
    if(introActive&&!started&&i===0)continue; // handled above during intro
    const dd=Math.abs(depth-ANCHORS[i]),e=1-Math.min(1,dd/IMG_SEG);const op=smoothstep(e);
    const zoom=1.05+(depth-ANCHORS[i])*.55+Math.sin(T*.06+i)*.004;
    const ty=(depth-ANCHORS[i])*32;const px_=(px-.5)*-16*(1+i*.1);
    L[i].style.opacity=op.toFixed(3);L[i].style.transform=`scale(${Math.max(1,zoom).toFixed(4)}) translate(${px_.toFixed(1)}px,${ty.toFixed(1)}px)`;L[i].style.zIndex=Math.round(op*100);}

  /* water filter */
  const sub=Math.min(1,Math.max(0,(depth-.14)/.12));
  if(sub>.01)stage.classList.add('dive');else stage.classList.remove('dive');
  const step=LITE?0:(sub<.04?0:sub<.6?1:2);
  if(step!==diveStep){diveStep=step;disp.setAttribute('scale',[0,7,12][step]);}
  {const gc=gradeCol(depth);cgrade.style.background='rgba('+gc[0]+','+gc[1]+','+gc[2]+','+(0.1+0.22*Math.min(1,depth*1.1)).toFixed(3)+')';}

  drawFX(dt,sub);audioTick();tickCap(dt);
}

/* === DRAW FX === */
function drawFX(dt,sub){fctx.clearRect(0,0,W,H);

  /* intro cinematic overlay */
  if(introActive&&!started&&introT>0){
    const wl=Math.max(0,1-introT/3.8);const waterY=H*wl;
    if(wl<1){const wg=fctx.createLinearGradient(0,waterY-70,0,H);wg.addColorStop(0,'rgba(4,16,36,0)');wg.addColorStop(.1,`rgba(4,20,46,${Math.min(.96,introT/3.8*.94)})`);wg.addColorStop(1,'rgba(2,8,18,.98)');fctx.fillStyle=wg;fctx.fillRect(0,waterY-70,W,H);}
    /* waterline shimmer */
    if(wl>.01&&wl<.99){fctx.globalCompositeOperation='lighter';const sg=fctx.createLinearGradient(0,waterY-28,0,waterY+28);sg.addColorStop(0,'rgba(127,236,224,0)');sg.addColorStop(.5,`rgba(127,236,224,${.22+Math.sin(T*4.2)*.07})`);sg.addColorStop(1,'rgba(127,236,224,0)');fctx.fillStyle=sg;fctx.fillRect(0,waterY-28,W,56);fctx.globalCompositeOperation='source-over';}
    /* ATLANTIS title emerges from water */
    if(introT>1.0){const ta=Math.min(1,(introT-1)/.9);const fs=Math.round(Math.min(W*.16,H*.12));fctx.globalAlpha=ta;fctx.font=`700 ${fs}px "Cinzel",serif`;fctx.fillStyle='rgba(233,245,246,.96)';fctx.textAlign='center';fctx.textBaseline='middle';fctx.fillText('ATLANTIS',W/2,H*wl-fs*.1);fctx.globalAlpha=1;}
  }

  /* word sinking */
  if(sinkActive&&sinkWord){
    const fi=Math.min(1,sinkT/.25);const sk=Math.max(0,(sinkT-.3)/2.5);const wa=fi*(1-sk*sk);const wy=H*.42+sk*H*.42;
    fctx.fillStyle=`rgba(2,8,18,${fi*.88})`;fctx.fillRect(0,0,W,H);
    if(wa>.01){const bk=Math.round(sk*8);if(bk>0)fctx.filter=`blur(${bk}px)`;fctx.globalAlpha=wa;
      fctx.font=`300 italic ${Math.round(Math.min(W*.16,H*.11))}px "Cormorant Garamond",serif`;
      fctx.fillStyle='rgba(233,245,246,.96)';fctx.textAlign='center';fctx.textBaseline='middle';
      fctx.fillText(sinkWord,W/2,wy);fctx.filter='none';fctx.globalAlpha=1;}
  }

  /* abyss bioluminescence */
  fctx.globalCompositeOperation='lighter';const abA=Math.max(.08,1-sub*.48);
  abyss.forEach(p=>{p.life+=p.spd*dt;p.y+=p.vy*dt;if(p.life>=1||p.y<-p.r*3){p.life=0;p.x=Math.random()*W;p.y=H+p.r*2;p.r=4+Math.random()*18;p.vy=-(3+Math.random()*10);}
    const a=Math.sin(p.life*Math.PI)*.28*abA;if(a<.005)return;const rg=fctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*2.8);rg.addColorStop(0,`rgba(${p.hue},${(a*2.2).toFixed(3)})`);rg.addColorStop(.38,`rgba(${p.hue},${a.toFixed(3)})`);rg.addColorStop(1,`rgba(${p.hue},0)`);fctx.fillStyle=rg;fctx.beginPath();fctx.arc(p.x,p.y,p.r*2.8,0,7);fctx.fill();});
  /* caustic rings */
  const cA=(.046+.028*Math.sin(T*.65))*abA;
  for(let i=0;i<4;i++){const cx=W*(.18+.22*i)+Math.sin(T*(.26+i*.1)+i*2.1)*110;const cy=H*(.14+.24*i)+Math.cos(T*(.18+i*.09)+i)*85;const r=(55+38*Math.sin(T*(.52+i*.12)+i))*Math.max(.18,abA);fctx.strokeStyle=`rgba(127,236,224,${cA})`;fctx.lineWidth=1.3;fctx.beginPath();fctx.arc(cx,cy,r,0,7);fctx.stroke();}
  fctx.globalAlpha=1;
  /* premium god rays — wider, slower, more layered */
  if(!RM&&!LITE){fctx.globalCompositeOperation='lighter';
    for(let i=0;i<7;i++){const x=W*(.07+.14*i)+Math.sin(T*(.18+i*.04)+i)*55;const a=(.025+.038*sub)*(.6+.4*Math.sin(T*.22+i*1.2));
      const g=fctx.createLinearGradient(x,0,x-160,H);g.addColorStop(0,`rgba(180,232,218,${a})`);g.addColorStop(.45,`rgba(140,218,205,${a*.6})`);g.addColorStop(1,'rgba(140,218,205,0)');fctx.fillStyle=g;fctx.beginPath();fctx.moveTo(x-28,0);fctx.lineTo(x+28,0);fctx.lineTo(x-72,H);fctx.lineTo(x-144,H);fctx.closePath();fctx.fill();}
    /* caustic light patches on deep scenes */
    if(sub>.3){for(let i=0;i<5;i++){const cx=W*(.16+.17*i)+Math.sin(T*.44+i)*88,cy=H*(.28+Math.cos(T*.36+i*1.3)*.22);const rr=fctx.createRadialGradient(cx,cy,0,cx,cy,160+70*Math.sin(T*.6+i));rr.addColorStop(0,`rgba(120,215,205,${.032*sub})`);rr.addColorStop(1,'rgba(120,215,205,0)');fctx.fillStyle=rr;fctx.fillRect(0,0,W,H);}}}
  /* marine snow */
  fctx.globalCompositeOperation='lighter';const streak=LITE?0:Math.min(52,vel*420);
  snow.forEach(p=>{p.y-=(4+p.z*9)*dt+vel*190*dt*p.z;p.x+=Math.sin((p.y+T*28)*.012)*.26;if(p.y<-40){p.y=H+10;p.x=Math.random()*W;}

  /* bubbles */
  if(!RM&&!LITE&&sub>.18&&Math.random()<.22)bub.push({x:Math.random()*W,y:H+8,r:1+Math.random()*2.8,l:1});
  bub.forEach(b=>{b.y-=34*dt;b.l-=dt*.22;b.x+=Math.sin(b.y*.05)*.38;fctx.globalAlpha=Math.max(0,b.l)*.36;fctx.strokeStyle='#bfeef2';fctx.lineWidth=.9;fctx.beginPath();fctx.arc(b.x,b.y,b.r,0,7);fctx.stroke();});

  /* Heart glow — warm gold + teal pulse */

  fctx.globalAlpha=1;fctx.globalCompositeOperation='source-over';}

/* === HEART === */
function enterHeart(){if(heartShown)return;heartShown=true;dVel=0;
  heartScore();
  const el=document.getElementById('heart');el.classList.add('show');
  const uWord=san(document.getElementById('oword').value)||null;
  const seq=[[2800,'l','You arrived at the abyss.'],[3200,'l','It remembers everyone who came down.'],[3400,'l','Your word will stay here.'],[2000,'word',uWord||'—'],[4200,'l','You take away the memory of the one before you.'],[2000,'word',incoming]];
  let acc=0;seq.forEach(item=>{acc+=item[0];setTimeout(()=>{const d=document.createElement('div');d.className='hline '+item[1];d.textContent=item[2];el.insertBefore(d,document.getElementById('surfaceBtn'));requestAnimationFrame(()=>requestAnimationFrame(()=>d.classList.add('show')));if(item[1]==='word'&&item[2]===incoming)wordArrive();else if(item[1]==='word')wordDepart();},acc);});
  setTimeout(()=>document.getElementById('surfaceBtn').classList.add('show'),acc+1800);}

document.getElementById('surfaceBtn').addEventListener('click',e=>{e.stopPropagation();startSurface();});

/* === SURFACE ANIMATION === */
const sfx=document.getElementById('sfx'),sctx=sfx.getContext('2d');
function sfResize(){const d=Math.min(devicePixelRatio||1,1.5);sfx.width=W*d;sfx.height=H*d;sfx.style.width=W+'px';sfx.style.height=H+'px';sctx.setTransform(d,0,0,d,0,0);}
const SEED_W=['alone','remember','home','gone','afraid','stay','deep','forgotten','light','dark','lost','breathe','still','silence','forever','remain','drift','below','echo','never'];
async function getWords(){let w=[...SEED_W];if(fdb){try{const s=await fdb.collection('traces').orderBy('ts','desc').limit(60).get();const fw=s.docs.map(d=>d.data().word).filter(Boolean);if(fw.length>5)w=fw;}catch(e){}}try{const lw=localStorage.getItem('atl_last');if(lw&&!w.includes(lw))w.unshift(lw);}catch(e){}return w;}
function mkParts(words){return words.map(w=>({word:w,x:.08+Math.random()*.84,y:Math.random()*4,z:.12+Math.random()*.88,ph:Math.random()*Math.PI*2,ps:.5+Math.random()*.9}));}
let wParts=[],sfT=0,sfActive=false,sfLast=0;
function sfFrame(ts){if(!sfActive)return;requestAnimationFrame(sfFrame);
  const dt=Math.min(.05,(ts-sfLast)/1000);sfLast=ts;sfT+=dt;const sw=W,sh=H;sctx.clearRect(0,0,sw,sh);
  const rise=smoothstep(Math.min(1,sfT/4.8));const appr=smoothstep(Math.max(0,Math.min(1,(sfT-4)/1.8)));
  const breach=smoothstep(Math.max(0,Math.min(1,(sfT-5.6)/.9)));const settle=smoothstep(Math.max(0,Math.min(1,(sfT-6.8)/1.6)));
  const cliff=smoothstep(Math.max(0,Math.min(1,(sfT-8.8)/1.2)));const creep=smoothstep(Math.max(0,Math.min(1,(sfT-10)/2.2)));
  if(breach<1){const l=rise*.55+appr*.35;const bg=sctx.createLinearGradient(0,0,0,sh);bg.addColorStop(0,`rgb(${l*210|0},${l*240|0},${l*245|0})`);bg.addColorStop(1,`rgb(${2+l*28|0},${8+l*55|0},${18+l*75|0})`);sctx.fillStyle=bg;sctx.fillRect(0,0,sw,sh);}
  else{const wh=Math.max(.78,1-settle*.2);sctx.fillStyle=`rgb(${wh*248|0},${wh*250|0},${wh*248|0})`;sctx.fillRect(0,0,sw,sh);}
  if(breach<.92){const rOff=sfT*sh*.19;wParts.forEach(p=>{p.ph+=p.ps*dt;const raw=p.y*sh-rOff,ry=((raw%(sh*4))+(sh*4))%(sh*4)-sh*.5;if(ry<-100||ry>sh+100)return;const sz=Math.round((12+p.z*32)*(.7+appr*.9));const al=(.11+p.z*.72)*(1-breach)*Math.min(1,rise*2.4);if(al<.01)return;const cr=127+(244-127)*p.z|0,cg=236+(220-236)*p.z*.2|0,cb=224+(166-224)*p.z*.6|0;sctx.save();sctx.globalAlpha=al;sctx.font=`300 italic ${sz}px "Cormorant Garamond",serif`;sctx.fillStyle=`rgb(${cr},${cg},${cb})`;sctx.textAlign='center';sctx.textBaseline='middle';sctx.translate(p.x*sw+Math.sin(p.ph)*18,ry);sctx.rotate(Math.sin(p.ph*.3)*.035);sctx.fillText(p.word,0,0);sctx.scale(1,-.36);sctx.globalAlpha=al*.26;sctx.filter=`blur(${1+p.z|0}px)`;sctx.fillText(p.word,0,2+Math.sin(p.ph*2)*3);sctx.restore();});}
  if(breach>0&&breach<1){sctx.fillStyle=`rgba(255,255,255,${breach*.85})`;sctx.fillRect(0,0,sw,sh);}
  if(settle>0){const fs=Math.round(sh*.057);sctx.save();sctx.textAlign='center';sctx.textBaseline='middle';sctx.globalAlpha=Math.min(1,settle*1.4)*(1-creep*.55);sctx.font=`300 italic ${fs}px "Cormorant Garamond",serif`;sctx.fillStyle='rgba(4,18,30,1)';sctx.fillText('You surface.',sw/2,sh*.38);if(cliff>0){sctx.globalAlpha=cliff*(1-creep*.75);sctx.font=`300 italic ${Math.round(fs*.7)}px "Cormorant Garamond",serif`;sctx.fillStyle='rgba(8,28,44,.9)';sctx.fillText('(did you?)',sw/2,sh*.38+fs*1.42);}sctx.restore();}
  if(creep>0){const wTop=sh*(1-creep*.82);const wg=sctx.createLinearGradient(0,wTop-70,0,sh);wg.addColorStop(0,'rgba(2,8,18,0)');wg.addColorStop(.12,`rgba(4,16,30,${.88*creep})`);wg.addColorStop(1,`rgba(2,8,18,${creep})`);sctx.fillStyle=wg;sctx.fillRect(0,wTop-70,sw,sh);const vis=wParts.filter(p=>p.z>.42).slice(0,12);vis.forEach((p,i)=>{const band=(i+1)/(vis.length+1);const wy=wTop+(sh-wTop)*band+Math.sin(sfT*1.4+i)*9;if(wy>sh-12)return;const wa=Math.min(1,(creep-.12)*1.5)*(.45+p.z*.55);if(wa<.02)return;sctx.save();sctx.globalAlpha=wa;sctx.font=`300 italic ${Math.round(13+p.z*20)}px "Cormorant Garamond",serif`;sctx.fillStyle='rgba(127,236,224,1)';sctx.textAlign='center';sctx.textBaseline='middle';sctx.fillText(p.word,p.x*sw,wy);sctx.restore();});for(let i=0;i<4;i++){const cx=sw*(.18+.22*i)+Math.sin(sfT*1.2+i)*55,cy=wTop+6+Math.sin(sfT*.8+i*1.4)*5,r=28+18*Math.sin(sfT*.9+i);sctx.save();sctx.globalAlpha=.1*creep;sctx.strokeStyle='rgba(127,236,224,1)';sctx.lineWidth=1;sctx.beginPath();sctx.arc(cx,cy,r,0,7);sctx.stroke();sctx.restore();}}
  if(sfT>12.5)sfx.style.opacity=Math.max(0,1-(sfT-12.5)/.7).toFixed(3);
  if(sfT>13.6){sfActive=false;sfx.style.opacity='0';finish();}}
async function startSurface(){ended=true;sfResize();sfT=0;sfLast=performance.now();sfActive=true;sfx.style.opacity='1';wParts=mkParts(SEED_W);requestAnimationFrame(sfFrame);getWords().then(words=>{if(words.length>5)wParts=mkParts(words);});if(A){AU.master.gain.setTargetAtTime(0,A.currentTime,2.2);const t=A.currentTime+.1,s=A.createBufferSource();s.buffer=mkNoise(4.5);const lp=A.createBiquadFilter();lp.type='lowpass';lp.frequency.setValueAtTime(100,t);lp.frequency.exponentialRampToValueAtTime(4800,t+5);const g=gn(0);s.connect(lp);lp.connect(g);g.connect(A.destination);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.38,t+1);g.gain.linearRampToValueAtTime(0,t+6);s.start(t);s.stop(t+6.5);}}

/* === END WATER === */
const ew=document.getElementById('endWater'),ewc=ew.getContext('2d');
function ewResize(){const d=Math.min(devicePixelRatio||1,1.5);ew.width=W*d;ew.height=H*d;ew.style.width=W+'px';ew.style.height=H+'px';ewc.setTransform(d,0,0,d,0,0);}
let ewActive=false,ewT=0,ewLast=0,ewRipples=[];
function addRipple(){ewRipples.push({x:.2+Math.random()*.6,y:.15+Math.random()*.7,r:0,maxR:90+Math.random()*150,life:1,spd:.12+Math.random()*.16});}
function ewFrame(ts){if(!ewActive)return;requestAnimationFrame(ewFrame);
  const dt=Math.min(.05,(ts-ewLast)/1000);ewLast=ts;ewT+=dt;const sw=W,sh=H;ewc.clearRect(0,0,sw,sh);
  ewc.fillStyle='rgb(2,4,12)';ewc.fillRect(0,0,sw,sh);
  ewc.globalCompositeOperation='lighter';
  /* moon column */
  const mc=ewc.createLinearGradient(sw*.38,0,sw*.62,0);mc.addColorStop(0,'rgba(200,225,240,0)');mc.addColorStop(.35,`rgba(200,225,240,${.05+Math.sin(ewT*.7)*.01})`);mc.addColorStop(.5,`rgba(220,238,248,${.12+Math.sin(ewT*.9+1)*.015})`);mc.addColorStop(.65,`rgba(200,225,240,${.05+Math.sin(ewT*.7)*.01})`);mc.addColorStop(1,'rgba(200,225,240,0)');ewc.fillStyle=mc;ewc.fillRect(0,0,sw,sh);
  /* perspective water lines */
  const hz=sh*.28;for(let i=0;i<28;i++){const p=i/27,y=hz+Math.pow(p,.52)*(sh-hz);const a=(.03+p*.056)*(1+Math.sin(ewT*1.1+p*8)*.3);const wave=Math.sin(ewT*.6+p*12)*10*p;ewc.strokeStyle=`rgba(180,215,235,${a.toFixed(3)})`;ewc.lineWidth=.6+p*.8;ewc.beginPath();ewc.moveTo(0,y+wave);ewc.lineTo(sw,y+wave*.5);ewc.stroke();}
  /* slow ripples */
  if(ewT>1&&Math.random()<.005&&ewRipples.length<3)addRipple();
  ewRipples=ewRipples.filter(r=>r.life>0);
  ewRipples.forEach(r=>{r.r+=r.maxR*r.spd*dt*.9;r.life-=r.spd*dt*.55;if(r.life<0)return;ewc.strokeStyle=`rgba(180,215,235,${(r.life*.06).toFixed(3)})`;ewc.lineWidth=1;ewc.beginPath();ewc.ellipse(r.x*sw,r.y*sh,r.r,r.r*.26,0,0,7);ewc.stroke();ewc.strokeStyle=`rgba(180,215,235,${(r.life*.024).toFixed(3)})`;ewc.lineWidth=.6;ewc.beginPath();ewc.ellipse(r.x*sw,r.y*sh,r.r*1.65,r.r*.16,0,0,7);ewc.stroke();});
  /* two words: enormous, barely visible */
  const uW=san(document.getElementById('oword').value)||null;
  [[uW,sh*.4,.028],[incoming,sh*.62,.02]].forEach(([word,wy,al])=>{if(!word||word==='—')return;const fs=Math.min(sw*.15,sh*.1)|0;ewc.save();ewc.globalAlpha=al+Math.sin(ewT*.5)*.006;ewc.font=`300 italic ${fs}px "Cormorant Garamond",serif`;ewc.fillStyle='rgb(150,210,228)';ewc.textAlign='center';ewc.textBaseline='middle';const rows=Math.max(1,Math.round(sh*.016));const th=fs*1.2;for(let row=0;row<rows;row++){const fy=wy-th/2+row*(th/rows);ewc.fillText(word,sw/2+Math.sin(ewT*.8+row*.4)*4,fy);}ewc.save();ewc.translate(sw/2,wy+th*.38);ewc.scale(1,-.2);ewc.globalAlpha=al*.18;ewc.fillText(word,0,0);ewc.restore();ewc.restore();});
  ewc.globalAlpha=1;ewc.globalCompositeOperation='source-over';}
function startEndWater(){ewResize();ewT=0;ewLast=performance.now();ewActive=true;ew.classList.add('show');for(let i=0;i<4;i++)setTimeout(addRipple,i*600);requestAnimationFrame(ewFrame);}

/* === FLOW === */
function unlockAudio(){try{if(!A)initAudio();if(A&&A.state==='suspended')A.resume();const b=A.createBuffer(1,1,22050),s=A.createBufferSource();s.buffer=b;s.connect(A.destination);s.start(0);}catch(e){}}
function proceedFromOffer(word){
  document.getElementById('offer').classList.add('hide');document.getElementById('end').classList.add('hide');
  document.getElementById('heart').classList.remove('show');document.getElementById('heart').querySelectorAll('.hline').forEach(n=>n.remove());document.getElementById('surfaceBtn').classList.remove('show');
  document.getElementById('tools').classList.add('on');document.getElementById('hint').classList.add('on');
  started=true;ended=false;heartShown=false;heartScorePlaying=false;heartScoring=false;
  depth=0;dVel=0;everPushed=false;submergedOnce=false;fragIdx=0;capTimer=0;
  document.getElementById('cap').classList.remove('show');}

document.getElementById('go').addEventListener('click',e=>{e.stopPropagation();unlockAudio();document.getElementById('start').classList.add('hide');document.getElementById('offer').classList.remove('hide');setTimeout(()=>document.getElementById('oword').focus(),700);});
document.getElementById('osubmit').addEventListener('click',e=>{e.stopPropagation();const word=san(document.getElementById('oword').value);if(word){document.getElementById('offer').classList.add('hide');unlockAudio();store(word);sinkActive=true;sinkT=0;sinkWord=word;}else{unlockAudio();proceedFromOffer(null);}});
document.getElementById('oword').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();const word=san(document.getElementById('oword').value);if(word){document.getElementById('offer').classList.add('hide');unlockAudio();store(word);sinkActive=true;sinkT=0;sinkWord=word;}else{unlockAudio();proceedFromOffer(null);}}});
document.getElementById('oskip').addEventListener('click',e=>{e.stopPropagation();unlockAudio();proceedFromOffer(null);});
document.getElementById('again').addEventListener('click',e=>{e.stopPropagation();ewActive=false;ew.classList.remove('show');document.getElementById('end').classList.add('hide');fetchLast().then(w=>incoming=w);document.getElementById('offer').classList.remove('hide');setTimeout(()=>document.getElementById('oword').focus(),700);});

/* === BOOT === */
const SRCS=['01-surface.png','05-flood.jpg','02-descent.png','03-times-square.png','06-bridge.png','04-garden.png'];
let loaded=0;const hideLoad=()=>{document.getElementById('load').classList.add('hide');introActive=true;introT=0;};
SRCS.forEach(s=>{const im=new Image();im.onload=im.onerror=()=>{if(++loaded>=3)hideLoad();};im.src=s;});
setTimeout(hideLoad,4800);
resize();requestAnimationFrame(frame);
</script>
