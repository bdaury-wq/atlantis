<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ATLANTIS · New York — the water remembers</title>
<meta property="og:title" content="ATLANTIS · New York — the water remembers">
<meta property="og:description" content="Leave one word with the water. Carry back what the last person left.">
<meta property="og:image" content="https://bdaury-wq.github.io/atlantis/03-times-square.png">
<meta property="og:url" content="https://bdaury-wq.github.io/atlantis/">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root{--ink:#e9f5f6;--teal:#7fece0;--gold:#f4dca6}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#02060e}
body{font-family:"Cormorant Garamond",Georgia,serif;color:var(--ink);-webkit-tap-highlight-color:transparent}
body.lite #scan{display:none}
#stage{position:fixed;inset:0;z-index:1;overflow:hidden;filter:saturate(1.15) contrast(1.06)}
#stage.dive{filter:url(#water) saturate(1.15) contrast(1.06)}
body.lite #stage.dive{filter:saturate(1.15) contrast(1.06)}
.layer{position:absolute;inset:-5%;background-size:cover;background-position:center;will-change:transform,opacity;opacity:0}
#sfx,#endWater{position:fixed;inset:0;display:block;pointer-events:none}
#sfx{z-index:26;opacity:0;transition:opacity .5s}
#endWater{z-index:23;opacity:0;transition:opacity 1.2s}
#endWater.show{opacity:1}
#fx{position:fixed;inset:0;z-index:2;pointer-events:none}
#cgrade{position:fixed;inset:0;z-index:3;pointer-events:none;mix-blend-mode:soft-light}
#grade{position:fixed;inset:0;z-index:3;pointer-events:none;background:radial-gradient(110% 90% at 50% 40%,transparent 28%,rgba(2,6,14,.88) 100%)}
#scan{position:fixed;inset:0;z-index:4;pointer-events:none;opacity:.35;mix-blend-mode:overlay;background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0,rgba(0,0,0,.2) 1px,rgba(0,0,0,0) 3px)}
#tools{position:fixed;top:22px;right:24px;z-index:6;display:flex;flex-direction:column;gap:11px;opacity:0;transition:opacity 1.4s;pointer-events:none}
#tools.on{opacity:1;pointer-events:auto}
.tool{width:42px;height:42px;border-radius:50%;cursor:pointer;border:1px solid rgba(127,236,224,.4);background:rgba(3,12,20,.5);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;transition:.3s}
.tool:hover{border-color:var(--teal);background:rgba(127,236,224,.12)}
.tool svg{width:18px;height:18px;fill:none;stroke:var(--teal);stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.tool.off svg{stroke:rgba(127,236,224,.4)}
#cap{position:fixed;left:50%;bottom:16%;transform:translate(-50%,16px);z-index:6;text-align:center;max-width:min(680px,84vw);opacity:0;transition:opacity 1.3s ease,transform 1.3s ease;pointer-events:none}
#cap.show{opacity:1;transform:translate(-50%,0)}
#cap .l{font-style:italic;font-weight:300;font-size:clamp(17px,2.6vw,26px);line-height:1.42;text-shadow:0 2px 42px rgba(0,0,0,.96),0 0 32px rgba(127,236,224,.2)}
/* heart above all overlays */
#heart{position:fixed;inset:0;z-index:22;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8vw;opacity:0;pointer-events:none;transition:opacity 1.6s;background:rgba(2,6,14,.82)}
#heart.show{opacity:1}
.hline{opacity:0;transform:translateY(16px);transition:opacity 2.2s ease,transform 2.2s ease;font-style:italic;font-weight:300;font-size:clamp(17px,2.4vw,22px);line-height:1.6;max-width:580px;margin-bottom:10px;text-shadow:0 2px 36px rgba(0,0,0,.9)}
.hline.show{opacity:1;transform:translateY(0)}
.hline.word{font-size:clamp(30px,6vw,58px);color:var(--gold);margin:22px 0;text-shadow:0 0 52px rgba(244,220,166,.4);font-weight:300}
#surfaceBtn{margin-top:36px;opacity:0;transition:opacity 1.8s;pointer-events:none}
#surfaceBtn.show{opacity:1;pointer-events:auto}
/* overlays */
.ov{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:7vw;transition:opacity 1.4s;background:radial-gradient(140% 120% at 50% 30%,rgba(4,14,28,.94),rgba(2,6,14,.98))}
.ov.hide{opacity:0;pointer-events:none}
#end{background:transparent;z-index:24}
.kick{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.5em;text-transform:uppercase;color:var(--teal);opacity:.85;margin-bottom:4px}
h1{font-family:"Cinzel",serif;font-weight:700;font-size:clamp(46px,12vw,138px);line-height:.86;letter-spacing:.06em;margin:18px 0 0;text-shadow:0 0 80px rgba(127,236,224,.28),0 6px 50px rgba(0,0,0,.7)}
h1 .s{display:block;font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:300;font-size:.22em;letter-spacing:.28em;color:var(--gold);margin-top:20px;text-shadow:none}
.tag{max-width:500px;font-size:clamp(15px,2vw,18px);font-weight:300;line-height:1.65;color:rgba(233,245,246,.78);margin:24px auto 0;font-style:italic}
.wordrow{width:min(320px,78vw);margin:22px auto 0}
#oword{width:100%;border:none;border-bottom:1px solid rgba(127,236,224,.38);padding:13px 0;color:var(--ink);font-family:"Cormorant Garamond",serif;font-style:italic;font-size:20px;outline:none;transition:border-color .3s;text-align:center;background:transparent}
#oword::placeholder{color:rgba(127,236,224,.36);font-style:italic}
#oword:focus{border-bottom-color:var(--teal)}
.btn{pointer-events:auto;cursor:pointer;background:none;font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--ink);border:1px solid rgba(127,236,224,.45);padding:18px 42px;border-radius:2px;transition:.45s;backdrop-filter:blur(4px);display:block;margin:28px auto 0}
.btn:hover{background:rgba(127,236,224,.1);border-color:var(--teal);letter-spacing:.42em;box-shadow:0 0 52px rgba(127,236,224,.22)}
.skiplink{margin-top:16px;font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(233,245,246,.35);cursor:pointer;pointer-events:auto;text-decoration:underline;text-underline-offset:4px}
.skiplink:hover{color:rgba(233,245,246,.6)}
.foot{position:absolute;bottom:22px;font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.32em;color:rgba(233,245,246,.28)}
#again{pointer-events:auto;cursor:pointer;background:rgba(3,12,20,.38);border:1px solid rgba(127,236,224,.5);color:var(--ink);font-family:"Space Mono",monospace;font-size:13px;letter-spacing:.38em;text-transform:uppercase;padding:20px 48px;border-radius:2px;transition:.45s;backdrop-filter:blur(6px)}
#again:hover{background:rgba(127,236,224,.1);border-color:var(--teal);box-shadow:0 0 52px rgba(127,236,224,.28)}
#load{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;background:#02060e;transition:opacity 1s}
#load.hide{opacity:0;pointer-events:none}
#load .l{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.4em;text-transform:uppercase;color:rgba(127,236,224,.6);animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
@media(prefers-reduced-motion:reduce){#load .l{animation:none}#scan{display:none}}
</style>
</head>
<body>
<div id="stage">
  <div class="layer" id="L0" style="background-image:url('01-surface.png')"></div>
  <div class="layer" id="L1" style="background-image:url('05-flood.jpg')"></div>
  <div class="layer" id="L2" style="background-image:url('02-descent.png')"></div>
  <div class="layer" id="L3" style="background-image:url('03-times-square.png')"></div>
  <div class="layer" id="L4" style="background-image:url('06-bridge.png')"></div>
  <div class="layer" id="L5" style="background-image:url('04-garden.png')"></div>
</div>
<canvas id="sfx"></canvas><canvas id="endWater"></canvas><canvas id="fx"></canvas>
<div id="cgrade"></div><div id="grade"></div><div id="scan"></div>
<div id="tools">
  <button class="tool" id="snd"><svg id="sndIcon" viewBox="0 0 24 24"></svg></button>
  <button class="tool" id="lite"><svg viewBox="0 0 24 24"><path d="M4 14c2 2 4 2 6 0s4-2 6 0 4 2 4 0"/><path d="M4 9c2 2 4 2 6 0s4-2 6 0 4 2 4 0"/></svg></button>
</div>
<div id="cap"><div class="l" id="capL"></div></div>
<div id="heart"><button id="surfaceBtn" class="btn">Surface</button></div>
<div class="ov hide" id="start">
  <div class="kick" id="startKick">New York · the water remembers</div>
  <h1>ATLANTIS<span class="s">what the city left behind</span></h1>
  <p class="tag" id="startTag">Leave one word with the water.<br>It will keep it. You will carry back another's.</p>
  <div class="wordrow"><input id="oword" type="text" maxlength="32" placeholder="one word…" autocomplete="off" spellcheck="false"/></div>
  <button class="btn" id="go">Descend</button>
  <div class="skiplink" id="oskip">descend without a word</div>
  <div class="foot">atlantisnyc.com</div>
</div>
<div class="ov hide" id="end"><button id="again">Dive again</button></div>
<div id="load"><div class="l">the water is rising…</div></div>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <filter id="water" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.007 0.012" numOctaves="1" seed="7" result="n">
      <animate attributeName="baseFrequency" dur="22s" repeatCount="indefinite" values="0.007 0.012;0.009 0.015;0.007 0.012"/>
    </feTurbulence>
    <feDisplacementMap id="disp" in="SourceGraphic" in2="n" scale="0" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</defs></svg>

<script async src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script async src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script>
/* firebase */
const FB={apiKey:"YOUR_API_KEY",authDomain:"YOUR_PROJECT.firebaseapp.com",projectId:"YOUR_PROJECT"};
let fdb=null;try{if(typeof firebase!=='undefined'&&FB.apiKey!=='YOUR_API_KEY'){firebase.initializeApp(FB);fdb=firebase.firestore();}}catch(e){}
const SEED="i'm still here";
function san(w){return(w||'').replace(/\s+/g,' ').trim().slice(0,32);}
async function fetchLast(){if(fdb){try{const s=await fdb.collection('traces').orderBy('ts','desc').limit(1).get();if(!s.empty)return s.docs[0].data().word||SEED;}catch(e){}}try{const v=localStorage.getItem('atl_last');if(v)return v;}catch(e){}return SEED;}
async function store(w){if(!w)return;if(fdb){try{await fdb.collection('traces').add({word:w,ts:firebase.firestore.FieldValue.serverTimestamp()});}catch(e){}}try{localStorage.setItem('atl_last',w);}catch(e){}}
let incoming=SEED;fetchLast().then(w=>{incoming=w;});

/* times square words (for billboard display) */
const SW=['alone','remember','home','gone','afraid','stay','deep','forgotten','light','dark','lost','breathe','still','silence','forever','remain','drift','below','echo','never','surface','blue','wait','cold','found'];
let tsWords=[...SW];
async function fetchTSWords(){try{if(fdb){const s=await fdb.collection('traces').orderBy('ts','desc').limit(24).get();const fw=s.docs.map(d=>d.data().word).filter(Boolean);if(fw.length>3)tsWords=fw;}}catch(e){}}

/* core */
const RM=matchMedia('(prefers-reduced-motion:reduce)').matches;
let LITE=false,started=false,ended=false,heartShown=false,heartScoring=false;
let W,H,DPR,T=0,t0=0;
const stage=document.getElementById('stage');
const disp=document.getElementById('disp');
const fx=document.getElementById('fx'),fctx=fx.getContext('2d');
const cgrade=document.getElementById('cgrade');
const L=[0,1,2,3,4,5].map(i=>document.getElementById('L'+i));

const GRADE=[[0,[28,88,88]],[0.32,[16,52,82]],[0.60,[8,26,54]],[0.82,[10,14,28]],[1,[42,22,22]]];
function gradeCol(d){d=Math.max(0,Math.min(1,d));for(let i=0;i<GRADE.length-1;i++){const a=GRADE[i][0],c0=GRADE[i][1],b=GRADE[i+1][0],c1=GRADE[i+1][1];if(d>=a&&d<=b){const t=(d-a)/(b-a);return[c0[0]+(c1[0]-c0[0])*t|0,c0[1]+(c1[1]-c0[1])*t|0,c0[2]+(c1[2]-c0[2])*t|0];}}return GRADE[GRADE.length-1][1];}
function ss(e){return e*e*e*(e*(e*6-15)+10);}

const N=6,SEG=0.24,ANCH=[0,.17,.34,.51,.68,.85];
const FRAGS=[[0.02,"The city the water kept first."],[0.19,"The tide that came for everything."],[0.36,"Where the avenues used to be."],[0.70,"A shore no one crosses anymore."],[0.87,"Still here. Still lit."]];
let fragIdx=0,capTimer=0;

/* velocity */
let depth=0,dVel=0,prevD=0,vel=0,diveStep=-1;
let pushing=false,stageDown=false,tsY=0,tDown=0;
let tpx=0.5,tpy=0.5,px=0.5,py=0.5;
const GRAV=0.004,PIMP=0.042,PHOLD=0.052,DRAG=0.78,MAXV=0.13;
const cl=v=>Math.max(0,Math.min(1,v));
function push(){dVel=Math.min(dVel+PIMP,MAXV);}
function rise(){dVel=Math.max(dVel-PIMP*.7,-0.04);}

/* input — ONLY stage triggers impulse */
stage.addEventListener('mousedown',e=>{if(!started||ended)return;stageDown=true;pushing=true;tsY=e.clientY;tDown=performance.now();});
addEventListener('mouseup',()=>{if(!stageDown)return;stageDown=false;pushing=false;if(!started||ended)return;if(performance.now()-tDown<200)push();});
addEventListener('mousemove',e=>{tpx=e.clientX/W;tpy=e.clientY/H;});
stage.addEventListener('touchstart',e=>{if(!started||ended)return;pushing=true;tsY=e.touches[0].clientY;tDown=performance.now();tpx=e.touches[0].clientX/W;tpy=e.touches[0].clientY/H;},{passive:true});
stage.addEventListener('touchmove',e=>{if(e.touches.length){tpx=e.touches[0].clientX/W;tpy=e.touches[0].clientY/H;}},{passive:true});
stage.addEventListener('touchend',e=>{pushing=false;if(!started||ended)return;const dy=tsY-(e.changedTouches[0]?.clientY??tsY);if(dy>50)push();else if(dy<-35)rise();else if(performance.now()-tDown<220)push();},{passive:true});
addEventListener('wheel',e=>{if(!started||ended)return;if(e.deltaY>0)dVel=Math.min(dVel+PIMP*.6,MAXV);else rise();},{passive:true});
addEventListener('keydown',e=>{if(!started||ended)return;if(document.activeElement?.tagName==='INPUT')return;const k=e.key.toLowerCase();if(['arrowdown','s',' '].includes(k)){push();e.preventDefault();}if(['arrowup','w'].includes(k)){rise();e.preventDefault();}});

/* particles */
let snow=[],abyss=[],bub=[];
let submergedOnce=false;
function resize(){DPR=Math.min(devicePixelRatio||1,1.5);W=innerWidth;H=innerHeight;
  fx.width=W*DPR;fx.height=H*DPR;fx.style.width=W+'px';fx.style.height=H+'px';fctx.setTransform(DPR,0,0,DPR,0,0);
  snow=[];const n=RM?40:110;for(let i=0;i<n;i++)snow.push({x:Math.random()*W,y:Math.random()*H,z:.3+Math.random(),s:.4+Math.random()*1.7});
  abyss=[];const na=RM?8:22;for(let i=0;i<na;i++)abyss.push({x:Math.random()*W,y:Math.random()*H,r:4+Math.random()*18,life:Math.random(),spd:.07+Math.random()*.11,vy:-(3+Math.random()*10),hue:Math.random()<.58?'127,236,224':'190,215,255'});
  sfResize();ewResize();}
addEventListener('resize',resize);

function showCap(t){document.getElementById('capL').textContent=t;document.getElementById('cap').classList.add('show');capTimer=5.5;}
function tickCap(dt){if(capTimer>0){capTimer-=dt;if(capTimer<=0)document.getElementById('cap').classList.remove('show');}}
function checkFrags(){if(!started||fragIdx>=FRAGS.length)return;if(depth>=FRAGS[fragIdx][0]){showCap(FRAGS[fragIdx][1]);fragIdx++;}}

/* sound */
let A=null,muted=false,AU={},nextMotifT=0;
function osc(t,f){const o=A.createOscillator();o.type=t;o.frequency.value=f;return o;}
function gn(v){const g=A.createGain();g.gain.value=v;return g;}
function mkI(d,dc){const r=A.sampleRate,l=r*d,b=A.createBuffer(2,l,r);for(let c=0;c<2;c++){const v=b.getChannelData(c);for(let i=0;i<l;i++)v[i]=(Math.random()*2-1)*Math.pow(1-i/l,dc);}return b;}
function mkN(d){const l=A.sampleRate*d,b=A.createBuffer(1,l,A.sampleRate),v=b.getChannelData(0);for(let i=0;i<l;i++)v[i]=Math.random()*2-1;return b;}
function initAudio(){if(A)return;A=new (window.AudioContext||window.webkitAudioContext)();
  AU.m=gn(0);AU.m.connect(A.destination);AU.m.gain.setTargetAtTime(.85,A.currentTime,1.6);
  const cv=A.createConvolver();cv.buffer=mkI(5.2,2.3);const wet=gn(.4),dry=gn(.86);
  AU.b=gn(1);AU.b.connect(dry);dry.connect(AU.m);AU.b.connect(cv);cv.connect(wet);wet.connect(AU.m);
  AU.f=A.createBiquadFilter();AU.f.type='lowpass';AU.f.frequency.value=600;AU.f.connect(AU.b);
  const cur=A.createBufferSource();cur.buffer=mkN(3);cur.loop=true;const cf=A.createBiquadFilter();cf.type='bandpass';cf.frequency.value=420;cf.Q.value=.6;
  AU.cg=gn(0);cur.connect(cf);cf.connect(AU.cg);AU.cg.connect(AU.f);cur.start();
  const lfo=osc('sine',.045);const lg=gn(220);lfo.connect(lg);lg.connect(cf.frequency);lfo.start();
  AU.sg=gn(0);AU.sg.connect(AU.f);[36,36.9].forEach(f=>{const o=osc('sine',f);const g=gn(.5);o.connect(g);g.connect(AU.sg);o.start();});
  AU.wg=gn(0);AU.wg.connect(AU.m);const wind=A.createBufferSource();wind.buffer=mkN(2.6);wind.loop=true;const wlp=A.createBiquadFilter();wlp.type='lowpass';wlp.frequency.value=520;const whp=A.createBiquadFilter();whp.type='highpass';whp.frequency.value=130;const wg2=gn(.5);wind.connect(wlp);wlp.connect(whp);whp.connect(wg2);wg2.connect(AU.wg);wind.start();
  const sr=osc('sine',740);const slf=osc('sine',.07);const slg=gn(40);slf.connect(slg);slg.connect(sr.frequency);const sg2=gn(.014);sr.connect(sg2);sg2.connect(AU.wg);sr.start();slf.start();
  AU.wg.gain.setTargetAtTime(.4,A.currentTime,2.5);setIcon();}
const MO=[440,349.23,293.66,220];
function motif(f,I){if(!A)return;const o=osc('triangle',f),o2=osc('triangle',f*2.001);const g=gn(0),g2=gn(0);const lp=A.createBiquadFilter();lp.type='lowpass';lp.frequency.value=2200;const t=A.currentTime;o.connect(g);g.connect(lp);o2.connect(g2);g2.connect(lp);lp.connect(AU.b);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.1*I,t+.04);g.gain.exponentialRampToValueAtTime(.0008,t+2.4);g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(.026*I,t+.04);g2.gain.exponentialRampToValueAtTime(.0006,t+1.8);o.start(t);o2.start(t);o.stop(t+2.5);o2.stop(t+2.5);}
function motifTick(){if(!A||A.state!=='running')return;const now=A.currentTime;if(now<nextMotifT)return;const sp=3+Math.random()*(5-depth*2.5);nextMotifT=now+sp;if(depth>.05)motif(MO[Math.floor(Math.random()*MO.length)]*(Math.random()<.18?2:1),.4+.5*depth);}
function submerge(){if(!A)return;const t=A.currentTime+.02;const s=A.createBufferSource();s.buffer=mkN(2);const lp=A.createBiquadFilter();lp.type='lowpass';lp.frequency.setValueAtTime(7200,t);lp.frequency.exponentialRampToValueAtTime(160,t+1.4);const g=gn(0);s.connect(lp);lp.connect(g);g.connect(AU.b);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.5,t+.14);g.gain.exponentialRampToValueAtTime(.001,t+1.9);s.start(t);s.stop(t+2);const oo=osc('sine',58);const og=gn(0);oo.connect(og);og.connect(AU.b);og.gain.setValueAtTime(0,t);og.gain.linearRampToValueAtTime(.34,t+.1);og.gain.exponentialRampToValueAtTime(.001,t+1.3);oo.start(t);oo.stop(t+1.4);AU.wg.gain.linearRampToValueAtTime(0,t+.08);}
function wordDepart(){if(!A)return;const t=A.currentTime+.1;[55,73.4,82.4].forEach((f,i)=>{const o=osc('sawtooth',f);const lp=A.createBiquadFilter();lp.type='lowpass';lp.frequency.value=320;const g=gn(0);o.connect(lp);lp.connect(g);g.connect(AU.b);const tt=t+i*.55;g.gain.setValueAtTime(0,tt);g.gain.linearRampToValueAtTime(.044,tt+.5);g.gain.exponentialRampToValueAtTime(.0006,tt+5);o.start(tt);o.stop(tt+5.1);});}
function wordArrive(){if(!A)return;const t=A.currentTime+.1;[110,138.6,164.8].forEach((f,i)=>{const o=osc('triangle',f);const lp=A.createBiquadFilter();lp.type='lowpass';lp.frequency.value=600;const g=gn(0);o.connect(lp);lp.connect(g);g.connect(AU.b);const tt=t+i*.7;g.gain.setValueAtTime(0,tt);g.gain.linearRampToValueAtTime(.05,tt+.6);g.gain.exponentialRampToValueAtTime(.0006,tt+5.5);o.start(tt);o.stop(tt+5.6);});}

/* main loop */
function frame(ts){requestAnimationFrame(frame);
  if(!t0)t0=ts;const dt=Math.min(.05,(ts-t0)/1000);t0=ts;T+=dt;
  prevD=depth;
  if(started&&!ended){
    if(pushing)dVel=Math.min(dVel+PHOLD*dt,MAXV);
    dVel=dVel*Math.pow(DRAG,dt)+GRAV*dt;
    if(depth>0.95)dVel*=Math.pow(.2,dt);
    depth=cl(depth+dVel*dt);
    vel=Math.abs(depth-prevD)/Math.max(dt,.001);
    if(depth>.22&&!submergedOnce){submergedOnce=true;submerge();}
    checkFrags();
    if(depth>=.999&&!heartShown)enterHeart();
    px+=(tpx-px)*(1-Math.exp(-dt*2.2));py+=(tpy-py)*(1-Math.exp(-dt*2.2));}

  /* layers */
  for(let i=0;i<N;i++){const dd=Math.abs(depth-ANCH[i]),e=1-Math.min(1,dd/SEG);const op=ss(e);
    const zoom=1.05+(depth-ANCH[i])*.52+Math.sin(T*.06+i)*.004;const ty=(depth-ANCH[i])*30;const ppx=(px-.5)*-15*(1+i*.1);
    L[i].style.opacity=op.toFixed(3);L[i].style.transform=`scale(${Math.max(1,zoom).toFixed(4)}) translate(${ppx.toFixed(1)}px,${ty.toFixed(1)}px)`;L[i].style.zIndex=Math.round(op*100);}

  const sub=Math.min(1,Math.max(0,(depth-.14)/.12));
  if(sub>.01)stage.classList.add('dive');else stage.classList.remove('dive');
  const step=LITE?0:(sub<.04?0:sub<.6?1:2);
  if(step!==diveStep){diveStep=step;disp.setAttribute('scale',[0,7,12][step]);}
  {const gc=gradeCol(depth);cgrade.style.background='rgba('+gc[0]+','+gc[1]+','+gc[2]+','+(0.1+0.22*Math.min(1,depth*1.1)).toFixed(3)+')';}
  drawFX(dt,sub);audioTick();tickCap(dt);}

/* times square billboard overlay */
function drawBillboard(x,y,w,h,word,op,isMain){
  fctx.save();
  /* screen background */
  fctx.globalAlpha=op*(isMain?.9:.72);fctx.globalCompositeOperation='source-over';
  fctx.fillStyle=isMain?'rgba(6,18,32,0.88)':'rgba(4,14,26,0.78)';fctx.fillRect(x,y,w,h);
  /* scanlines on screen */
  if(!RM){for(let ly=y;ly<y+h;ly+=3){fctx.fillStyle='rgba(0,0,0,0.18)';fctx.fillRect(x,ly,w,1.2);}}
  /* glow border */
  fctx.globalAlpha=op;
  fctx.globalCompositeOperation='lighter';
  fctx.strokeStyle=isMain?`rgba(244,210,140,0.55)`:`rgba(127,236,224,0.38)`;
  fctx.lineWidth=isMain?1.8:1;fctx.strokeRect(x,y,w,h);
  /* inner ambient glow */
  if(isMain){const ig=fctx.createRadialGradient(x+w/2,y+h*.45,0,x+w/2,y+h*.45,Math.max(w,h)*.52);ig.addColorStop(0,`rgba(244,200,100,${.12*op})`);ig.addColorStop(1,'rgba(244,200,100,0)');fctx.fillStyle=ig;fctx.fillRect(x,y,w,h);}
  /* word */
  fctx.globalCompositeOperation='source-over';fctx.globalAlpha=op*(isMain?1:.85);
  const fs=isMain?Math.round(h*.4):Math.round(h*.36);
  fctx.font=`300 italic ${fs}px "Cormorant Garamond",serif`;
  fctx.fillStyle=isMain?'rgba(244,218,152,0.98)':'rgba(127,236,224,0.88)';
  fctx.textAlign='center';fctx.textBaseline='middle';
  fctx.fillText(word||'—',x+w/2,y+h*(isMain?.46:.5));
  if(isMain){/* label */fctx.font=`${Math.round(h*.1)}px "Space Mono",monospace`;fctx.fillStyle='rgba(127,236,224,0.55)';fctx.textBaseline='middle';fctx.fillText('CARRY THIS TO THE SURFACE',x+w/2,y+h*.84);}
  fctx.restore();}

function drawTimesSquareBillboards(){
  const TD=0.51,TR=0.15;
  const tsOp=ss(Math.max(0,1-Math.abs(depth-TD)/TR));if(tsOp<0.02)return;
  /* Positions mapped to actual screens in the 941×1672 image.
     Center column: 4 stacked rectangles at x:29-70% of image width.
     Desktop (16:9 cover): sees image y:33→67% → use screen y:0.22-0.56 for main.
     Mobile (portrait): sees full image → same coords work naturally. */
  const main={x:.29,y:.22,w:.42,h:.24};
  const sides=[
    {x:.30,y:.01,w:.40,h:.19}, /* center col screen 1 — top */
    {x:.30,y:.50,w:.40,h:.19}, /* center col screen 4 — lower */
    {x:.01,y:.03,w:.25,h:.29}, /* left curved billboard */
    {x:.02,y:.35,w:.23,h:.18}, /* left lower */
    {x:.74,y:.02,w:.24,h:.27}, /* right billboard top */
    {x:.75,y:.33,w:.22,h:.17}, /* right lower */
  ];
  drawBillboard(main.x*W,main.y*H,main.w*W,main.h*H,incoming,tsOp,true);
  sides.forEach((b,i)=>drawBillboard(b.x*W,b.y*H,b.w*W,b.h*H,tsWords[i%tsWords.length],tsOp*.78,false));
}

function addR(){ewR.push({x:.2+Math.random()*.6,y:.15+Math.random()*.7,r:0,maxR:90+Math.random()*150,life:1,spd:.12+Math.random()*.16});}
function ewF(ts){if(!ewA)return;requestAnimationFrame(ewF);const dt=Math.min(.05,(ts-ewL)/1000);ewL=ts;ewT+=dt;const sw=W,sh=H;ewc.clearRect(0,0,sw,sh);ewc.fillStyle='rgb(2,4,12)';ewc.fillRect(0,0,sw,sh);ewc.globalCompositeOperation='lighter';const mc=ewc.createLinearGradient(sw*.38,0,sw*.62,0);mc.addColorStop(0,'rgba(200,225,240,0)');mc.addColorStop(.35,`rgba(200,225,240,${.05+Math.sin(ewT*.7)*.01})`);mc.addColorStop(.5,`rgba(220,238,248,${.12+Math.sin(ewT*.9+1)*.015})`);mc.addColorStop(.65,`rgba(200,225,240,${.05+Math.sin(ewT*.7)*.01})`);mc.addColorStop(1,'rgba(200,225,240,0)');ewc.fillStyle=mc;ewc.fillRect(0,0,sw,sh);const hz=sh*.28;for(let i=0;i<28;i++){const p=i/27,y=hz+Math.pow(p,.52)*(sh-hz);const a=(.03+p*.056)*(1+Math.sin(ewT*1.1+p*8)*.3);const wave=Math.sin(ewT*.6+p*12)*10*p;ewc.strokeStyle=`rgba(180,215,235,${a.toFixed(3)})`;ewc.lineWidth=.6+p*.8;ewc.beginPath();ewc.moveTo(0,y+wave);ewc.lineTo(sw,y+wave*.5);ewc.stroke();}
  if(ewT>1&&Math.random()<.005&&ewR.length<3)addR();ewR=ewR.filter(r=>r.life>0);ewR.forEach(r=>{r.r+=r.maxR*r.spd*dt*.9;r.life-=r.spd*dt*.55;if(r.life<0)return;ewc.strokeStyle=`rgba(180,215,235,${(r.life*.06).toFixed(3)})`;ewc.lineWidth=1;ewc.beginPath();ewc.ellipse(r.x*sw,r.y*sh,r.r,r.r*.26,0,0,7);ewc.stroke();ewc.strokeStyle=`rgba(180,215,235,${(r.life*.024).toFixed(3)})`;ewc.lineWidth=.6;ewc.beginPath();ewc.ellipse(r.x*sw,r.y*sh,r.r*1.65,r.r*.16,0,0,7);ewc.stroke();});
  const uw=san(document.getElementById('oword').value)||null;[[uw,sh*.4,.028],[incoming,sh*.62,.02]].forEach(([word,wy,al])=>{if(!word||word==='—')return;const fs=Math.min(sw*.15,sh*.1)|0;ewc.save();ewc.globalAlpha=al+Math.sin(ewT*.5)*.006;ewc.font=`300 italic ${fs}px "Cormorant Garamond",serif`;ewc.fillStyle='rgb(150,210,228)';ewc.textAlign='center';ewc.textBaseline='middle';const rows=Math.max(1,Math.round(sh*.016));const th=fs*1.2;for(let row=0;row<rows;row++){const fy=wy-th/2+row*(th/rows);ewc.fillText(word,sw/2+Math.sin(ewT*.8+row*.4)*4,fy);}ewc.save();ewc.translate(sw/2,wy+th*.38);ewc.scale(1,-.2);ewc.globalAlpha=al*.18;ewc.fillText(word,0,0);ewc.restore();ewc.restore();});
  ewc.globalAlpha=1;ewc.globalCompositeOperation='source-over';}
function startEndWater(){ewResize();ewT=0;ewL=performance.now();ewA=true;ew.classList.add('show');for(let i=0;i<4;i++)setTimeout(addR,i*600);requestAnimationFrame(ewF);}

/* flow */
function unlockAudio(){try{if(!A)initAudio();if(A&&A.state==='suspended')A.resume();const b=A.createBuffer(1,1,22050),s=A.createBufferSource();s.buffer=b;s.connect(A.destination);s.start(0);}catch(e){}}
function begin(word){
  document.getElementById('start').classList.add('hide');
  document.getElementById('end').classList.add('hide');
  document.getElementById('heart').classList.remove('show');
  document.getElementById('heart').querySelectorAll('.hline').forEach(n=>n.remove());
  document.getElementById('surfaceBtn').classList.remove('show');
  document.getElementById('tools').classList.add('on');
  started=true;ended=false;heartShown=false;heartScoring=false;
  depth=0;dVel=GRAV*2;/* tiny initial push so descent begins right away */
  pushing=false;stageDown=false;submergedOnce=false;fragIdx=0;capTimer=0;
  document.getElementById('cap').classList.remove('show');
  fetchTSWords(); /* load recent words for Times Square billboards */
}
document.getElementById('go').addEventListener('click',e=>{
  e.stopPropagation();unlockAudio();const word=san(document.getElementById('oword').value);if(word)store(word);begin(word);});
document.getElementById('oskip').addEventListener('click',e=>{e.stopPropagation();unlockAudio();begin(null);});
document.getElementById('oword').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();unlockAudio();const word=san(document.getElementById('oword').value);if(word)store(word);begin(word);}});
document.getElementById('again').addEventListener('click',e=>{
  e.stopPropagation();ewA=false;ew.classList.remove('show');
  fetchLast().then(w=>incoming=w);
  document.getElementById('end').classList.add('hide');
  document.getElementById('oword').value='';
  document.getElementById('startTag').textContent='Leave another word with the water.\nIt will keep it. You will carry back another\'s.';
  document.getElementById('start').classList.remove('hide');
  setTimeout(()=>document.getElementById('oword').focus(),400);});

/* boot */
const SRCS=['01-surface.png','05-flood.jpg','02-descent.png','03-times-square.png','06-bridge.png','04-garden.png'];
let loaded=0;const hideLoad=()=>{document.getElementById('load').classList.add('hide');document.getElementById('start').classList.remove('hide');};
SRCS.forEach(s=>{const im=new Image();im.onload=im.onerror=()=>{if(++loaded>=3)hideLoad();};im.src=s;});
setTimeout(hideLoad,5000);
resize();requestAnimationFrame(frame);
</script>
