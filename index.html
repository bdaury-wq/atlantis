<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono&display=swap" rel="stylesheet">
<title>ATLANTIS · New York</title>
<style>
:root{--ink:#e9f5f6;--teal:#7fece0;--gold:#f4dca6}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#02060e}
body{font-family:"Cormorant Garamond",Georgia,serif;color:var(--ink);-webkit-tap-highlight-color:transparent}
#stage{position:fixed;inset:0;z-index:1;overflow:hidden;filter:saturate(1.15) contrast(1.06)}
#stage.dive{filter:url(#water) saturate(1.15) contrast(1.06)}
body.lite #stage.dive{filter:saturate(1.15) contrast(1.06)}
.layer{position:absolute;inset:-5%;background-size:cover;background-position:center;will-change:transform,opacity;opacity:0}
#fx{position:fixed;inset:0;z-index:2;pointer-events:none}
#cgrade{position:fixed;inset:0;z-index:3;pointer-events:none;mix-blend-mode:soft-light}
#grade{position:fixed;inset:0;z-index:3;pointer-events:none;background:radial-gradient(110% 90% at 50% 40%,transparent 28%,rgba(2,6,14,.88) 100%)}
#scan{position:fixed;inset:0;z-index:4;pointer-events:none;opacity:.35;mix-blend-mode:overlay;background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0,rgba(0,0,0,.2) 1px,rgba(0,0,0,0) 3px)}
body.lite #scan{display:none}
#tools{position:fixed;top:22px;right:24px;z-index:6;display:flex;flex-direction:column;gap:11px;opacity:0;transition:opacity 1.4s;pointer-events:none}
#tools.on{opacity:1;pointer-events:auto}
.tool{width:42px;height:42px;border-radius:50%;cursor:pointer;border:1px solid rgba(127,236,224,.4);background:rgba(3,12,20,.5);display:flex;align-items:center;justify-content:center;transition:.3s}
.tool:hover{border-color:var(--teal)}
.tool svg{width:18px;height:18px;fill:none;stroke:var(--teal);stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.tool.off svg{stroke:rgba(127,236,224,.4)}
#cap{position:fixed;left:50%;bottom:16%;transform:translate(-50%,16px);z-index:6;text-align:center;max-width:min(680px,84vw);opacity:0;transition:opacity 1.3s,transform 1.3s;pointer-events:none}
#cap.show{opacity:1;transform:translate(-50%,0)}
#cap .l{font-style:italic;font-weight:300;font-size:clamp(17px,2.6vw,26px);line-height:1.42;text-shadow:0 2px 42px rgba(0,0,0,.96)}
#heart{position:fixed;inset:0;z-index:25;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8vw;opacity:0;pointer-events:none;transition:opacity 1.6s;background:rgba(2,6,14,.82)}
#heart.show{opacity:1;pointer-events:auto}
.hline{opacity:0;transform:translateY(16px);transition:opacity 2.2s,transform 2.2s;font-style:italic;font-weight:300;font-size:clamp(17px,2.4vw,22px);line-height:1.6;max-width:580px;margin-bottom:10px;text-shadow:0 2px 36px rgba(0,0,0,.9)}
.hline.show{opacity:1;transform:translateY(0)}
#heartBtn{margin-top:36px;opacity:0;transition:opacity 1.8s;pointer-events:none}
#heartBtn.show{opacity:1;pointer-events:auto}
#d3reveal{display:none;flex-direction:column;align-items:center;gap:18px}
#d3reveal p{font-style:italic;font-weight:300;font-size:clamp(15px,2.1vw,19px);color:rgba(233,245,246,.72);max-width:440px;line-height:1.7}
#d3numGrid{display:none;flex-wrap:wrap;gap:10px;justify-content:center;max-width:260px;margin:14px auto 0}
.d3nb{width:66px;height:66px;background:rgba(3,10,22,.55);border:1px solid rgba(127,236,224,.32);color:rgba(190,248,240,.88);font-family:"Cinzel",serif;font-size:22px;cursor:pointer;border-radius:3px;transition:.25s;display:flex;align-items:center;justify-content:center}
.d3nb:hover,.d3nb:active{background:rgba(127,236,224,.14);border-color:var(--teal)}
#glyphCv{display:none;border-radius:50%;margin:4vh auto 24px;box-shadow:0 0 80px rgba(255,190,40,.18),0 0 160px rgba(127,236,224,.10)}
#d3text{position:fixed;inset:0;z-index:23;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;text-align:center;padding:4vw 8vw 8vw;pointer-events:none;opacity:0;transition:opacity 1.4s;background:rgba(2,6,14,.92);overflow-y:auto}
#d3text.show{opacity:1}
.rline{opacity:0;transform:translateY(8px);transition:opacity 1.6s,transform 1.6s;font-style:italic;font-weight:300;font-size:clamp(18px,2.8vw,26px);line-height:1.7;color:rgba(233,245,246,.88);margin:8px 0;max-width:600px;text-shadow:0 2px 30px rgba(0,0,0,.9)}
.rline.show{opacity:1;transform:translateY(0)}
.rconn{opacity:0;transform:translateY(8px);transition:opacity 1.6s,transform 1.6s;font-style:italic;font-weight:300;font-size:clamp(19px,3vw,28px);letter-spacing:.03em;color:rgba(190,248,240,.9);line-height:1.8;margin:10px 0;max-width:600px;text-shadow:0 2px 28px rgba(0,0,0,.9)}
.rconn.show{opacity:1;transform:translateY(0)}
.rtot{margin-top:16px;font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.28em;text-transform:uppercase;color:rgba(255,230,140,.8)}
.rsep{width:0;height:1px;background:rgba(127,236,224,.25);margin:18px auto;opacity:0;transition:width 1.6s,opacity 1s}
.rsep.show{width:52px;opacity:1}
#enigmaWrap{position:fixed;inset:0;z-index:28;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8vw;pointer-events:none;background:transparent;transition:background 1.8s}
#enigmaWrap.solo{background:rgba(2,2,8,1)}
.enigma1{opacity:0;transition:opacity 3s;font-style:italic;font-weight:300;font-size:clamp(24px,4.5vw,52px);color:rgba(240,248,246,.78);text-align:center;line-height:1.4}
.enigma1.show{opacity:1}
.enigma2{opacity:0;transition:opacity 2.2s;font-style:italic;font-weight:300;font-size:clamp(28px,5.5vw,64px);color:rgba(255,252,248,.96);text-align:center;line-height:1.4;margin-top:18px}
.enigma2.show{opacity:1}
#whiteout{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:99;transition:opacity 2.6s}
#whiteout.on{opacity:1;pointer-events:auto}
#billInput{position:fixed;bottom:18%;left:50%;transform:translateX(-50%);z-index:8;text-align:center;opacity:0;pointer-events:none;transition:opacity .8s;min-width:min(360px,82vw)}
#billInput.show{opacity:1;pointer-events:auto}
#billMsg{font-style:italic;font-weight:300;font-size:clamp(14px,2vw,18px);color:rgba(244,218,152,.9);text-shadow:0 0 20px rgba(244,200,80,.5);min-height:28px;margin-bottom:10px;opacity:0;transition:opacity .6s}
#billMsg.show{opacity:1}
#billForm{display:flex;gap:12px;align-items:center;justify-content:center}
#billWord2{position:fixed;left:-9999px;top:-9999px;opacity:0;width:1px;height:1px}
#billHint{font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.3em;color:rgba(244,200,80,.7);text-transform:uppercase}
#billSub{cursor:pointer;background:rgba(2,6,14,.6);border:1px solid rgba(244,200,80,.5);color:rgba(255,235,160,.9);font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.3em;text-transform:uppercase;padding:11px 20px;transition:.3s}
#billSub:hover{background:rgba(244,200,80,.12)}
.ov{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:7vw;transition:opacity 1.4s}
.ov.hide{opacity:0;pointer-events:none}
.ov.hide *{pointer-events:none !important}
#end{background:rgba(2,6,14,.92);z-index:26}
.kick{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.5em;text-transform:uppercase;color:var(--teal);opacity:.85;margin-bottom:4px}
h1{font-family:"Cinzel",serif;font-weight:700;font-size:clamp(46px,12vw,138px);line-height:.86;letter-spacing:.06em;margin:18px 0 0;text-shadow:0 0 80px rgba(127,236,224,.28),0 6px 50px rgba(0,0,0,.7)}
h1 .s{display:block;font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:300;font-size:.22em;letter-spacing:.28em;color:var(--gold);margin-top:20px}
.tag{max-width:500px;font-size:clamp(15px,2vw,18px);font-weight:300;line-height:1.65;color:rgba(233,245,246,.78);margin:24px auto 0;font-style:italic}
.wordrow{width:min(320px,78vw);margin:22px auto 0}
#oword{width:100%;border:none;border-bottom:1px solid rgba(127,236,224,.38);padding:13px 0;color:var(--ink);font-family:"Cormorant Garamond",serif;font-style:italic;font-size:20px;outline:none;transition:border-color .3s;text-align:center;background:transparent}
#oword::placeholder{color:rgba(127,236,224,.36);font-style:italic}
#oword:focus{border-bottom-color:var(--teal)}
.btn{pointer-events:auto;cursor:pointer;background:none;font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--ink);border:1px solid rgba(127,236,224,.45);padding:18px 42px;border-radius:2px;transition:.45s;display:block;margin:28px auto 0}
.btn:hover{background:rgba(127,236,224,.1);border-color:var(--teal);box-shadow:0 0 52px rgba(127,236,224,.22)}
#d2q{font-style:italic;font-weight:300;font-size:clamp(24px,4vw,44px);line-height:1.3;color:rgba(233,245,246,.92);max-width:520px;margin:0 auto 28px;display:none}
.hookline{font-style:italic;font-weight:300;font-size:clamp(14px,1.9vw,18px);color:rgba(233,245,246,.82);margin-bottom:24px;line-height:1.6;max-width:420px}
#again{cursor:pointer;background:rgba(3,12,20,.6);border:1px solid rgba(127,236,224,.6);color:var(--ink);font-family:"Space Mono",monospace;font-size:13px;letter-spacing:.38em;text-transform:uppercase;padding:20px 48px;border-radius:2px;transition:.45s}
#again:hover{background:rgba(127,236,224,.1);border-color:var(--teal);box-shadow:0 0 52px rgba(127,236,224,.28)}
#load{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;background:#02060e;transition:opacity 1s}
#load.hide{opacity:0;pointer-events:none}
#load .l{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.4em;text-transform:uppercase;color:rgba(127,236,224,.6);animation:bob 2s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
</style></head>
<body>
<div id="stage">
  <div class="layer" id="L0"></div><div class="layer" id="L1"></div>
  <div class="layer" id="L2"></div><div class="layer" id="L3"></div>
  <div class="layer" id="L4"></div><div class="layer" id="L5"></div>
</div>
<canvas id="fx"></canvas>
<div id="cgrade"></div><div id="grade"></div><div id="scan"></div>
<div id="tools">
  <button class="tool" id="snd"><svg id="sndIcon" viewBox="0 0 24 24"></svg></button>
  <button class="tool" id="lite"><svg viewBox="0 0 24 24"><path d="M4 14c2 2 4 2 6 0s4-2 6 0 4 2 4 0"/><path d="M4 9c2 2 4 2 6 0s4-2 6 0 4 2 4 0"/></svg></button>
</div>
<div id="cap"><div class="l" id="capL"></div></div>
<div id="heart">
  <div id="hBillboard"></div>
  <button id="heartBtn" class="btn">Surface</button>
  <div id="d3reveal">
    <p>A number. Between 1 and 9.<br>Not your favourite — the one you always come back to.</p>
    <div id="d3numGrid"></div>
  </div>
</div>
<div id="d3text"><canvas id="glyphCv" width="280" height="280"></canvas></div>
<div id="enigmaWrap">
  <div class="enigma1" id="enigma1">Either this was random.</div>
  <div class="enigma2" id="enigma2">Or you already knew.</div>
</div>
<div id="billInput">
  <div id="billMsg"></div>
  <div id="billForm">
    <input id="billWord2" type="text" maxlength="32" autocomplete="off" spellcheck="false">
    <span id="billHint">type your word · enter</span>
    <button id="billSub">↵</button>
  </div>
</div>
<div class="ov hide" id="start">
  <div class="kick" id="startKick"></div>
  <h1 id="startTitle" style="display:none">ATLANTIS<span class="s">what the city left behind</span></h1>
  <p id="d2q">Tell me the last name<br>you remember.</p>
  <p class="tag" id="startTag"></p>
  <div class="wordrow"><input id="oword" type="text" maxlength="32" autocomplete="off" spellcheck="false"/></div>
  <button class="btn" id="go">Descend</button>
  <p class="hint" id="goHint">tap to descend · hold to accelerate</p>
</div>
<div class="ov hide" id="end">
  <p class="hookline" id="hookLine"></p>
  <button id="again">Again</button>
</div>
<div id="whiteout"></div>
<div id="load"><div class="l">the water is rising…</div></div>
<svg width="0" height="0" style="position:absolute"><defs>
<filter id="water" x="-5%" y="-5%" width="110%" height="110%">
<feTurbulence type="fractalNoise" baseFrequency="0.007 0.012" numOctaves="1" seed="7" result="n">
  <animate attributeName="baseFrequency" dur="22s" repeatCount="indefinite" values="0.007 0.012;0.009 0.015;0.007 0.012"/>
</feTurbulence>
<feDisplacementMap id="disp" in="SourceGraphic" in2="n" scale="0" xChannelSelector="R" yChannelSelector="G"/>
</filter></defs></svg>'''

<script>

/* ══════════════════════════════════════════════════════════ FIREBASE */
const SEED='water';
let fdb=null,incoming=SEED;
async function fetchLast(){try{const v=localStorage.getItem('atl_last');if(v)return v;}catch(e){}return SEED;}
async function store(w){if(!w)return;try{localStorage.setItem('atl_last',w);}catch(e){}}
fetchLast().then(w=>{incoming=w;});
function san(w){return(w||'').replace(/\s+/g,' ').trim().slice(0,32);}

/* ══════════════════════════════════════════════════════════ DIVE STATE */
let DIVE=1;
const FP={d1:{word:null,hour:12,minute:0,dow:1,dom:1},d2:{name:null},d3:{letter:'E',number:5}};
let descentStartTime=null;
function loadFP(){FP.d1.word=localStorage.getItem('atl_d1_word')||null;FP.d1.hour=parseInt(localStorage.getItem('atl_d1_hour'))||12;FP.d1.minute=parseInt(localStorage.getItem('atl_d1_min'))||0;FP.d1.dow=parseInt(localStorage.getItem('atl_d1_dow'))||1;FP.d1.dom=parseInt(localStorage.getItem('atl_d1_dom'))||1;FP.d2.name=localStorage.getItem('atl_d2_name')||null;}
function saveFP(){const n=descentStartTime||new Date();if(DIVE===1){localStorage.setItem('atl_d1_word',FP.d1.word||'');localStorage.setItem('atl_d1_hour',String(n.getHours()));localStorage.setItem('atl_d1_min',String(n.getMinutes()));localStorage.setItem('atl_d1_dow',String(n.getDay()));localStorage.setItem('atl_d1_dom',String(n.getDate()));}if(DIVE===2&&FP.d2.name)localStorage.setItem('atl_d2_name',FP.d2.name);}

/* ══════════════════════════════════════════════════════════ CONFIG */
const D1_IMGS=['01-surface.png','05-flood.jpg','02-descent.png','06-bridge.png','04-garden.png','03-times-square.png'];
const D2_IMGS=['d2-01-shore.jpg','d2-03-apartment.png','d2-05-forest.jpg'];
const D1_FRAGS=[[0.02,'New York went underwater on a Tuesday.'],[0.15,'The tide came for everything. It kept what it wanted.'],[0.32,'And just like that... New York went underwater.'],[0.49,'Some places are eternal.'],[0.66,'Some places are eternal.']];
let D2_FRAGS=[[0.02,"You've been here before."],[0.40,'The place looks familiar. But you cannot be sure...'],[0.82,'It was never about New York... It was about you.']];
const D1_GRADE=[[0,[28,88,88]],[.32,[16,52,82]],[.60,[8,26,54]],[.82,[10,14,28]],[1,[42,22,22]]];
const D2_GRADE=[[0,[52,20,72]],[.25,[28,12,64]],[.5,[18,6,52]],[.75,[12,4,38]],[1,[8,2,24]]];
const D3_GRADE=[[0,[6,4,14]],[1,[2,2,8]]];
const ANCH_D1=[0,.17,.34,.51,.68,.85];
const ANCH_D2=[0,.45,.88,2,2,2];
let ANCH=[...ANCH_D1],FRAGS=[...D1_FRAGS],GRADE=D1_GRADE;
const N_IMG=6,SEG=0.24;

/* ══════════════════════════════════════════════════════════ CORE STATE */
const RM=matchMedia('(prefers-reduced-motion:reduce)').matches;
let LITE=false,started=false,ended=false,heartShown=false;
let W,H,DPR,T=0,t0=0;
const stage=document.getElementById('stage'),disp=document.getElementById('disp');
const fx=document.getElementById('fx'),fctx=fx.getContext('2d');
const L=[0,1,2,3,4,5].map(i=>document.getElementById('L'+i));
let diveStep=-1,fragIdx=0,capTimer=0;
let depth=0,dVel=0,prevD=0,vel=0;
let pushing=false,stageDown=false,tsY=0,tDown=0,tpx=0.5,tpy=0.5,px=0.5,py=0.5;
let submergedOnce=false,tapTimes=[];
const PIMP=0.042,DRAG=0.78,MAXV=0.13;
const ss=e=>e*e*e*(e*(e*6-15)+10);
function gradeCol(d){const G=GRADE;d=Math.max(0,Math.min(1,d));for(let i=0;i<G.length-1;i++){const[a,c0]= G[i],[b,c1]=G[i+1];if(d>=a&&d<=b){const t=(d-a)/(b-a);return[c0[0]+(c1[0]-c0[0])*t|0,c0[1]+(c1[1]-c0[1])*t|0,c0[2]+(c1[2]-c0[2])*t|0];}}return G[G.length-1][1];}

/* ══════════════════════════════════════════════════════════ BILLBOARD LIVE TYPING */
let billInputShown=false,billWordSubmitted=false,currentBillTyped='',billTypingActive=false;
function showBillInput(){if(billInputShown)return;billInputShown=true;billTypingActive=true;currentBillTyped='';document.getElementById('billInput').classList.add('show');setTimeout(()=>document.getElementById('billWord2').focus(),300);}
document.getElementById('billWord2').addEventListener('input',e=>{currentBillTyped=san(e.target.value)||'';});
function submitBillWord(){const w=currentBillTyped||null;if(!w)return;FP.d1.word=w;store(w);billWordSubmitted=true;billTypingActive=false;const fl=document.createElement('div');fl.style.cssText='position:fixed;inset:0;z-index:15;background:rgba(244,200,80,.22);pointer-events:none;transition:opacity .4s';document.body.appendChild(fl);requestAnimationFrame(()=>{fl.style.opacity='1';setTimeout(()=>{fl.style.opacity='0';setTimeout(()=>fl.remove(),400)},180)});document.getElementById('billForm').style.display='none';const msg=document.getElementById('billMsg');msg.textContent='Your memory takes the one before you.';msg.classList.add('show');setTimeout(()=>document.getElementById('billInput').classList.remove('show'),2800);}
document.getElementById('billSub').addEventListener('click',e=>{e.stopPropagation();submitBillWord();});
document.getElementById('billWord2').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();submitBillWord();}});

/* ══════════════════════════════════════════════════════════ INPUT */
function push(){dVel=Math.min(dVel+PIMP,MAXV);tapTimes.push(performance.now());}
function rise(){dVel=Math.max(dVel-PIMP*.7,-0.04);}
stage.addEventListener('mousedown',e=>{if(!started||ended)return;stageDown=true;pushing=true;tsY=e.clientY;tDown=performance.now();});
addEventListener('mouseup',()=>{if(!stageDown)return;stageDown=false;pushing=false;});
addEventListener('mousemove',e=>{tpx=e.clientX/W;tpy=e.clientY/H;});
stage.addEventListener('touchstart',e=>{if(!started||ended)return;pushing=true;tsY=e.touches[0].clientY;tDown=performance.now();tpx=e.touches[0].clientX/W;tpy=e.touches[0].clientY/H;},{passive:true});
stage.addEventListener('touchmove',e=>{if(e.touches.length){tpx=e.touches[0].clientX/W;tpy=e.touches[0].clientY/H;}},{passive:true});
stage.addEventListener('touchend',e=>{pushing=false;if(!started||ended)return;const dy=tsY-(e.changedTouches[0]?.clientY??tsY);if(dy>50)push();else if(dy<-35)rise();else if(performance.now()-tDown<220)push();},{passive:true});
addEventListener('wheel',e=>{if(!started||ended)return;if(e.deltaY>0)dVel=Math.min(dVel+PIMP*.6,MAXV);else rise();},{passive:true});
addEventListener('keydown',e=>{if(!started||ended||document.activeElement?.tagName==='INPUT')return;const k=e.key.toLowerCase();if(['arrowdown','s',' '].includes(k)){push();e.preventDefault();}if(['arrowup','w'].includes(k)){rise();e.preventDefault();}});

/* ══════════════════════════════════════════════════════════ PARTICLES */
const GLYPHS='⊕☿♄∞ψ◬⟁♆⊗∴≋⌬⌘☽✦⌖⋈⊜∆∇⊛⋆☉⊘⟐⌀';
let snow=[],abyss=[],bub=[],glyphCols=[];

/* ══════════════════════════════════════════════════════════ FRAME LOOP */
function frame(ts){requestAnimationFrame(frame);if(!t0)t0=ts;const dt=Math.min(.05,(ts-t0)/1e3);t0=ts;T+=dt;prevD=depth;
  if(started&&!ended){
    if(DIVE===3){dVel=Math.min(dVel+.06*dt,.8);dVel*=Math.pow(.6,dt);}
    else{if(pushing)dVel=Math.min(dVel+.052*dt,MAXV);dVel*=Math.pow(DRAG,dt);dVel+=.004*dt;}
    if(depth>.94)dVel*=Math.pow(.3,dt);
    depth=Math.max(0,Math.min(1,depth+dVel*dt));
    vel=Math.abs(depth-prevD)/Math.max(dt,.001);
    if(depth>.22&&!submergedOnce){submergedOnce=true;submerge();}
    if(depth>.05)document.getElementById('goHint').classList?.remove('on');
    checkFrags();
    if(depth>=.999&&!heartShown)enterHeart();
    if(DIVE===1&&depth>=.82&&!billInputShown)showBillInput();
    px+=(tpx-px)*(1-Math.exp(-dt*3));py+=(tpy-py)*(1-Math.exp(-dt*3));
  }
  for(let i=0;i<N_IMG;i++){const dd=Math.abs(depth-ANCH[i]),e=1-Math.min(1,dd/SEG),op=ss(e);const zoom=1.05+(depth-ANCH[i])*.6+Math.sin(T*.08+i)*.003;const ty=(depth-ANCH[i])*38;const px_=(px-.5)*-18*(1+i*.1);L[i].style.opacity=op.toFixed(3);L[i].style.transform=`scale(${Math.max(1,zoom).toFixed(4)}) translate(${px_.toFixed(1)}px,${ty.toFixed(1)}px)`;L[i].style.zIndex=Math.round(op*100);}
  const sub=Math.min(1,Math.max(0,(depth-.14)/.12));
  if(sub>.01)stage.classList.add('dive');else stage.classList.remove('dive');
  const step=LITE?0:sub<.04?0:sub<.6?1:2;
  const dispScale=DIVE===3?[0][step]||0:DIVE===2?[0,12,18][step]:[0,7,12][step];

  for(let i=0;i<n;i++){const a=ph+i*Math.PI*2/n;const tx2=Math.cos(a)*so,ty2=Math.sin(a)*so;const wave=Math.sin(t*.35+i*1.08+lc*.05);const ca=a+Math.PI*.5*(i%2?1:-1);const cr=so*.32+Math.abs(wave)*so*.14;const cpx=tx2*.52+Math.cos(ca)*cr,cpy=ty2*.52+Math.sin(ca)*cr;const er=so*(1.28+wave*.1);const ea=a+wave*.2;const ex=Math.cos(ea)*er,ey=Math.sin(ea)*er;const tg=gctx.createLinearGradient(tx2,ty2,ex,ey);tg.addColorStop(0,'rgba(255,195,50,.6)');tg.addColorStop(.5,'rgba(127,220,180,.4)');tg.addColorStop(1,'rgba(127,220,180,0)');gctx.strokeStyle=tg;gctx.lineWidth=1.3;gctx.shadowColor='rgba(255,200,50,.8)';gctx.shadowBlur=10;gctx.beginPath();gctx.moveTo(tx2,ty2);gctx.quadraticCurveTo(cpx,cpy,ex,ey);gctx.stroke();const oz=2.6+Math.sin(t*.68+i)*.7;gctx.fillStyle=`rgba(220,255,200,${(.62+wave*.14).toFixed(3)})`;gctx.shadowBlur=10;gctx.beginPath();gctx.arc(ex,ey,oz,0,Math.PI*2);gctx.fill();}
  /* Gold medallion */
  gctx.shadowColor='rgba(255,200,50,.9)';gctx.shadowBlur=18;gctx.strokeStyle=`rgba(255,210,80,${(.52+Math.sin(t*.55)*.08).toFixed(3)})`;gctx.lineWidth=1.6;gctx.beginPath();gctx.arc(0,0,cy*.18,0,Math.PI*2);gctx.stroke();
  /* Micro particles seeded by letter */
  for(let i=0;i<12;i++){const pa=(lc*i*.618+t*(.12+i*.04))%(Math.PI*2),pr=cy*.28+Math.sin(t*.32+i*1.1)*cy*.1;gctx.fillStyle=`rgba(255,200,60,${(.07+Math.sin(t*.8+i*1.4)*.05).toFixed(3)})`;gctx.shadowBlur=6;gctx.beginPath();gctx.arc(Math.cos(pa)*pr,Math.sin(pa)*pr,1.4,0,Math.PI*2);gctx.fill();}
  /* DOMINANT LETTER — 5 glow passes */
  gctx.globalCompositeOperation='source-over';
  const fs=Math.round(cy*.44),ly=fs*.04;gctx.font=`700 ${fs}px "Cinzel",serif`;gctx.textAlign='center';gctx.textBaseline='middle';
  const anim=Math.sin(t*.72)*.06;
  gctx.shadowColor='rgba(255,150,20,.2)';gctx.shadowBlur=90;gctx.fillStyle='rgba(255,160,30,.1)';gctx.fillText(L,0,ly);
  gctx.shadowColor='rgba(255,190,40,.55)';gctx.shadowBlur=48;gctx.fillStyle=`rgba(255,195,50,${(.28+anim).toFixed(3)})`;gctx.fillText(L,0,ly);
  gctx.shadowColor='rgba(255,215,70,.75)';gctx.shadowBlur=22;gctx.fillStyle=`rgba(255,215,70,${(.58+anim).toFixed(3)})`;gctx.fillText(L,0,ly);
  gctx.shadowColor='rgba(255,235,100,.9)';gctx.shadowBlur=8;gctx.fillStyle=`rgba(255,232,120,${(.82+anim).toFixed(3)})`;gctx.fillText(L,0,ly);
  gctx.shadowBlur=2;gctx.fillStyle='rgba(255,252,235,1)';gctx.fillText(L,0,ly);
  /* Number orbiting */
  const na=ph+.24+t*.06;gctx.shadowColor='rgba(127,220,210,1)';gctx.shadowBlur=10;gctx.fillStyle='rgba(180,245,235,.88)';gctx.font=`300 ${Math.round(cy*.065)}px "Space Mono",monospace`;gctx.fillText(N,Math.cos(na)*cy*.17,Math.sin(na)*cy*.17);
  gctx.restore();}

/* ══════════════════════════════════════════════════════════ NARRATIVE CONCORDANCES */
function sfx2(n){return n===1?'st':n===2?'nd':n===3?'rd':'th';}
function analyse(L,N,word,name,hour,minute,dow,dom,incomingWord){
  const l=(L||'E').toUpperCase(),n=parseInt(N)||1;
  const w=(word||'').trim().toLowerCase();
  const nm=(name||'').trim(),nml=nm.toLowerCase();
  const h=parseInt(hour)||0,min=parseInt(minute)||0;
  const dw=parseInt(dow)||0,dm=parseInt(dom)||1;
  const iw=(incomingWord||'').trim().toLowerCase();
  const lPos=l.charCodeAt(0)-64;
  const c=[];const add=(t,weight,fact)=>{if(!c.find(x=>x.t===t))c.push({t,w:weight,fact});};
  const ds=x=>String(x).split('').reduce((a,b)=>a+parseInt(b),0);
  const cl=s=>s.replace(/\s/g,'');const p2=x=>x<10?'0'+x:String(x);const vow='aeiou';const sfx=n=>n===1?'st':n===2?'nd':n===3?'rd':'th';
  /* LETTER + NAME */
  if(nm&&nm[0].toUpperCase()===l)add('li',5,`You chose ${l}. ${nm} begins with ${l}. You chose the same letter twice without knowing it.`);
  if(nm&&cl(nm).length===n)add('ln',5,`You chose ${n}. ${nm} has exactly ${n} letters. You didn't know that.`);
  if(nm&&nm[n-1]&&nm[n-1].toUpperCase()===l)add('lnnth',4,`${l} is the ${n}${sfx(n)} letter of ${nm}. Your number was ${n}.`);
  const liN=(nml.match(new RegExp(l.toLowerCase(),'g'))||[]).length;if(liN===n&&liN>0)add('lcn',4,`${l} appears exactly ${n} time${n>1?'s':''} in ${nm}. You chose ${n}.`);
  const nmVow=nml.split('').filter(c2=>vow.includes(c2)).length;if(nmVow===n)add('nmv',3,`${nm} has ${n} vowel${n>1?'s':''}. Your number was ${n}. The sound of the name counts itself.`);
  const nmCons=cl(nml).split('').filter(c2=>!vow.includes(c2)).length;if(nmCons===n)add('nmc',3,`${nm} has ${n} consonant${n>1?'s':''}. You chose ${n}.`);
  /* LETTER + WORD */
  if(w&&w[0].toUpperCase()===l&&!c.find(z=>z.t==='li'))add('lw',3,`You chose ${l}. You left "${w}". It begins with ${l}. You chose the same thing twice.`);
  if(w&&cl(w).length===n&&!c.find(z=>z.t==='ln'))add('wn',3,`"${w}" has ${n} letters. Your number was ${n}.`);
  if(w&&w[n-1]&&w[n-1].toUpperCase()===l)add('lwnth',4,`${l} is the ${n}${sfx(n)} letter of "${w}". Your number was ${n}.`);
  const liW=(w.match(new RegExp(l.toLowerCase(),'g'))||[]).length;if(liW===n&&liW>0)add('lcw',4,`${l} appears exactly ${n} time${n>1?'s':''} in "${w}". You chose ${n}.`);
  const wVow=w.split('').filter(c2=>vow.includes(c2)).length;if(wVow===n)add('vwn',3,`"${w}" holds ${n} vowel${n>1?'s':''}. Your number was ${n}.`);
  if(lPos===n)add('lp',4,`${l} is the ${n}${sfx(n)} letter of the alphabet. You chose ${n}. You chose the same thing two different ways.`);
  /* WORD + NAME cross */
  if(w&&nm&&cl(w).length===cl(nm).length&&cl(w).length===n)add('wneq',5,`"${w}" has ${n} letters. ${nm} has ${n} letters. Your number was ${n}. Three different answers. All the same.`);
  if(w&&nm&&w.includes(l.toLowerCase())&&nml.includes(l.toLowerCase()))add('lboth',4,`${l} lives inside both "${w}" and ${nm}. You chose ${l}. It was already everywhere.`);
  /* HOUR */
  if(h===n)add('heq',5,`You descended at ${p2(h)}h. Your number was ${n}. The hour was already your answer.`);
  if(ds(h)===n&&h>9)add('hrs',4,`You came at ${p2(h)}h. Its digits add to ${n}. Your number was already in the clock.`);
  /* MINUTE */
  if(min===n)add('meq',5,`The descent started at :${p2(min)}. Your number was ${n}. The minute and the number were the same.`);
  if(ds(min)===n&&min>9)add('mds',4,`You started at :${p2(min)}. Those digits sum to ${n}. Your number.`);
  /* HOUR + MINUTE */
  const hmTot=h*60+min;if(ds(hmTot)===n)add('hmds',4,`${p2(h)}:${p2(min)}. Every digit of that exact moment adds to ${n}. Your number.`);
  if(h>0&&min>0&&n>1&&h%n===0&&min%n===0)add('hmfact',4,`${p2(h)}h and :${p2(min)}. Both divisible by ${n}. Your number divides the moment.`);
  /* DAY */
  if(dm===n)add('dom',4,`You came on the ${dm}${sfx(dm)}. Your number was ${n}. The date already knew.`);
  const dow1=dw===0?7:dw;if(dow1===n)add('dow',3,`Day ${n} of the week. Your number was ${n}. Day and number — the same.`);
  /* INCOMING WORD */
  if(iw&&iw[0].toUpperCase()===l)add('iwl',4,`"${iw}" — the word the water held for you — also begins with ${l}. You chose ${l}. The chain was already set.`);
  if(iw&&cl(iw).length===n)add('iwn',4,`"${iw}" — the word before yours — has ${n} letters. Someone you never met gave you your number.`);
  if(iw&&w&&w[0]===iw[0])add('iwwi',3,`The word left for you: "${iw}". The word you left: "${w}". Same beginning. You continued something without knowing it.`);
  return c.sort((a,b)=>b.w-a.w);}

/* ══════════════════════════════════════════════════════════ ORACLE */
function buildOracle(L,N,word,name,hour,minute,conns){
  const l=(L||'E').toUpperCase(),n=parseInt(N)||1;
  const w=(word||'water').trim().toLowerCase();
  const nm=(name||'').trim();
  const h=parseInt(hour)||0,min=parseInt(minute)||0;
  const p2=x=>x<10?'0'+x:String(x);const has=t=>conns.find(c=>c.t===t);
  if(has('li')&&has('ln')&&nm)return`You chose ${l} and ${n}. ${nm} begins with ${l} and has ${n} letters. None of this was coordinated. Or it was.`;
  if(has('wneq')&&nm)return`"${w}", ${nm}, and ${n}. Different things you offered. The same answer came back each time.`;
  if(has('li')&&has('meq')&&nm)return`At :${p2(min)}, you chose ${n}. ${nm} begins with ${l}. You chose ${l}. The minute, the name, the letter, the number. They converge.`;
  if(has('ln')&&has('heq')&&nm)return`It was ${p2(h)}h. Your number was ${n}. ${nm} has ${n} letters. The hour and the name already agreed.`;
  if(has('li')&&has('lp'))return`${l} is the ${n}th letter of the alphabet. You chose ${n}. ${nm?nm+' begins with '+l+'. ':''}The same answer, every time you looked.`;
  if(has('iwl')&&has('li')&&nm)return`The word before yours starts with ${l}. ${nm} starts with ${l}. You chose ${l}. The water had already arranged this.`;
  if(has('heq')&&has('ln')&&nm)return`${p2(h)}h. ${nm} — ${n} letters. Your number: ${n}. The hour was your number. The name was your number. Three different ways to the same answer.`;
  if(has('li')&&nm)return`You wrote ${nm}. You chose ${l}. They begin the same. The water noticed before you did.`;
  if(has('ln')&&nm)return`You chose ${n}. ${nm} has ${n} letters. You wrote the name and chose the number and they were already the same.`;
  if(has('heq'))return`It was ${p2(h)}h. Your number was ${n}. The moment you arrived and the number you chose were already the same.`;
  if(has('meq'))return`The descent began at :${p2(min)}. You chose ${n}. The clock had your answer before you did.`;
  if(nm)return`${nm}. "${w}". ${n}. ${l}. Four things you offered. The water found a pattern you didn't put there.`;
  return`"${w}". ${n}. ${l}. You left three things. The water found what connects them.`;}

/* ══════════════════════════════════════════════════════════ D3 REVEAL */
function startD3Reveal(){
  const gl=document.getElementById('glyphCv');gl.style.display='block';glyphRunning=true;
  document.getElementById('d3text').classList.add('show');
  const L=FP.d3.letter||'E',N=FP.d3.number||5;
  const conns=analyse(L,N,FP.d1.word,FP.d2.name,FP.d1.hour,FP.d1.minute,FP.d1.dow,FP.d1.dom,incoming);
  const good=conns.filter(c=>c.w>=3).slice(0,8);
  const oracle=buildOracle(L,N,FP.d1.word,FP.d2.name,FP.d1.hour,FP.d1.minute,good);
  const d3t=document.getElementById('d3text');
  let delay=1800;
  /* Oracle line */
  setTimeout(()=>{const p=document.createElement('p');p.className='rline';p.textContent=oracle;d3t.appendChild(p);requestAnimationFrame(()=>requestAnimationFrame(()=>p.classList.add('show')));},delay);delay+=2200;
  /* Separator */
  setTimeout(()=>{const sep=document.createElement('div');sep.className='rsep';d3t.appendChild(sep);requestAnimationFrame(()=>requestAnimationFrame(()=>sep.classList.add('show')));},delay);delay+=600;
  /* Connections */
  good.forEach((conn,i)=>{setTimeout(()=>{connDing();const p=document.createElement('p');p.className='rconn';p.textContent=conn.fact;d3t.appendChild(p);requestAnimationFrame(()=>requestAnimationFrame(()=>p.classList.add('show')));},delay+i*2600);});
  const afterAll=delay+good.length*2600;
  /* Count */
  setTimeout(()=>{if(good.length>0){const t=document.createElement('p');t.className='rtot';t.textContent=`${good.length} concordance${good.length>1?'s':''}  ·  the water knew`;d3t.appendChild(t);}},afterAll+200);
  /* Enigma */
  setTimeout(()=>{document.getElementById('d3text').style.opacity='0';document.getElementById('enigmaWrap').classList.add('solo');setTimeout(()=>document.getElementById('enigma1').classList.add('show'),400);setTimeout(()=>document.getElementById('enigma2').classList.add('show'),4800);enigmaScore();},afterAll+5000);
  /* Whiteout */
  setTimeout(()=>{document.getElementById('whiteout').classList.add('on');setTimeout(()=>location.reload(),2800);},afterAll+13000);}

/* ══════════════════════════════════════════════════════════ HEART */
function enterHeart(){if(heartShown)return;heartShown=true;dVel=0;ended=true;
  if(DIVE===3){enterHeartD3();return;}
  saveFP();
  const H2=document.getElementById('heart');H2.classList.add('show');
  document.getElementById('tools').classList.add('on');
  if(DIVE===1){
    const lines=['Your word is now part of this place.',FP.d1.word?`"${FP.d1.word}" — carried down.`:'You dove without a word.'];
    let acc=0;lines.forEach((txt,i)=>{acc+=i===0?1600:2000;setTimeout(()=>{const d=document.createElement('div');d.className='hline';d.textContent=txt;H2.insertBefore(d,document.getElementById('heartBtn'));requestAnimationFrame(()=>requestAnimationFrame(()=>d.classList.add('show')));},acc);});
    setTimeout(()=>document.getElementById('heartBtn').classList.add('show'),acc+300);
  }else{
    /* D2: direct finish */
    setTimeout(finish,600);}}

function enterHeartD3(){
  stopSonar();
  const H2=document.getElementById('heart');H2.classList.add('show');
  const d3r=document.getElementById('d3reveal');d3r.style.display='flex';
  const grid=document.getElementById('d3numGrid');grid.style.display='flex';
  for(let i=1;i<=9;i++){const b=document.createElement('button');b.className='d3nb';b.textContent=i;b.addEventListener('click',()=>{FP.d3.number=i;b.style.borderColor='var(--teal)';b.style.background='rgba(127,236,224,.18)';setTimeout(()=>{H2.classList.remove('show');startD3Reveal();},500);});grid.appendChild(b);}}

document.getElementById('heartBtn').addEventListener('click',e=>{e.stopPropagation();startSurface();});

/* ══════════════════════════════════════════════════════════ SURFACE + FINISH */
function startSurface(){document.getElementById('heart').classList.remove('show');setTimeout(finish,500);}
function finish(){
  const endEl=document.getElementById('end');
  document.getElementById('hookLine').textContent=DIVE===1?'You are back to the surface. But something is calling you back.':'';
  document.getElementById('again').textContent=DIVE===2?'Wake up':'Dive again';
  endEl.classList.remove('hide');
  document.getElementById('start').classList.add('hide');}
document.getElementById('again').addEventListener('click',e=>{e.stopPropagation();DIVE=Math.min(3,DIVE+1);document.getElementById('end').classList.add('hide');billInputShown=false;billWordSubmitted=false;billTypingActive=false;currentBillTyped='';document.getElementById('billInput').classList.remove('show');document.getElementById('billForm').style.display='';document.getElementById('billMsg').classList.remove('show');configureForDive(DIVE);document.getElementById('start').classList.remove('hide');});

/* ══════════════════════════════════════════════════════════ CONFIGURE FOR DIVE */
function configureForDive(d){
  const isD1=d===1,isD2=d===2,isD3=d===3;
  started=false;ended=false;heartShown=false;depth=0;dVel=0;submergedOnce=false;fragIdx=0;tapTimes=[];glyphRunning=false;glyphT=0;
  document.getElementById('d3text').classList.remove('show');document.getElementById('d3text').innerHTML='<canvas id="glyphCv" width="280" height="280" style="border-radius:50%;margin:4vh auto 24px;box-shadow:0 0 80px rgba(255,190,40,.18),0 0 160px rgba(127,236,224,.10);display:none"></canvas>';
  document.getElementById('enigmaWrap').classList.remove('solo');document.getElementById('enigma1').classList.remove('show');document.getElementById('enigma2').classList.remove('show');
  document.getElementById('whiteout').classList.remove('on');
  const H2=document.getElementById('heart');H2.classList.remove('show');Array.from(H2.querySelectorAll('.hline')).forEach(e=>e.remove());document.getElementById('heartBtn').classList.remove('show');
  document.getElementById('d3reveal').style.display='none';document.getElementById('d3numGrid').innerHTML='';document.getElementById('d3numGrid').style.display='none';
  document.getElementById('tools').classList.remove('on');
  document.getElementById('cap').classList.remove('show');
  /* Images */
  const imgs=isD1?D1_IMGS:isD2?D2_IMGS:[];
  L.forEach((el,i)=>{el.style.backgroundImage=imgs[i]?`url('${imgs[i]}')`:"none";el.style.opacity='0';});
  ANCH=isD1?[...ANCH_D1]:isD2?[...ANCH_D2]:[0,2,2,2,2,2];
  FRAGS=isD1?[...D1_FRAGS]:isD2?[...D2_FRAGS]:[];
  GRADE=isD1?D1_GRADE:isD2?D2_GRADE:D3_GRADE;
  /* Start screen */
  document.getElementById('startKick').textContent=isD2?'New York · the water remembers you':isD3?'':'';
  document.getElementById('startTitle').style.display='none';
  document.getElementById('d2q').style.display=isD2?'':'none';
  const tag=document.getElementById('startTag');
  if(isD1){tag.style.cssText='font-size:clamp(28px,5.5vw,56px);color:rgba(240,248,252,.96);font-style:italic;margin-top:0';tag.textContent='New York is underwater.';}
  else{tag.style.cssText='';tag.textContent=isD3?'The water has something to show you.':'';}
  document.getElementById('start').style.background=isD2?'radial-gradient(140% 120% at 50% 30%,rgba(28,8,52,.96),rgba(8,2,18,.99))':isD1?'rgba(2,6,14,.58)':'radial-gradient(140% 120% at 50% 30%,rgba(4,14,28,.94),rgba(2,6,14,.98))';
  const wr=document.querySelector('.wordrow');wr.style.display=isD1?'none':'';
  document.getElementById('oword').value='';
  document.getElementById('oword').placeholder=isD3?'one letter…':'a name…';
  document.getElementById('go').textContent=isD1?'Dive':'Descend';
  /* D3 sonar */
  if(isD3)setTimeout(startSonar,2000);}

/* ══════════════════════════════════════════════════════════ BEGIN */
function begin(inputVal){
  unlockAudio();initAudio();started=true;ended=false;descentStartTime=new Date();dVel=0;
  document.getElementById('start').classList.add('hide');
  document.getElementById('tools').classList.add('on');
  if(DIVE===2&&inputVal){FP.d2.name=inputVal;if(FRAGS[1])FRAGS[1]=[FRAGS[1][0],`The place looks familiar. But you can't be sure... ${inputVal}? Someone you knew?`];}
  if(DIVE===3&&inputVal){FP.d3.letter=inputVal.toUpperCase()[0]||'E';}}

document.getElementById('go').addEventListener('click',e=>{e.stopPropagation();begin(document.getElementById('oword').value.trim());});
document.getElementById('oword').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();begin(e.target.value.trim());}});
stage.addEventListener('click',e=>{if(!started)begin('');});

/* ══════════════════════════════════════════════════════════ TOOLS */
/* ══════════════════════════════════════════════════════════ BOOT */
let loadDone=false;
function hideLoad(){if(loadDone)return;loadDone=true;document.getElementById('load').classList.add('hide');configureForDive(1);document.getElementById('start').classList.remove('hide');}
let loaded=0;D1_IMGS.forEach(s=>{const im=new Image();im.onload=im.onerror=()=>{if(++loaded>=3)hideLoad();};im.src=s;});
setTimeout(hideLoad,4000);
loadFP();resize();setIcon();requestAnimationFrame(frame);

</script>
