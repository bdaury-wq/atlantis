<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ATLANTIS · New York</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;color:#e9f5f6;
  font-family:"Cormorant Garamond",Georgia,serif}
/* VIDEO BACKGROUND */
#bg{position:fixed;inset:0;z-index:0;background:#020a14}
.vs{position:absolute;inset:0;opacity:0;transition:opacity 1.6s ease}
.vs.on{opacity:1}
.vs video{width:100%;height:100%;object-fit:cover}
/* GRAIN OVERLAY */
#grain{position:fixed;inset:0;z-index:1;pointer-events:none;opacity:.04;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size:128px 128px}
/* VIGNETTE + BOTTOM GRADIENT */
#vg{position:fixed;inset:0;z-index:2;pointer-events:none;
  background:
    radial-gradient(ellipse 110% 75% at 50% 55%,transparent 18%,rgba(0,0,0,.5) 100%),
    linear-gradient(to top,rgba(0,0,0,.78) 0%,rgba(0,0,0,.22) 35%,transparent 62%)}
/* BILLBOARD CANVAS */
#bill{position:fixed;inset:0;z-index:3;pointer-events:none}
/* SCAN LINES */
#scan{position:fixed;inset:0;z-index:4;pointer-events:none;opacity:.18;mix-blend-mode:overlay;
  background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0,rgba(0,0,0,.25) 1px,rgba(0,0,0,0) 2px)}
/* MAIN SLIDE UI */
#ui{position:fixed;bottom:0;left:0;right:0;z-index:10;
  padding:0 clamp(24px,8vw,120px) clamp(48px,7vh,90px);
  text-align:center;pointer-events:none}
#ui.live{pointer-events:auto}
/* CAPTION */
.cap{font-style:italic;font-weight:300;font-size:clamp(24px,4vw,52px);
  line-height:1.3;color:rgba(240,250,252,.96);
  text-shadow:0 2px 48px rgba(0,0,0,.95),0 0 80px rgba(0,0,0,.8);
  opacity:0;transform:translateY(20px);transition:opacity 1.8s ease,transform 1.8s ease;
  white-space:pre-line}
.cap.show{opacity:1;transform:translateY(0)}
/* INPUT AREA */
#inp{margin-top:28px;display:flex;flex-direction:column;align-items:center;gap:14px;
  opacity:0;transition:opacity 1.2s ease 1s;pointer-events:none}
#inp.show{opacity:1;pointer-events:auto}
.ifield{background:transparent;border:none;border-bottom:1px solid rgba(127,236,224,.4);
  color:rgba(240,252,252,.95);font-family:"Cormorant Garamond",serif;font-style:italic;
  font-size:clamp(20px,3vw,32px);text-align:center;outline:none;padding:10px 0;
  width:min(340px,64vw);letter-spacing:.04em;transition:border-color .3s}
.ifield::placeholder{color:rgba(127,236,224,.28);font-style:italic}
.ifield:focus{border-bottom-color:rgba(127,236,224,.85)}
/* NUMBER GRID */
#nums{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;max-width:260px}
.nb{width:62px;height:62px;background:rgba(3,10,22,.6);border:1px solid rgba(127,236,224,.3);
  color:rgba(190,248,240,.88);font-family:"Cinzel",serif;font-size:21px;cursor:pointer;
  border-radius:2px;transition:.22s;display:flex;align-items:center;justify-content:center;
  -webkit-tap-highlight-color:transparent}
.nb:hover,.nb:active{background:rgba(127,236,224,.15);border-color:rgba(127,236,224,.85)}
.nb.sel{background:rgba(127,236,224,.18);border-color:#7fece0;color:#7fece0}
/* DIVE BUTTON */
#dive{margin-top:20px;font-family:"Space Mono",monospace;font-size:11px;
  letter-spacing:.5em;text-transform:uppercase;color:rgba(200,235,240,.45);
  cursor:pointer;background:none;border:none;opacity:0;transition:opacity 1.2s ease 2s;
  pointer-events:none;animation:glow 3.5s ease-in-out infinite}
#dive.show{opacity:1;pointer-events:auto}
@keyframes glow{0%,100%{color:rgba(200,235,240,.38)}50%{color:rgba(200,235,240,.75);text-shadow:0 0 20px rgba(127,236,224,.3)}}
/* LETTER ROW */
#lrow{display:flex;gap:18px;align-items:flex-end;justify-content:center}
/* REVEAL */
#rev{position:fixed;inset:0;z-index:20;background:#02060e;
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  padding:4vh clamp(24px,8vw,120px) 8vh;overflow-y:auto;
  opacity:0;pointer-events:none;transition:opacity 1.4s}
#rev.on{opacity:1;pointer-events:auto}
#glyph{border-radius:50%;margin:3vh auto 20px;display:block;
  box-shadow:0 0 100px rgba(255,190,40,.16),0 0 200px rgba(127,236,224,.08)}
.rl{opacity:0;transform:translateY(8px);transition:opacity 1.6s,transform 1.6s;
  font-style:italic;font-weight:300;font-size:clamp(18px,2.8vw,28px);
  line-height:1.75;color:rgba(233,245,246,.88);margin:8px 0;max-width:640px;text-align:center}
.rl.show{opacity:1;transform:translateY(0)}
.rc{opacity:0;transform:translateY(8px);transition:opacity 1.6s,transform 1.6s;
  font-style:italic;font-weight:300;font-size:clamp(18px,2.6vw,25px);
  color:rgba(190,248,240,.9);line-height:1.85;margin:10px 0;max-width:640px;text-align:center}
.rc.show{opacity:1;transform:translateY(0)}
.rsep{width:0;height:1px;background:rgba(127,236,224,.22);margin:18px auto;opacity:0;transition:width 1.6s,opacity 1s}
.rsep.show{width:56px;opacity:1}
.rtot{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.28em;
  text-transform:uppercase;color:rgba(255,230,140,.72);margin-top:16px}
/* ENIGMA */
#enig{position:fixed;inset:0;z-index:30;display:flex;flex-direction:column;
  align-items:center;justify-content:center;padding:8vw;
  pointer-events:none;background:transparent;transition:background 2s}
#enig.solo{background:rgba(2,2,8,1)}
.e1,.e2{opacity:0;font-style:italic;font-weight:300;text-align:center}
.e1{font-size:clamp(22px,4.2vw,50px);color:rgba(235,248,246,.72);transition:opacity 3.2s}
.e2{font-size:clamp(28px,5.5vw,62px);color:rgba(255,252,248,.96);margin-top:18px;transition:opacity 2.4s}
.e1.on,.e2.on{opacity:1}
/* WHITEOUT */
#wo{position:fixed;inset:0;background:#fff;opacity:0;pointer-events:none;z-index:99;transition:opacity 2.8s}
#wo.on{opacity:1;pointer-events:auto}
/* LOAD SCREEN */
#load{position:fixed;inset:0;z-index:50;background:#000;display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:40px;transition:opacity 1.4s}
#load.out{opacity:0;pointer-events:none}
#load h1{font-family:"Cinzel",serif;font-weight:400;font-size:clamp(32px,7vw,72px);
  letter-spacing:.18em;color:rgba(127,236,224,.9);text-shadow:0 0 60px rgba(127,236,224,.3)}
#load .sub{font-style:italic;font-weight:300;font-size:clamp(14px,2vw,18px);
  color:rgba(200,230,240,.5);letter-spacing:.08em}
#startBtn{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.55em;
  text-transform:uppercase;color:rgba(240,252,252,.85);background:none;
  border:1px solid rgba(127,236,224,.45);padding:18px 48px;cursor:pointer;
  transition:.4s;animation:glow 3s ease-in-out infinite}
#startBtn:hover{background:rgba(127,236,224,.08);border-color:#7fece0;
  box-shadow:0 0 40px rgba(127,236,224,.18)}
</style>
</head>
<body>

<!-- VIDEO BG -->
<div id="bg">
  <div class="vs on" id="va"><video playsinline muted loop preload="auto" id="vva"></video></div>
  <div class="vs" id="vb"><video playsinline muted loop preload="auto" id="vvb"></video></div>
</div>

<div id="grain"></div>
<div id="vg"></div>
<canvas id="bill"></canvas>
<div id="scan"></div>

<!-- SLIDE UI -->
<div id="ui">
  <p class="cap" id="cap"></p>
  <div id="inp">
    <input class="ifield" id="nfield" type="text" maxlength="32" autocomplete="off" spellcheck="false" placeholder="a name...">
    <input class="ifield" id="wfield" type="text" maxlength="32" autocomplete="off" spellcheck="false" placeholder="one word...">
    <div id="lrow">
      <input class="ifield" id="lfield" type="text" maxlength="1" autocomplete="off" style="width:72px;font-size:clamp(22px,4vw,40px)" placeholder="A">
      <div id="nums"></div>
    </div>
  </div>
  <button id="dive">dive ↓</button>
</div>

<!-- REVEAL -->
<div id="rev">
  <canvas id="glyph" width="280" height="280"></canvas>
</div>

<!-- ENIGMA -->
<div id="enig">
  <p class="e1" id="e1">Either this was random.</p>
  <p class="e2" id="e2">Or you already knew.</p>
</div>

<div id="wo"></div>

<!-- LOAD SCREEN -->
<div id="load">
  <h1>ATLANTIS</h1>
  <p class="sub">New York · the water remembers</p>
  <button id="startBtn">Dive</button>
</div>

<script>
/* ═══════════════════════════════ VIDEOS & SLIDES */
const VIDS=['01-nyc-flooding-2K.mp4','02-flooded-shore-2K.mp4',
  '03-times-square-2K.mp4','04-subway-2K.mp4',
  '05-central-park-2K.mp4','03-deep-2K.mp4'];

const SLIDES=[
  {cap:'New York went underwater on a Tuesday.',input:null},
  {cap:'What is the name of the last person you remember?',input:'name'},
  {cap:'Someone was here before you.',input:'word'},
  {cap:'Times Square.\nForty-Second Street.\nThe coral remembers the route.',input:null},
  {cap:'It was never about the city.',input:'letter+number'},
  {cap:null,input:null}
];

/* ═══════════════════════════════ STATE */
const FP={word:null,name:null,letter:'E',number:null};
const now=new Date();
Object.assign(FP,{hour:now.getHours(),min:now.getMinutes(),dow:now.getDay(),dom:now.getDate()});
let sl=0,busy=false,glAF=null,glT=0;
let bWord='',bSubmit=false;

/* ═══════════════════════════════ STORE */
const SEED='water';let incoming=SEED;
(async()=>{try{const v=localStorage.getItem('atl_last');if(v)incoming=v;}catch(e){}})();
function store(w){try{localStorage.setItem('atl_last',w);}catch(e){}}
function san(w){return(w||'').replace(/\s+/g,' ').trim().slice(0,32);}

/* ═══════════════════════════════ VIDEO CROSSFADE */
const va=document.getElementById('va'),vb=document.getElementById('vb');
const vva=document.getElementById('vva'),vvb=document.getElementById('vvb');
let slot='a';

function crossfade(src){
  const next=slot==='a'?vb:va;
  const nv=slot==='a'?vvb:vva;
  nv.src=src;nv.load();
  nv.play().catch(()=>{});
  // Tiny delay so video has time to decode first frame
  setTimeout(()=>{
    next.classList.add('on');
    (slot==='a'?va:vb).classList.remove('on');
    slot=slot==='a'?'b':'a';
  },200);
}

/* ═══════════════════════════════ AUDIO — D2 INCEPTION SCORE */
let A=null,musicOn=false;
function mkI(d,dc){if(!A)return null;const r=A.sampleRate,l=r*d,b=A.createBuffer(2,l,r);for(let c=0;c<2;c++){const dt=b.getChannelData(c);for(let i=0;i<l;i++)dt[i]=(Math.random()*2-1)*Math.pow(1-i/l,dc);}return b;}
function initAudio(){
  if(A)return;
  try{A=new(window.AudioContext||window.webkitAudioContext)();
    if(A.state==='suspended')A.resume();}catch(e){return;}
}
function startMusic(){
  if(musicOn||!A)return;musicOn=true;
  const t=A.currentTime+.2;
  /* Long reverb hall 13s */
  const rev=A.createConvolver();rev.buffer=mkI(13,1.1);
  const rvg=A.createGain();rvg.gain.value=.82;rev.connect(rvg);rvg.connect(A.destination);
  /* Warmth lowpass */
  const lp=A.createBiquadFilter();lp.type='lowpass';lp.frequency.value=1900;lp.Q.value=0.4;lp.connect(rev);
  /* E-minor pad: pure sine E2+B2+E3 — soft swell, slight detune for thickness */
  [[82.41,0,.026],[123.47,.3,.020],[164.81,-.3,.016]].forEach(([f,det,vol])=>{
    const o=A.createOscillator(),g=A.createGain();o.type='sine';o.frequency.value=f+det;
    o.connect(g);g.connect(lp);g.connect(rvg);
    g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+7);g.gain.setValueAtTime(vol,t+999);o.start(t);
    const lfo=A.createOscillator(),lg=A.createGain();lfo.type='sine';lfo.frequency.value=.18+Math.random()*.06;lg.gain.value=vol*.12;lfo.connect(lg);lg.connect(g.gain);lfo.start(t);
  });
  /* Ghost A2 fifth underneath */
  const fa=A.createOscillator(),fg=A.createGain();fa.type='sine';fa.frequency.value=110;fa.connect(fg);fg.connect(lp);fg.gain.setValueAtTime(0,t);fg.gain.linearRampToValueAtTime(.010,t+10);fg.gain.setValueAtTime(.010,t+999);fa.start(t);
  /* Sparse descending melody: E4 D4 C4 B3 A3 — slow, long silence between loops */
  const mel=[[329.63,.018],[293.66,.015],[261.63,.013],[246.94,.012],[220.00,.010]];
  function playMelody(start2){
    if(!musicOn)return;let nt=start2;
    mel.forEach(([f,vol])=>{
      const o=A.createOscillator(),g=A.createGain();o.type='sine';o.frequency.value=f;
      o.connect(g);g.connect(rev);g.connect(A.destination);
      g.gain.setValueAtTime(0,nt);g.gain.linearRampToValueAtTime(vol,nt+.12);g.gain.exponentialRampToValueAtTime(.001,nt+7);
      o.start(nt);o.stop(nt+7.5);nt+=2.2;
    });
    setTimeout(()=>playMelody(A.currentTime+.05),(mel.length*2.2+8)*1000);
  }
  setTimeout(()=>playMelody(A.currentTime+.05),4000);
}
function connDing(){if(!A)return;const t=A.currentTime,o=A.createOscillator(),g=A.createGain();o.type='sine';o.frequency.value=880+Math.random()*220;o.connect(g);g.connect(A.destination);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.028,t+.04);g.gain.exponentialRampToValueAtTime(.001,t+2.5);o.start(t);o.stop(t+3);}
function enigmaSound(){if(!A)return;musicOn=false;const t=A.currentTime,rev=A.createConvolver();rev.buffer=mkI(16,1.1);const rg=A.createGain();rg.gain.value=.78;rev.connect(rg);rg.connect(A.destination);const o=A.createOscillator(),g=A.createGain();o.type='sine';o.frequency.value=220;const lfo=A.createOscillator(),lg=A.createGain();lfo.type='sine';lfo.frequency.value=.3;lg.gain.value=.8;lfo.connect(lg);lg.connect(o.frequency);o.connect(g);g.connect(rev);g.connect(A.destination);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.016,t+3);g.gain.exponentialRampToValueAtTime(.001,t+16);o.start(t);lfo.start(t);o.stop(t+17);lfo.stop(t+17);}

/* ═══════════════════════════════ SLIDE DISPLAY */
const capEl=document.getElementById('cap'),inpEl=document.getElementById('inp');
const diveBtn=document.getElementById('dive'),uiEl=document.getElementById('ui');
const nf=document.getElementById('nfield'),wf=document.getElementById('wfield'),lf=document.getElementById('lfield');

function resetUI(){
  capEl.classList.remove('show');inpEl.classList.remove('show');diveBtn.classList.remove('show');
  [nf,wf,document.getElementById('lrow')].forEach(e=>e.style.display='none');
  document.querySelectorAll('.nb').forEach(b=>b.classList.remove('sel'));
  FP.number=null;
}

function showSlide(i){
  if(i>=SLIDES.length){startReveal();return;}
  const s=SLIDES[i];resetUI();bWord='';bSubmit=false;
  crossfade(VIDS[i]);
  uiEl.classList.toggle('live',!!s.input);

  if(s.cap){
    capEl.textContent=s.cap;
    setTimeout(()=>capEl.classList.add('show'),400);
  }

  if(!s.input){
    setTimeout(()=>diveBtn.classList.add('show'),1800);
  } else {
    inpEl.classList.add('show');
    if(s.input==='name'){
      nf.style.display='';nf.value='';
      setTimeout(()=>nf.focus(),1100);
    } else if(s.input==='word'){
      wf.style.display='';wf.value='';
      setTimeout(()=>wf.focus(),1100);
    } else {
      document.getElementById('lrow').style.display='flex';
      lf.value='';
      setTimeout(()=>lf.focus(),1100);
    }
    setTimeout(()=>diveBtn.classList.add('show'),2000);
  }
}

/* ═══════════════════════════════ ADVANCE */
function advance(){
  if(busy)return;
  const s=SLIDES[sl];
  if(s.input==='name'){
    const v=san(nf.value);if(!v)return nf.focus();FP.name=v;
  } else if(s.input==='word'){
    const v=san(wf.value)||bWord;if(!v)return wf.focus();
    FP.word=v;store(v);bSubmit=true;
    // Flash billboard then advance
    const fl=document.createElement('div');
    fl.style.cssText='position:fixed;inset:0;z-index:15;background:rgba(244,200,80,.22);pointer-events:none;transition:opacity .4s';
    document.body.appendChild(fl);
    requestAnimationFrame(()=>{fl.style.opacity='1';setTimeout(()=>{fl.style.opacity='0';setTimeout(()=>fl.remove(),400);busy=false;sl++;showSlide(sl);},200);});
    busy=true;return;
  } else if(s.input==='letter+number'){
    const l=lf.value.toUpperCase()[0];if(!l)return lf.focus();
    if(!FP.number)return;
    FP.letter=l;
  }
  busy=true;sl++;showSlide(sl);setTimeout(()=>busy=false,1700);
}

diveBtn.addEventListener('click',advance);
nf.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();advance();}});
wf.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();advance();}});
wf.addEventListener('input',e=>{bWord=san(e.target.value)||'';});
lf.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();advance();}});
document.addEventListener('keydown',e=>{
  if(e.key==='Enter'&&!SLIDES[sl]?.input)advance();
  if([' ','ArrowDown'].includes(e.key)&&!SLIDES[sl]?.input){e.preventDefault();advance();}
});
document.getElementById('bg').addEventListener('click',()=>{if(!SLIDES[sl]?.input)advance();});

/* ═══════════════════════════════ NUMBER GRID */
const ng=document.getElementById('nums');
for(let i=1;i<=9;i++){
  const b=document.createElement('button');b.className='nb';b.textContent=i;
  b.addEventListener('click',()=>{FP.number=i;document.querySelectorAll('.nb').forEach(n=>n.classList.remove('sel'));b.classList.add('sel');});
  ng.appendChild(b);}

/* ═══════════════════════════════ BILLBOARD CANVAS */
const bc=document.getElementById('bill'),bctx=bc.getContext('2d');
let W=0,H=0;
function resizeBill(){W=bc.width=innerWidth;H=bc.height=innerHeight;}
addEventListener('resize',resizeBill);

function drawBill(){
  if(sl!==2){bctx.clearRect(0,0,W,H);return;}
  const cursor=Math.floor(Date.now()/480)%2===0?'|':' ';
  const word=bSubmit?(FP.word||incoming):(bWord?bWord+cursor:incoming);
  const bx=W*.27,by=H*.18,bw=W*.46,bh=H*.28;
  bctx.save();bctx.beginPath();bctx.rect(bx,by,bw,bh);bctx.clip();
  bctx.fillStyle='rgba(4,14,26,.9)';bctx.fillRect(bx,by,bw,bh);
  // scanlines
  for(let ly=by;ly<by+bh;ly+=3){bctx.fillStyle='rgba(0,0,0,.18)';bctx.fillRect(bx,ly,bw,1.2);}
  // glow
  bctx.globalCompositeOperation='lighter';
  const ig=bctx.createRadialGradient(bx+bw/2,by+bh*.4,0,bx+bw/2,by+bh*.4,Math.max(bw,bh)*.55);
  ig.addColorStop(0,'rgba(244,200,100,.15)');ig.addColorStop(1,'rgba(244,200,100,0)');
  bctx.fillStyle=ig;bctx.fillRect(bx,by,bw,bh);
  bctx.globalCompositeOperation='source-over';
  bctx.strokeStyle='rgba(244,210,130,.58)';bctx.lineWidth=2;bctx.strokeRect(bx+1,by+1,bw-2,bh-2);
  // Word
  bctx.fillStyle='rgba(244,218,152,.98)';bctx.textAlign='center';bctx.textBaseline='middle';
  let fs=Math.round(bh*.3);const mw=bw*.84;
  do{bctx.font=`300 italic ${fs}px "Cormorant Garamond",serif`;
    if(bctx.measureText(word||'—').width<=mw)break;fs=Math.max(8,Math.round(fs*.85));}while(fs>8);
  bctx.fillText(word||'—',bx+bw/2,by+bh*.42);
  // Label
  const lfs=Math.min(Math.round(bh*.07),Math.round(bw*.024),10);
  if(lfs>=7){bctx.font=`${lfs}px "Space Mono",monospace`;bctx.fillStyle='rgba(127,236,224,.44)';bctx.fillText('CARRY THIS TO THE SURFACE',bx+bw/2,by+bh*.81);}
  bctx.restore();}

/* ═══════════════════════════════ CONCORDANCES */
function sfx(n){return n===1?'st':n===2?'nd':n===3?'rd':'th';}
function analyse(L,N,word,name,h,min,dom,iw){
  const l=(L||'E').toUpperCase(),n=parseInt(N)||1;
  const w=(word||'').toLowerCase(),nm=(name||'').trim(),nml=nm.toLowerCase();
  const lp=l.charCodeAt(0)-64,vow='aeiou';
  const p2=x=>x<10?'0'+x:String(x);
  const ds=x=>String(x).split('').reduce((a,b)=>a+parseInt(b),0);
  const cl=s=>s.replace(/\s/g,'');const c=[];
  const add=(t,wt,f)=>{if(!c.find(x=>x.t===t))c.push({t,w:wt,f});};
  if(nm&&nm[0].toUpperCase()===l)add('li',5,`You chose ${l}. ${nm} begins with ${l}. You chose the same letter twice without knowing it.`);
  if(nm&&cl(nm).length===n)add('ln',5,`You chose ${n}. ${nm} has exactly ${n} letters. You didn't know that.`);
  if(nm&&nm[n-1]&&nm[n-1].toUpperCase()===l)add('lnn',4,`${l} is the ${n}${sfx(n)} letter of ${nm}. Your number was ${n}.`);
  const nmV=nml.split('').filter(c=>vow.includes(c)).length;if(nmV===n)add('nmv',3,`${nm} has ${n} vowel${n>1?'s':''}. Your number was ${n}.`);
  if(w&&w[0].toUpperCase()===l&&!c.find(z=>z.t==='li'))add('lw',3,`You chose ${l}. You left "${w}". It begins with ${l}. You chose the same thing twice.`);
  if(w&&cl(w).length===n&&!c.find(z=>z.t==='ln'))add('wn',3,`"${w}" has ${n} letters. Your number was ${n}.`);
  const liW=(w.match(new RegExp(l.toLowerCase(),'g'))||[]).length;if(liW===n&&liW>0)add('lcw',4,`${l} appears exactly ${n} time${n>1?'s':''} in "${w}". You chose ${n}.`);
  const wV=w.split('').filter(c=>vow.includes(c)).length;if(wV===n)add('vwn',3,`"${w}" holds ${n} vowel${n>1?'s':''}. Your number was ${n}.`);
  if(lp===n)add('lp',4,`${l} is the ${n}${sfx(n)} letter of the alphabet. You chose ${n}. Same thing, two different ways.`);
  if(w&&nm&&cl(w).length===cl(nm).length&&cl(w).length===n)add('wneq',5,`"${w}" has ${n} letters. ${nm} has ${n} letters. Your number was ${n}. Three different answers. All the same.`);
  if(w&&nm&&w.includes(l.toLowerCase())&&nml.includes(l.toLowerCase()))add('lboth',4,`${l} lives inside both "${w}" and ${nm}. You chose ${l}. It was already everywhere.`);
  if(h===n)add('heq',5,`You arrived at ${p2(h)}h. Your number was ${n}. The hour was already your answer.`);
  if(ds(h)===n&&h>9)add('hrs',4,`You came at ${p2(h)}h. Its digits add to ${n}. Your number was already in the clock.`);
  if(min===n)add('meq',5,`The descent started at :${p2(min)}. Your number was ${n}. Exact.`);
  if(ds(min)===n&&min>9)add('mds',4,`You started at :${p2(min)}. Those digits sum to ${n}. Your number.`);
  if(iw&&iw[0]?.toUpperCase()===l)add('iwl',4,`"${iw}" — the word left before yours — also begins with ${l}. You chose ${l}. The chain was already set.`);
  if(iw&&cl(iw).length===n)add('iwn',4,`"${iw}" — the word before yours — has ${n} letters. Someone you never met gave you your number.`);
  if(dom===n)add('dom',4,`You came on the ${dom}${sfx(dom)}. Your number was ${n}. The date already knew.`);
  return c.sort((a,b)=>b.w-a.w).filter(x=>x.w>=3);}

function buildOracle(L,N,word,name,h,min,conns){
  const l=(L||'E').toUpperCase(),n=parseInt(N)||1;
  const w=(word||'water').toLowerCase(),nm=(name||'').trim();
  const p2=x=>x<10?'0'+x:String(x);const has=t=>conns.find(c=>c.t===t);
  if(has('li')&&has('ln')&&nm)return`You chose ${l} and ${n}. ${nm} begins with ${l} and has ${n} letters. None of this was coordinated. Or it was.`;
  if(has('wneq')&&nm)return`"${w}", ${nm}, and ${n}. Different things you offered. The same answer came back each time.`;
  if(has('li')&&has('heq')&&nm)return`At ${p2(h)}h, you chose ${l} and ${n}. ${nm} begins with ${l}. The hour, the name, the letter — they converge.`;
  if(has('ln')&&has('heq'))return`It was ${p2(h)}h. ${nm?nm+' — '+n+' letters. ':''}Your number: ${n}. The hour and the name already agreed.`;
  if(has('iwl')&&has('li')&&nm)return`The word before yours starts with ${l}. ${nm} starts with ${l}. You chose ${l}. The water had already arranged this.`;
  if(has('li')&&nm)return`You wrote ${nm}. You chose ${l}. They begin the same way. The water noticed before you did.`;
  if(has('ln')&&nm)return`You chose ${n}. ${nm} has ${n} letters. The name and the number were already the same.`;
  if(has('heq'))return`It was ${p2(h)}h. Your number was ${n}. The moment and the choice were already the same.`;
  if(has('meq'))return`The descent began at :${p2(min)}. You chose ${n}. The clock had your answer before you did.`;
  if(nm)return`${nm}. "${w}". ${n}. ${l}. Four things you offered. The water found what connects them.`;
  return`"${w}". ${n}. ${l}. You left three things. The water found the pattern you didn't put there.`;}

/* ═══════════════════════════════ GLYPH */
let gctx=null;
function initGlyph(){
  const cv=document.getElementById('glyph');
  const s=Math.round(Math.min(innerWidth*.7,innerHeight*.36,300));
  cv.width=cv.height=s;cv.style.width=cv.style.height=s+'px';
  gctx=cv.getContext('2d');}
function drawGlyph(){
  const cv=document.getElementById('glyph');if(!gctx)return;
  const gW=cv.width,gH=cv.height,cx=gW/2,cy=gH/2;
  const L=FP.letter||'E',N=FP.number||5,n=Math.max(3,Math.min(9,N)),lc=L.charCodeAt(0);
  const ph=-Math.PI/2,t=glT;
  gctx.clearRect(0,0,gW,gH);gctx.save();gctx.translate(cx,cy);
  const bgr=gctx.createRadialGradient(0,0,0,0,0,cy);bgr.addColorStop(0,'rgba(6,28,44,.97)');bgr.addColorStop(1,'rgba(1,4,10,0)');
  gctx.fillStyle=bgr;gctx.beginPath();gctx.arc(0,0,cy,0,Math.PI*2);gctx.fill();
  gctx.globalCompositeOperation='lighter';
  for(let i=0;i<6;i++){const a=i/6*Math.PI*2+t*.12;const cg=gctx.createLinearGradient(0,-cy*.18,0,-cy*.88);const op=(.024+Math.sin(t*.6+i*1.4)*.012).toFixed(3);cg.addColorStop(0,`rgba(127,220,210,${op})`);cg.addColorStop(1,'rgba(127,220,210,0)');gctx.save();gctx.rotate(a);gctx.fillStyle=cg;gctx.beginPath();gctx.moveTo(-7,0);gctx.lineTo(7,0);gctx.lineTo(3,-cy*.7);gctx.lineTo(-3,-cy*.7);gctx.closePath();gctx.fill();gctx.restore();}
  const pulse=Math.sin(t*.42)*.5+.5;const aura=gctx.createRadialGradient(0,0,cy*.3,0,0,cy*.95);aura.addColorStop(0,'rgba(255,190,40,0)');aura.addColorStop(.5,`rgba(255,190,40,${(.014+pulse*.01).toFixed(3)})`);aura.addColorStop(1,'rgba(255,190,40,0)');gctx.fillStyle=aura;gctx.fillRect(-cx,-cy,gW,gH);
  gctx.globalCompositeOperation='source-over';
  gctx.save();gctx.rotate(t*.02);gctx.shadowColor='rgba(127,220,210,.8)';gctx.shadowBlur=10;gctx.strokeStyle=`rgba(127,220,210,${(.42+Math.sin(t*.38)*.05).toFixed(3)})`;gctx.lineWidth=1.5;gctx.beginPath();gctx.arc(0,0,cy*.72,0,Math.PI*2);gctx.stroke();const tc=n*8;for(let i=0;i<tc;i++){const a=i*Math.PI*2/tc,big=i%n===0;gctx.strokeStyle=`rgba(127,220,210,${big?.55:.18})`;gctx.lineWidth=big?1.2:.5;gctx.shadowBlur=big?7:2;const r0=cy*.72,r1=r0+(big?cy*.12:cy*.07);gctx.beginPath();gctx.moveTo(Math.cos(a)*r0,Math.sin(a)*r0);gctx.lineTo(Math.cos(a)*r1,Math.sin(a)*r1);gctx.stroke();}gctx.restore();
  gctx.save();gctx.rotate(-t*.036);gctx.strokeStyle=`rgba(255,180,40,${(.25+Math.sin(t*.5)*.05).toFixed(3)})`;gctx.lineWidth=.9;gctx.shadowColor='rgba(255,180,40,.5)';gctx.shadowBlur=8;gctx.beginPath();gctx.arc(0,0,cy*.54,0,Math.PI*2);gctx.stroke();gctx.restore();
  const so=cy*.42,si=cy*.24;gctx.shadowColor='rgba(255,200,50,1)';gctx.shadowBlur=18;gctx.strokeStyle=`rgba(255,200,60,${(.52+Math.sin(t*.52)*.09).toFixed(3)})`;gctx.lineWidth=1.4;gctx.beginPath();for(let i=0;i<n*2;i++){const a=ph+i*Math.PI/n;const jit=1+Math.sin(t*.28+i*1.44+lc*.1)*.055;const r=(i%2===0)?so*jit:si*(2-jit);i===0?gctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):gctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);}gctx.closePath();gctx.stroke();gctx.fillStyle='rgba(255,180,30,.06)';gctx.shadowBlur=0;gctx.fill();
  for(let i=0;i<n;i++){const a=ph+i*Math.PI*2/n;const tx=Math.cos(a)*so,ty=Math.sin(a)*so;const wave=Math.sin(t*.35+i*1.08+lc*.05);const ca=a+Math.PI*.5*(i%2?1:-1);const cr=so*.32+Math.abs(wave)*so*.14;const cpx=tx*.52+Math.cos(ca)*cr,cpy=ty*.52+Math.sin(ca)*cr;const er=so*(1.26+wave*.1);const ex=Math.cos(a+wave*.2)*er,ey=Math.sin(a+wave*.2)*er;const tg=gctx.createLinearGradient(tx,ty,ex,ey);tg.addColorStop(0,'rgba(255,195,50,.55)');tg.addColorStop(.5,'rgba(127,220,180,.35)');tg.addColorStop(1,'rgba(127,220,180,0)');gctx.strokeStyle=tg;gctx.lineWidth=1.2;gctx.shadowColor='rgba(255,200,50,.8)';gctx.shadowBlur=8;gctx.beginPath();gctx.moveTo(tx,ty);gctx.quadraticCurveTo(cpx,cpy,ex,ey);gctx.stroke();gctx.fillStyle=`rgba(220,255,200,${(.58+wave*.12).toFixed(3)})`;gctx.shadowBlur=8;gctx.beginPath();gctx.arc(ex,ey,2.4+Math.sin(t*.68+i)*.6,0,Math.PI*2);gctx.fill();}
  gctx.shadowColor='rgba(255,200,50,.9)';gctx.shadowBlur=14;gctx.strokeStyle=`rgba(255,210,80,${(.48+Math.sin(t*.55)*.08).toFixed(3)})`;gctx.lineWidth=1.4;gctx.beginPath();gctx.arc(0,0,cy*.18,0,Math.PI*2);gctx.stroke();
  gctx.globalCompositeOperation='source-over';
  const fs=Math.round(cy*.44),ly=fs*.04,an=Math.sin(t*.72)*.06;
  gctx.font=`700 ${fs}px "Cinzel",serif`;gctx.textAlign='center';gctx.textBaseline='middle';
  gctx.shadowColor='rgba(255,150,20,.2)';gctx.shadowBlur=86;gctx.fillStyle='rgba(255,160,30,.1)';gctx.fillText(L,0,ly);
  gctx.shadowColor='rgba(255,190,40,.55)';gctx.shadowBlur=44;gctx.fillStyle=`rgba(255,195,50,${(.28+an).toFixed(3)})`;gctx.fillText(L,0,ly);
  gctx.shadowColor='rgba(255,215,70,.75)';gctx.shadowBlur=20;gctx.fillStyle=`rgba(255,215,70,${(.58+an).toFixed(3)})`;gctx.fillText(L,0,ly);
  gctx.shadowColor='rgba(255,235,100,.9)';gctx.shadowBlur=7;gctx.fillStyle=`rgba(255,232,120,${(.82+an).toFixed(3)})`;gctx.fillText(L,0,ly);
  gctx.shadowBlur=2;gctx.fillStyle='rgba(255,252,235,1)';gctx.fillText(L,0,ly);
  const na=ph+.24+t*.06;gctx.shadowColor='rgba(127,220,210,1)';gctx.shadowBlur=8;gctx.fillStyle='rgba(180,245,235,.88)';gctx.font=`300 ${Math.round(cy*.065)}px "Space Mono",monospace`;gctx.fillText(N,Math.cos(na)*cy*.17,Math.sin(na)*cy*.17);
  gctx.restore();}

/* ═══════════════════════════════ REVEAL */
function startReveal(){
  const rv=document.getElementById('rev');rv.classList.add('on');
  document.getElementById('ui').style.display='none';
  initGlyph();
  (function loop(){glT+=1/60;drawGlyph();glAF=requestAnimationFrame(loop);})();
  const conns=analyse(FP.letter,FP.number,FP.word,FP.name,FP.hour,FP.min,FP.dom,incoming);
  const oracle=buildOracle(FP.letter,FP.number,FP.word,FP.name,FP.hour,FP.min,conns);
  let d=1800;
  function app(cls,txt,at){setTimeout(()=>{const p=document.createElement('p');p.className=cls;p.textContent=txt;rv.appendChild(p);requestAnimationFrame(()=>requestAnimationFrame(()=>p.classList.add('show')));},at);}
  app('rl',oracle,d);d+=2400;
  setTimeout(()=>{const s=document.createElement('div');s.className='rsep';rv.appendChild(s);requestAnimationFrame(()=>requestAnimationFrame(()=>s.classList.add('show')));},d);d+=700;
  const good=conns.slice(0,8);
  good.forEach((c,i)=>{const at=d+i*2600;setTimeout(()=>{connDing();app('rc',c.f,0);},at);});
  const after=d+good.length*2600;
  if(good.length>0)setTimeout(()=>app('rtot',`${good.length} concordance${good.length>1?'s':''}  ·  the water knew`,0),after+300);
  setTimeout(()=>{
    cancelAnimationFrame(glAF);
    rv.style.opacity='0';
    const en=document.getElementById('enig');en.classList.add('solo');
    setTimeout(()=>document.getElementById('e1').classList.add('on'),600);
    setTimeout(()=>document.getElementById('e2').classList.add('on'),5200);
    enigmaSound();
  },after+5800);
  setTimeout(()=>{document.getElementById('wo').classList.add('on');setTimeout(()=>location.reload(),2800);},after+14000);}
