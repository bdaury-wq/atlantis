<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>ATLANTIS · New York — the water remembers</title>
<meta property="og:title" content="ATLANTIS · New York — the water remembers">
<meta property="og:description" content="Leave one thing with the water. Carry back what the last person left.">
<meta property="og:image" content="https://bdaury-wq.github.io/atlantis/03-times-square.png">
<meta property="og:url" content="https://bdaury-wq.github.io/atlantis/">
<meta name="twitter:card" content="summary_large_image">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root{--ink:#e9f5f6;--teal:#7fece0;--gold:#f4dca6}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#02060e}
body{font-family:"Cormorant Garamond",Georgia,serif;color:var(--ink);-webkit-tap-highlight-color:transparent;cursor:none}
body.lite #scan{display:none}

/* stage */
#stage{position:fixed;inset:0;z-index:1;overflow:hidden;filter:saturate(1.14) contrast(1.05)}
#stage.dive{filter:url(#water) saturate(1.14) contrast(1.05)}
body.lite #stage.dive{filter:saturate(1.14) contrast(1.05)}
.layer{position:absolute;inset:-4%;background-size:cover;background-position:center;will-change:transform,opacity;opacity:0;transform:translateZ(0)}
#Lmirror{position:absolute;inset:-4%;will-change:transform,opacity;opacity:0;transform:translateZ(0)}

/* fx overlays */
#sfx,#endWater{position:fixed;inset:0;display:block;pointer-events:none}
#sfx{z-index:26;opacity:0;transition:opacity .5s}
#endWater{z-index:23;opacity:0;transition:opacity 1.2s}
#endWater.show{opacity:1}
#fx{position:fixed;inset:0;z-index:2;pointer-events:none}
#cgrade{position:fixed;inset:0;z-index:3;pointer-events:none;mix-blend-mode:soft-light}
#grade{position:fixed;inset:0;z-index:3;pointer-events:none;background:radial-gradient(120% 100% at 50% 42%,transparent 42%,rgba(2,8,18,.62) 100%)}
#scan{position:fixed;inset:0;z-index:4;pointer-events:none;opacity:.38;mix-blend-mode:overlay;background:repeating-linear-gradient(0deg,rgba(0,0,0,0) 0,rgba(0,0,0,.2) 1px,rgba(0,0,0,0) 3px)}

/* tools */
#tools{position:fixed;top:22px;right:24px;z-index:6;display:flex;flex-direction:column;gap:11px;opacity:0;transition:opacity 1.4s;pointer-events:none}
#tools.on{opacity:1;pointer-events:auto}
.tool{width:42px;height:42px;border-radius:50%;cursor:pointer;border:1px solid rgba(127,236,224,.4);background:rgba(3,12,20,.4);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;transition:.3s}
.tool:hover{border-color:var(--teal);background:rgba(127,236,224,.12)}
.tool svg{width:18px;height:18px;fill:none;stroke:var(--teal);stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.tool.off svg{stroke:rgba(127,236,224,.4)}

/* hint */
#hint{position:fixed;left:50%;bottom:38px;transform:translateX(-50%);z-index:6;font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.38em;text-transform:uppercase;color:rgba(127,236,224,.55);opacity:0;transition:opacity 1s;pointer-events:none;text-align:center}
#hint.on{opacity:1;animation:bob 3s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(6px)}}

/* caption — minimal, poetic */
#cap{position:fixed;left:50%;bottom:18%;transform:translate(-50%,12px);z-index:6;text-align:center;max-width:min(660px,86vw);opacity:0;transition:opacity .9s ease,transform .9s ease;pointer-events:none}
#cap.show{opacity:1;transform:translate(-50%,0)}
#cap .l{font-style:italic;font-weight:300;font-size:clamp(18px,2.8vw,28px);line-height:1.36;text-shadow:0 2px 36px rgba(0,0,0,.92),0 0 28px rgba(127,236,224,.22)}

/* heart / abyss overlay */
#heart{position:fixed;inset:0;z-index:7;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:8vw;opacity:0;pointer-events:none;transition:opacity 1.2s}
#heart.show{opacity:1}
.hline{opacity:0;transform:translateY(14px);transition:opacity 1.5s ease,transform 1.5s ease;font-style:italic;font-weight:300;font-size:clamp(17px,2.5vw,23px);line-height:1.5;max-width:620px;margin-bottom:6px;text-shadow:0 2px 34px rgba(0,0,0,.9)}
.hline.show{opacity:1;transform:translateY(0)}
.hline.word{font-size:clamp(26px,5vw,50px);color:var(--gold);margin:14px 0;text-shadow:0 0 48px rgba(244,220,166,.4)}
#surfaceBtn{margin-top:28px;opacity:0;transition:opacity 1.2s;pointer-events:none}
#surfaceBtn.show{opacity:1;pointer-events:auto}

/* overlays */
.ov{position:fixed;inset:0;z-index:20;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:7vw;transition:opacity 1.4s;background:radial-gradient(130% 120% at 50% 30%,rgba(6,24,36,.28),rgba(2,6,14,.68))}
.ov.hide{opacity:0;pointer-events:none}
.kick{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.5em;text-transform:uppercase;color:var(--teal);opacity:.85}
h1{font-family:"Cinzel",serif;font-weight:700;font-size:clamp(48px,12.5vw,140px);line-height:.86;letter-spacing:.06em;margin:20px 0 0;text-shadow:0 0 80px rgba(127,236,224,.28),0 6px 50px rgba(0,0,0,.7)}
h1 .s{display:block;font-family:"Cormorant Garamond",serif;font-style:italic;font-weight:300;font-size:.22em;letter-spacing:.28em;color:var(--gold);margin-top:22px;text-shadow:none}
.tag{max-width:520px;font-size:clamp(16px,2.1vw,19px);font-weight:300;line-height:1.55;color:rgba(233,245,246,.86);margin:28px auto 0}
.btn{margin-top:38px;pointer-events:auto;cursor:pointer;background:none;font-family:"Space Mono",monospace;font-size:12px;letter-spacing:.32em;text-transform:uppercase;color:var(--ink);border:1px solid rgba(127,236,224,.45);padding:17px 40px;border-radius:2px;transition:.45s;backdrop-filter:blur(3px)}
.btn:hover{background:rgba(127,236,224,.1);border-color:var(--teal);letter-spacing:.4em;box-shadow:0 0 48px rgba(127,236,224,.22)}
.foot{position:absolute;bottom:22px;font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.32em;color:rgba(233,245,246,.32)}
#offer .ofield{width:min(380px,82vw);margin-top:28px}
#oword{width:100%;background:rgba(3,12,20,.4);border:none;border-bottom:1px solid rgba(127,236,224,.4);padding:14px 18px;color:var(--ink);font-family:"Cormorant Garamond",serif;font-style:italic;font-size:18px;outline:none;transition:.3s;text-align:center;background:transparent}
#oword::placeholder{color:rgba(127,236,224,.38);font-style:italic}
#oword:focus{border-bottom-color:var(--teal);box-shadow:0 2px 22px rgba(127,236,224,.14)}
#oskip{margin-top:20px;pointer-events:auto;cursor:pointer;background:none;border:none;font-family:"Space Mono",monospace;font-size:10px;letter-spacing:.22em;text-transform:uppercase;color:rgba(233,245,246,.35);text-decoration:underline;text-underline-offset:4px}
#oskip:hover{color:rgba(233,245,246,.6)}
#end{background:transparent!important;z-index:24}
#again{pointer-events:auto;cursor:pointer;background:rgba(3,12,20,.35);border:1px solid rgba(127,236,224,.5);color:var(--ink);font-family:"Space Mono",monospace;font-size:13px;letter-spacing:.38em;text-transform:uppercase;padding:20px 48px;border-radius:2px;transition:.45s;backdrop-filter:blur(6px);margin-top:0}
#again:hover{background:rgba(127,236,224,.1);border-color:var(--teal);box-shadow:0 0 52px rgba(127,236,224,.28)}
#load{position:fixed;inset:0;z-index:30;display:flex;align-items:center;justify-content:center;background:#02060e;transition:opacity 1s}
#load.hide{opacity:0;pointer-events:none}
#load .l{font-family:"Space Mono",monospace;font-size:11px;letter-spacing:.4em;text-transform:uppercase;color:rgba(127,236,224,.6);animation:bob 2s ease-in-out infinite}
@media(prefers-reduced-motion:reduce){#hint.on,#load .l{animation:none}#scan{display:none}}
</style>
</head>
<body>

<div id="stage">
  <div class="layer" id="L0" style="background-image:url('01-surface.png')"></div>
  <div class="layer" id="L1" style="background-image:url('05-flood.jpg')"></div>
  <div class="layer" id="L2" style="background-image:url('02-descent.png')"></div>
  <canvas id="Lmirror"></canvas>
  <div class="layer" id="L3" style="background-image:url('03-times-square.png')"></div>
  <div class="layer" id="L4" style="background-image:url('06-bridge.png')"></div>
  <div class="layer" id="L5" style="background-image:url('04-garden.png')"></div>
</div>

<canvas id="sfx"></canvas>
<canvas id="endWater"></canvas>
<canvas id="fx"></canvas>
<div id="cgrade"></div><div id="grade"></div><div id="scan"></div>

<div id="tools">
  <button class="tool" id="snd" aria-label="sound"><svg id="sndIcon" viewBox="0 0 24 24"></svg></button>
  <button class="tool" id="lite" aria-label="effects"><svg viewBox="0 0 24 24"><path d="M4 14c2 2 4 2 6 0s4-2 6 0 4 2 4 0"/><path d="M4 9c2 2 4 2 6 0s4-2 6 0 4 2 4 0"/></svg></button>
</div>
<div id="hint">hold to descend</div>
<div id="cap"><div class="l" id="capL"></div></div>

<div id="heart">
  <button id="surfaceBtn" class="btn">Surface</button>
</div>

<div class="ov hide" id="start">
  <div class="kick">New York · the water remembers</div>
  <h1>ATLANTIS<span class="s">what the city left behind</span></h1>
  <p class="tag">Everyone who comes down here leaves something with the water. You will too.</p>
  <button class="btn" id="go">Descend</button>
  <div class="foot">atlantisnyc.com</div>
</div>

<div class="ov hide" id="offer">
  <p class="tag" style="font-size:clamp(16px,2.2vw,20px);opacity:.85">One word.<br>The water will keep it.</p>
  <div class="ofield"><input id="oword" type="text" maxlength="32" placeholder="..." autocomplete="off" spellcheck="false"/></div>
  <button class="btn" id="osubmit" style="margin-top:22px">Leave it here</button>
  <button id="oskip">descend without a word</button>
</div>

<div class="ov hide" id="end">
  <button class="btn" id="again">Dive again</button>
</div>

<div id="load"><div class="l">the water is rising…</div></div>

<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <filter id="water" x="-5%" y="-5%" width="110%" height="110%">
    <feTurbulence type="fractalNoise" baseFrequency="0.007 0.012" numOctaves="1" seed="7" result="n">
      <animate attributeName="baseFrequency" dur="22s" repeatCount="indefinite" values="0.007 0.012;0.009 0.015;0.007 0.012"/>
    </feTurbulence>
    <feDisplacementMap id="disp" in="SourceGraphic" in2="n" scale="0" xChannelSelector="R" yChannelSelector="G"/>
  </filter>
</defs></svg>

<script async src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script async src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

<script>
/* ============================================================
   FIREBASE — paste your config to make the chain real.
   Without it: local demo mode (localStorage fallback).
   ============================================================ */
const FIREBASE_CONFIG={apiKey:"YOUR_API_KEY",authDomain:"YOUR_PROJECT.firebaseapp.com",projectId:"YOUR_PROJECT"};
let fdb=null;
try{if(typeof firebase!=='undefined'&&FIREBASE_CONFIG.apiKey!=='YOUR_API_KEY'){firebase.initializeApp(FIREBASE_CONFIG);fdb=firebase.firestore();}}catch(e){fdb=null;}
const SEED_WORD="i'm still here";
function sanitize(w){return(w||'').replace(/\s+/g,' ').trim().slice(0,32);}
async function fetchLastWord(){if(fdb){try{const s=await fdb.collection('traces').orderBy('ts','desc').limit(1).get();if(!s.empty)return s.docs[0].data().word||SEED_WORD;}catch(e){}}try{const lw=localStorage.getItem('atlantis_last_word');if(lw)return lw;}catch(e){}return SEED_WORD;}
async function storeWord(word){if(!word)return;if(fdb){try{await fdb.collection('traces').add({word,ts:firebase.firestore.FieldValue.serverTimestamp()});}catch(e){}}try{localStorage.setItem('atlantis_last_word',word);}catch(e){}}
let incomingWord=SEED_WORD;
fetchLastWord().then(w=>{incomingWord=w;});

/* ============================================================ CORE STATE */
const RM=matchMedia('(prefers-reduced-motion:reduce)').matches;
let LITE=false,started=false,ended=false,heartShown=false,heartScorePlaying=false;
let W,H,DPR;
const stage=document.getElementById('stage');
const disp=document.getElementById('disp');
const fx=document.getElementById('fx'),fctx=fx.getContext('2d');
const cgrade=document.getElementById('cgrade');
const L=[0,1,2,3,4,5].map(i=>document.getElementById('L'+i));

/* colour grade ramp */
const GRADE=[[0,[36,92,92]],[0.35,[20,58,86]],[0.62,[10,30,58]],[0.82,[12,16,30]],[1,[46,26,26]]];
function gradeCol(d){d=Math.max(0,Math.min(1,d));for(let i=0;i<GRADE.length-1;i++){const a=GRADE[i][0],c0=GRADE[i][1],b=GRADE[i+1][0],c1=GRADE[i+1][1];if(d>=a&&d<=b){const t=(d-a)/(b-a);return[c0[0]+(c1[0]-c0[0])*t|0,c0[1]+(c1[1]-c0[1])*t|0,c0[2]+(c1[2]-c0[2])*t|0];}}return GRADE[GRADE.length-1][1];}
function smoothstep(e){return e*e*e*(e*(e*6-15)+10);}

/* image anchors — 6 images across 0-0.85, Heart starts at 1.0 */
const N_IMG=6;const IMG_SEG=0.17;
const ANCHORS=[0,.17,.34,.51,.68,.85];

/* depth fragments — brief poetic, no chapter numbers */
const FRAGS=[
  [0.02,"The city the water kept first."],
  [0.19,"The tide that came for everything."],
  [0.36,"Where the avenues used to be."],
  [0.52,"It refused to turn off its signs."],
  [0.70,"A shore no one crosses anymore."],
  [0.87,"Still here. Still lit."],
];
let fragIdx=0,capTimer=0;

/* ============================================================ VELOCITY DESCENT */
let depth=0,dVel=0,pushing=false,T=0,t0=0,prevDepth=0,vel=0,diveStep=-1;
const GRAVITY=0.014;  // constant slow pull (units/s)
const PUSH_IMPULSE=0.07; // single tap
const PUSH_HOLD=0.09;    // extra/s while holding
const DRAG_PER_SEC=0.82; // velocity decay
const MAX_VEL=0.28;

function applyImpulse(){dVel=Math.min(dVel+PUSH_IMPULSE,MAX_VEL);}
function applyRise(){dVel=Math.max(dVel-PUSH_IMPULSE*.7,-0.06);}
function clampDepth(){depth=Math.max(0,Math.min(1,depth));}

/* input */
let tsY=0,tDown=0,lastTap=0;
function onDown(y){pushing=true;tsY=y;tDown=performance.now();}
function onUp(y,wasQuick){pushing=false;if(wasQuick)applyImpulse();}
stage.addEventListener('mousedown',e=>{if(!started||ended)return;onDown(e.clientY);});
addEventListener('mouseup',e=>{if(!started||ended)return;const q=performance.now()-tDown<220;onUp(e.clientY,q);});
addEventListener('mousemove',e=>{tpx=e.clientX/W;tpy=e.clientY/H;});
stage.addEventListener('touchstart',e=>{if(!started||ended)return;onDown(e.touches[0].clientY);},{passive:true});
stage.addEventListener('touchend',e=>{if(!started||ended)return;const q=performance.now()-tDown<220;const dy=tsY-e.changedTouches[0].clientY;if(dy>55)applyImpulse();else if(dy<-35)applyRise();else if(q)applyImpulse();pushing=false;},{passive:true});
addEventListener('wheel',e=>{if(!started||ended)return;dVel+=e.deltaY>0?PUSH_IMPULSE*.6:-PUSH_IMPULSE*.4;},{passive:true});
addEventListener('keydown',e=>{if(!started||ended)return;if(document.activeElement?.tagName==='INPUT')return;if(['arrowdown','s',' '].includes(e.key.toLowerCase())){applyImpulse();e.preventDefault();}if(['arrowup','w'].includes(e.key.toLowerCase())){applyRise();e.preventDefault();}});
let tpx=0.5,tpy=0.5,px=0.5,py=0.5;

/* ============================================================ MIRROR (city reflection) */
const mirrorCanvas=document.getElementById('Lmirror');
const mctx=mirrorCanvas.getContext('2d');
let mirrorReady=false,mirrorGeo=null,mirrorT=0;

function resizeMirror(){const d=Math.min(devicePixelRatio||1,1.5);mirrorCanvas.width=(W*1.08)*d;mirrorCanvas.height=(H*1.08)*d;mirrorCanvas.style.width=(W*1.08)+'px';mirrorCanvas.style.height=(H*1.08)+'px';mctx.setTransform(d,0,0,d,0,0);}

async function initMirror(){
  const tryJSON=async u=>{const r=await fetch(u,{cache:'no-store'});if(!r.ok)throw 0;return r.json();};
  let g=null;
  for(const[url,parse]of[
    ['https://ipwho.is/',d=>d?.latitude?{lat:d.latitude,lon:d.longitude,city:d.city}:null],
    ['https://get.geojs.io/v1/ip/geo.json',d=>d?.latitude?{lat:+d.latitude,lon:+d.longitude,city:d.city}:null],
    ['https://freeipapi.com/api/json',d=>d?.latitude?{lat:+d.latitude,lon:+d.longitude,city:d.cityName}:null]
  ]){if(g)break;try{const d=await tryJSON(url);const p=parse(d);if(p&&isFinite(p.lat))g=p;}catch(e){}}
  if(!g)g={lat:40.71,lon:-74.01,city:null}; // fallback to NYC if geo fails
  mirrorGeo=g;
  buildProceduralCity(g.lat,g.lon);
}

function buildProceduralCity(lat,lon){
  const mw=W*1.08,mh=H*1.08;
  mirrorCanvas.style.width=mw+'px';mirrorCanvas.style.height=mh+'px';
  // seed from real coordinates → same city always looks the same
  let s=(Math.abs(lat*10000)|0)*397+(Math.abs(lon*10000)|0)*173;
  const rnd=()=>{s=(s*1664525+1013904223)>>>0;return s/4294967296;};
  // dark water background
  const bg=mctx.createLinearGradient(0,0,0,mh);
  bg.addColorStop(0,'#080f1c');bg.addColorStop(1,'#050a14');
  mctx.fillStyle=bg;mctx.fillRect(0,0,mw,mh);
  // city block grid (seeded)
  const ax=[],ay=[];let x=0;while(x<mw+50){ax.push(x);x+=40+rnd()*48;}
  let y=0;while(y<mh+50){ay.push(y);y+=36+rnd()*40;}
  // one river channel
  const riverX=mw*(0.52+rnd()*0.22);
  for(let i=0;i<ax.length-1;i++)for(let j=0;j<ay.length-1;j++){
    const bx=ax[i]+4,by=ay[j]+4,bw=ax[i+1]-ax[i]-8,bh=ay[j+1]-ay[j]-8;
    if(bw<6||bh<6)continue;const cxv=bx+bw/2;
    if(Math.abs(cxv-riverX-Math.sin(by*0.018)*36)<28)continue;
    const sh=22+rnd()*28;
    mctx.fillStyle=`rgb(${sh*.5|0},${sh*.75|0},${sh|0})`;mctx.fillRect(bx,by,bw,bh);
    mctx.fillStyle='rgba(140,210,225,0.18)';mctx.fillRect(bx,by,bw,1.4);mctx.fillRect(bx,by,1.4,bh);
    const wn=Math.floor(bw*bh/42);
    for(let w=0;w<wn;w++){if(rnd()<0.38)continue;
      const wx=bx+2+rnd()*(bw-4),wy=by+2+rnd()*(bh-4);
      mctx.fillStyle=rnd()<0.64?`rgba(255,200,120,${0.55+rnd()*.4})`:`rgba(140,230,240,${0.55+rnd()*.4})`;
      mctx.fillRect(wx,wy,1.5+rnd()*.8,1.5+rnd()*.8);}
  }
  // glowing street grid (lighter blending)
  mctx.save();mctx.globalCompositeOperation='lighter';mctx.shadowColor='rgba(100,220,220,0.9)';
  ax.forEach(xx=>{mctx.shadowBlur=7;mctx.strokeStyle='rgba(80,196,206,0.12)';mctx.lineWidth=1.1;mctx.beginPath();mctx.moveTo(xx,0);mctx.lineTo(xx,mh);mctx.stroke();});
  ay.forEach(yy=>{mctx.shadowBlur=7;mctx.strokeStyle='rgba(80,196,206,0.09)';mctx.lineWidth=1.1;mctx.beginPath();mctx.moveTo(0,yy);mctx.lineTo(mw,yy);mctx.stroke();});
  // diagonal avenue
  mctx.strokeStyle='rgba(120,228,228,0.16)';mctx.lineWidth=3;mctx.shadowBlur=10;
  mctx.beginPath();mctx.moveTo(mw*.12,-20);mctx.lineTo(mw*.74,mh+20);mctx.stroke();
  mctx.restore();
  // river shimmer
  mctx.save();mctx.globalCompositeOperation='lighter';mctx.strokeStyle='rgba(60,140,170,0.13)';mctx.lineWidth=48;mctx.beginPath();mctx.moveTo(riverX,0);for(let yy=0;yy<mh;yy+=22)mctx.lineTo(riverX+Math.sin(yy*0.018)*36,yy);mctx.stroke();mctx.restore();
  // teal underwater overlay
  mctx.globalCompositeOperation='multiply';const ov=mctx.createLinearGradient(0,0,0,mh);ov.addColorStop(0,'rgba(8,44,72,0.88)');ov.addColorStop(1,'rgba(2,10,24,0.96)');mctx.fillStyle=ov;mctx.fillRect(0,0,mw,mh);
  // bioluminescent shimmer
  mctx.globalCompositeOperation='lighter';for(let i=0;i<6;i++){const cx=mw*(.12+.16*i)+rnd()*80,cy=mh*(.25+rnd()*.5);const rr=mctx.createRadialGradient(cx,cy,0,cx,cy,100+rnd()*60);rr.addColorStop(0,'rgba(80,200,190,0.055)');rr.addColorStop(1,'rgba(80,200,190,0)');mctx.fillStyle=rr;mctx.fillRect(0,0,mw,mh);}
  mctx.globalCompositeOperation='source-over';
  mirrorReady=true;
}

/* ============================================================ PARTICLES + RESIZE */
let snow=[],abyss=[],bub=[];
function resize(){DPR=Math.min(devicePixelRatio||1,1.5);W=innerWidth;H=innerHeight;
  fx.width=W*DPR;fx.height=H*DPR;fx.style.width=W+'px';fx.style.height=H+'px';fctx.setTransform(DPR,0,0,DPR,0,0);
  snow=[];const n=RM?50:130;for(let i=0;i<n;i++)snow.push({x:Math.random()*W,y:Math.random()*H,z:.3+Math.random(),s:.4+Math.random()*1.8});
  abyss=[];const na=RM?10:26;for(let i=0;i<na;i++)abyss.push({x:Math.random()*W,y:Math.random()*H,r:3+Math.random()*16,life:Math.random(),spd:0.09+Math.random()*0.14,vy:-(4+Math.random()*12),hue:Math.random()<0.62?'127,236,224':'180,210,255'});
  resizeMirror();sfResize();ewResize();}
addEventListener('resize',resize);

/* caption */
function showCap(txt){document.getElementById('capL').textContent=txt;document.getElementById('cap').classList.add('show');capTimer=3.8;}
function tickCap(dt){if(capTimer>0){capTimer-=dt;if(capTimer<=0)document.getElementById('cap').classList.remove('show');}}
function checkFrags(){if(!started||fragIdx>=FRAGS.length)return;if(depth>=FRAGS[fragIdx][0]){showCap(FRAGS[fragIdx][1]);fragIdx++;}}

/* ============================================================ SOUND ENGINE */
let A=null,muted=false,AU={},submergedOnce=false,nextMotifT=0;
function osc(t,f){const o=A.createOscillator();o.type=t;o.frequency.value=f;return o;}
function gn(v){const g=A.createGain();g.gain.value=v;return g;}
function makeImpulse(dur,decay){const r=A.sampleRate,len=r*dur,b=A.createBuffer(2,len,r);for(let c=0;c<2;c++){const d=b.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,decay);}return b;}
function makeNoise(dur){const len=A.sampleRate*dur,b=A.createBuffer(1,len,A.sampleRate),d=b.getChannelData(0);for(let i=0;i<len;i++)d[i]=Math.random()*2-1;return b;}

function initAudio(){if(A)return;A=new (window.AudioContext||window.webkitAudioContext)();
  AU.master=gn(0);AU.master.connect(A.destination);AU.master.gain.setTargetAtTime(0.85,A.currentTime,1.6);
  const conv=A.createConvolver();conv.buffer=makeImpulse(5.2,2.3);const wet=gn(.4),dry=gn(.86);
  AU.bus=gn(1);AU.bus.connect(dry);dry.connect(AU.master);AU.bus.connect(conv);conv.connect(wet);wet.connect(AU.master);
  AU.filt=A.createBiquadFilter();AU.filt.type='lowpass';AU.filt.frequency.value=600;AU.filt.connect(AU.bus);
  const cur=A.createBufferSource();cur.buffer=makeNoise(3.0);cur.loop=true;
  const cf=A.createBiquadFilter();cf.type='bandpass';cf.frequency.value=420;cf.Q.value=0.6;
  AU.curG=gn(0);cur.connect(cf);cf.connect(AU.curG);AU.curG.connect(AU.filt);cur.start();
  const lfo=osc('sine',0.045);const lfoG=gn(220);lfo.connect(lfoG);lfoG.connect(cf.frequency);lfo.start();
  AU.subG=gn(0);AU.subG.connect(AU.filt);
  [36.0,36.9].forEach(f=>{const o=osc('sine',f);const g=gn(.5);o.connect(g);g.connect(AU.subG);o.start();});
  AU.surfaceG=gn(0);AU.surfaceG.connect(AU.master);
  const wind=A.createBufferSource();wind.buffer=makeNoise(2.6);wind.loop=true;const wlp=A.createBiquadFilter();wlp.type='lowpass';wlp.frequency.value=520;const whp=A.createBiquadFilter();whp.type='highpass';whp.frequency.value=130;const wg=gn(.5);wind.connect(wlp);wlp.connect(whp);whp.connect(wg);wg.connect(AU.surfaceG);wind.start();
  const sir=osc('sine',740);const slfo=osc('sine',0.07);const slfoG=gn(40);slfo.connect(slfoG);slfoG.connect(sir.frequency);const sirG=gn(.014);sir.connect(sirG);sirG.connect(AU.surfaceG);sir.start();slfo.start();
  AU.surfaceG.gain.setTargetAtTime(.4,A.currentTime,2.5);
  setIcon();}

const MOTIF=[440.0,349.23,293.66,220.0];
function motif(f,I){if(!A)return;const o=osc('triangle',f),o2=osc('triangle',f*2.001);const g=gn(0),g2=gn(0);const lp=A.createBiquadFilter();lp.type='lowpass';lp.frequency.value=2200;const t=A.currentTime;o.connect(g);g.connect(lp);o2.connect(g2);g2.connect(lp);lp.connect(AU.bus);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.1*I,t+.04);g.gain.exponentialRampToValueAtTime(.0008,t+2.4);g2.gain.setValueAtTime(0,t);g2.gain.linearRampToValueAtTime(.026*I,t+.04);g2.gain.exponentialRampToValueAtTime(.0006,t+1.8);o.start(t);o2.start(t);o.stop(t+2.5);o2.stop(t+2.5);}
function motifTick(){if(!A||A.state!=='running')return;const now=A.currentTime;if(now<nextMotifT)return;const near=depth;const sparse=2.8+Math.random()*(4.0-near*2.2);nextMotifT=now+sparse;if(depth>.05)motif(MOTIF[Math.floor(Math.random()*MOTIF.length)]*(Math.random()<.18?2:1),.4+.5*near);}

function submerge(){if(!A)return;const t=A.currentTime+.02;const s=A.createBufferSource();s.buffer=makeNoise(2.0);const lp=A.createBiquadFilter();lp.type='lowpass';lp.frequency.setValueAtTime(7200,t);lp.frequency.exponentialRampToValueAtTime(160,t+1.4);const g=gn(0);s.connect(lp);lp.connect(g);g.connect(AU.bus);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.5,t+.14);g.gain.exponentialRampToValueAtTime(.001,t+1.9);s.start(t);s.stop(t+2);const o=osc('sine',58);const og=gn(0);o.connect(og);og.connect(AU.bus);og.gain.setValueAtTime(0,t);og.gain.linearRampToValueAtTime(.34,t+.1);og.gain.exponentialRampToValueAtTime(.001,t+1.3);o.start(t);o.stop(t+1.4);AU.surfaceG.gain.linearRampToValueAtTime(0,t+.08);}

/* deep tones — no game-y pings */
function deepTone(freq,dur,vol){if(!A||A.state!=='running')return;const t=A.currentTime;const o=osc('triangle',freq);const lp=A.createBiquadFilter();lp.type='lowpass';lp.frequency.value=900;const g=gn(0);o.connect(lp);lp.connect(g);g.connect(AU.bus);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+.35);g.gain.exponentialRampToValueAtTime(.0006,t+dur);o.start(t);o.stop(t+dur+.1);}
function wordDepart(){if(!A)return;const t=A.currentTime+.1;[55.0,73.4,82.4].forEach((f,i)=>{const o=osc('sawtooth',f);const lp=A.createBiquadFilter();lp.type='lowpass';lp.frequency.value=320;const g=gn(0);o.connect(lp);lp.connect(g);g.connect(AU.bus);const tt=t+i*.55;g.gain.setValueAtTime(0,tt);g.gain.linearRampToValueAtTime(.044,tt+.5);g.gain.exponentialRampToValueAtTime(.0006,tt+5);o.start(tt);o.stop(tt+5.1);});}
function wordArrive(){if(!A)return;const t=A.currentTime+.1;[110,138.6,164.8].forEach((f,i)=>{const o=osc('triangle',f);const lp=A.createBiquadFilter();lp.type='lowpass';lp.frequency.value=600;const g=gn(0);o.connect(lp);lp.connect(g);g.connect(AU.bus);const tt=t+i*.7;g.gain.setValueAtTime(0,tt);g.gain.linearRampToValueAtTime(.05,tt+.6);g.gain.exponentialRampToValueAtTime(.0006,tt+5.5);o.start(tt);o.stop(tt+5.6);});}

/* Batman Begins-style Heart score */
function heartScore(){if(!A||heartScorePlaying)return;heartScorePlaying=true;const t=A.currentTime+.5;
  const conv=A.createConvolver();conv.buffer=makeImpulse(7.0,1.6);const cvG=gn(.62);conv.connect(cvG);cvG.connect(AU.master);
  [[36.71,0],[29.14,2.8],[32.70,5.8],[24.5,9.2]].forEach(([f,delay])=>{const o=osc('sawtooth',f);const lp=A.createBiquadFilter();lp.type='lowpass';lp.frequency.value=260;const g=gn(0);o.connect(lp);lp.connect(g);g.connect(conv);g.connect(AU.filt);const tt=t+delay;g.gain.setValueAtTime(0,tt);g.gain.linearRampToValueAtTime(.22,tt+2.2);g.gain.linearRampToValueAtTime(.0006,tt+7);o.start(tt);o.stop(tt+7.5);});
  [440,493.9,554.4].forEach((f,i)=>{const o=osc('sawtooth',f);const lp=A.createBiquadFilter();lp.type='lowpass';lp.frequency.value=1800;const g=gn(0);o.connect(lp);lp.connect(g);g.connect(conv);const tt=t+i*1.8+1.4;g.gain.setValueAtTime(0,tt);g.gain.linearRampToValueAtTime(.022,tt+1.4);g.gain.exponentialRampToValueAtTime(.0006,tt+6);o.start(tt);o.stop(tt+6.1);});
  setTimeout(()=>{if(!A)return;const t2=A.currentTime;const o=osc('triangle',36.71);const g=gn(0);o.connect(g);g.connect(conv);g.connect(AU.filt);g.gain.setValueAtTime(0,t2);g.gain.linearRampToValueAtTime(.28,t2+.04);g.gain.exponentialRampToValueAtTime(.0006,t2+6);o.start(t2);o.stop(t2+6.5);},4200);}

function audioTick(){if(!A||A.state!=='running')return;const now=A.currentTime;const d=depth;const heart=d>=1;
  AU.curG.gain.setTargetAtTime(heart?.015:.06+.12*d,now,.7);
  AU.subG.gain.setTargetAtTime(heart?.08:.06+.16*d,now,.7);
  AU.filt.frequency.setTargetAtTime(heart?800:420+1800*d,now,.8);
  motifTick();}

const ICONS={on:'<path d="M4 9v6h4l5 4V5L8 9H4z"/><path d="M16 8c1.5 1.2 1.5 6.8 0 8"/><path d="M18.5 6c3 2.2 3 9.8 0 12"/>',off:'<path d="M4 9v6h4l5 4V5L8 9H4z"/><path d="M16 9l5 6M21 9l-5 6"/>'};
function setIcon(){document.getElementById('sndIcon').innerHTML=muted?ICONS.off:ICONS.on;}
function unlockAudio(){try{if(!A)initAudio();if(A&&A.state==='suspended')A.resume();const b=A.createBuffer(1,1,22050),s=A.createBufferSource();s.buffer=b;s.connect(A.destination);s.start(0);}catch(e){}}
document.getElementById('snd').addEventListener('click',e=>{e.stopPropagation();unlockAudio();muted=!muted;if(A)AU.master.gain.setTargetAtTime(muted?0:.85,A.currentTime,.3);setIcon();});
document.getElementById('lite').addEventListener('click',function(e){e.stopPropagation();LITE=!LITE;document.body.classList.toggle('lite',LITE);this.classList.toggle('off',LITE);diveStep=-1;});

/* ============================================================ MAIN RENDER LOOP */
/* intro / word-sink / mirror-beat state */
let introActive=false,introT=0;
let wordSinkActive=false,wordSinkT=0,wordSinkPending=null;
let mirrorBeat=false,mirrorBeatT=0,mirrorBeatDone=false;

function frame(ts){requestAnimationFrame(frame);
  if(!t0)t0=ts;const dt=Math.min(.05,(ts-t0)/1000);t0=ts;T+=dt;
  prevDepth=depth;

  /* intro cinematic — runs before first interaction */
  if(introActive&&!started){
    introT+=dt;
    L[0].style.opacity='1';L[0].style.transform='scale(1.04)';L[0].style.zIndex='1';
    if(introT>5&&document.getElementById('start').classList.contains('hide')){
      document.getElementById('start').classList.remove('hide');}
  }

  /* word sink timer */
  if(wordSinkActive){wordSinkT+=dt;if(wordSinkT>2.8){wordSinkActive=false;proceedFromOffer(wordSinkPending);wordSinkPending=null;}}

  if(started&&!ended){
    // velocity system
    if(pushing)dVel=Math.min(dVel+PUSH_HOLD*dt,MAX_VEL);
    dVel=dVel*Math.pow(DRAG_PER_SEC,dt)+GRAVITY*dt;
    // brake hard near Heart
    if(depth>0.94)dVel*=Math.pow(0.3,dt);
    depth=Math.max(0,Math.min(1,depth+dVel*dt));
    vel=Math.abs(depth-prevDepth)/Math.max(dt,.001);
    // first submersion
    if(depth>.22&&!submergedOnce){submergedOnce=true;submerge();}
    // hint fade
    if(depth>.05)document.getElementById('hint').classList.remove('on');
    // depth fragments
    checkFrags();
    // trigger Heart
    if(depth>=0.999&&!heartShown)enterHeart();
    // smooth target parallax
    px+=(tpx-px)*(1-Math.exp(-dt*3));py+=(tpy-py)*(1-Math.exp(-dt*3));
  }

  /* image layers */
  for(let i=0;i<N_IMG;i++){const dd=Math.abs(depth-ANCHORS[i]),e=1-Math.min(1,dd/IMG_SEG);const op=smoothstep(e);
    const zoom=1.05+(depth-ANCHORS[i])*.6+Math.sin(T*.08+i)*.003;const ty=(depth-ANCHORS[i])*38;
    const px_=(px-.5)*-18*(1+i*.1);
    L[i].style.opacity=op.toFixed(3);L[i].style.transform=`scale(${Math.max(1,zoom).toFixed(4)}) translate(${px_.toFixed(1)}px,${ty.toFixed(1)}px)`;L[i].style.zIndex=Math.round(op*100);}

  /* mirror layer — porthole beat when geo is ready */
  if(mirrorReady&&started&&!ended&&!mirrorBeatDone&&depth>0.52&&depth<0.62){mirrorBeat=true;mirrorBeatDone=true;dVel=0;}
  if(mirrorBeat){mirrorBeatT+=dt;dVel=Math.min(dVel,0.001);if(mirrorBeatT>6.5){mirrorBeat=false;}}
  mirrorCanvas.style.opacity='0'; // drawn via fx canvas during beat, hidden otherwise

  /* water filter */
  const sub=Math.min(1,Math.max(0,(depth-.14)/.12));
  if(sub>.01)stage.classList.add('dive');else stage.classList.remove('dive');
  const step=LITE?0:(sub<.04?0:sub<.6?1:2);
  if(step!==diveStep){diveStep=step;disp.setAttribute('scale',[0,7,12][step]);}
  {const gc=gradeCol(depth);cgrade.style.background='rgba('+gc[0]+','+gc[1]+','+gc[2]+','+(0.1+0.24*Math.min(1,depth*1.1)).toFixed(3)+')';}

  drawFX(dt,sub);audioTick();tickCap(dt);
}

/* ============================================================ DRAW FX */
function drawFX(dt,sub){fctx.clearRect(0,0,W,H);

  /* ---- INTRO CINEMATIC: water rising over the city ---- */
  if(introActive&&!started&&introT>0){
    const wl=Math.max(0,1-introT/3.6);const waterY=H*wl;
    // rising water mass
    if(wl<1){const wg=fctx.createLinearGradient(0,waterY-60,0,H);wg.addColorStop(0,'rgba(4,16,36,0)');wg.addColorStop(.08,`rgba(4,20,44,${Math.min(.94,introT/3.6*.9)})`);wg.addColorStop(1,'rgba(2,8,18,0.98)');fctx.fillStyle=wg;fctx.fillRect(0,waterY-60,W,H-(waterY-60));}
    // waterline shimmer
    if(wl>.01&&wl<.99){const shimY=waterY;fctx.globalCompositeOperation='lighter';const sg=fctx.createLinearGradient(0,shimY-24,0,shimY+24);sg.addColorStop(0,'rgba(127,236,224,0)');sg.addColorStop(.5,`rgba(127,236,224,${.18+Math.sin(T*4)*.06})`);sg.addColorStop(1,'rgba(127,236,224,0)');fctx.fillStyle=sg;fctx.fillRect(0,shimY-24,W,48);}
    fctx.globalCompositeOperation='source-over';
    // ATLANTIS title emerges from water, half-submerged
    if(introT>1.0){const ta=Math.min(1,(introT-1.0)/.9);const fs=Math.round(Math.min(W*.18,H*.13));const ty=waterY-fs*.1;fctx.globalAlpha=ta;fctx.font=`700 ${fs}px "Cinzel",serif`;fctx.fillStyle='rgba(233,245,246,.95)';fctx.textAlign='center';fctx.textBaseline='middle';fctx.fillText('ATLANTIS',W/2,ty);fctx.globalAlpha=1;}
  }

  /* ---- WORD SINK: your word dissolves into the deep ---- */
  if(wordSinkActive&&wordSinkPending){
    const fi=Math.min(1,wordSinkT/.28);const sk=Math.max(0,(wordSinkT-.32)/2.4);const wa=fi*(1-sk*sk);const wy=H*.42+sk*H*.44;const bk=Math.round(sk*10);
    fctx.globalCompositeOperation='source-over';fctx.fillStyle=`rgba(2,8,18,${fi*.84})`;fctx.fillRect(0,0,W,H);
    fctx.globalAlpha=wa;if(bk>0)fctx.filter=`blur(${bk}px)`;
    fctx.font=`300 italic ${Math.round(Math.min(W*.18,H*.12))}px "Cormorant Garamond",serif`;
    fctx.fillStyle='rgba(233,245,246,.96)';fctx.textAlign='center';fctx.textBaseline='middle';
    fctx.fillText(wordSinkPending,W/2,wy);fctx.filter='none';fctx.globalAlpha=1;
  }

  /* ---- MIRROR PORTHOLE: choreographed city reveal ---- */
  if(mirrorBeat&&mirrorReady){
    const bt=mirrorBeatT;
    const beatA=bt<1?bt:bt<5.5?1:Math.max(0,1-(bt-5.5));
    // draw mirror image inside a growing circle (porthole)
    if(beatA>.01){const pR=Math.min(W,H)*(.32+Math.sin(Math.min(1,bt)*Math.PI)*.04)*beatA;
      fctx.save();fctx.globalCompositeOperation='source-over';fctx.beginPath();fctx.arc(W/2,H/2,pR,0,7);fctx.clip();
      // slight ripple distortion on the mirror
      for(let row=0;row<H;row+=4){const shift=Math.sin(T*1.2+row*.025)*3*beatA;fctx.drawImage(mirrorCanvas,shift,-H*.04,W*1.08,H*1.08+row*.0,0,row,W,4);}
      fctx.restore();
      // porthole rim (glow)
      fctx.globalCompositeOperation='lighter';fctx.strokeStyle=`rgba(127,236,224,${.2*beatA})`;fctx.lineWidth=2;fctx.beginPath();fctx.arc(W/2,H/2,pR,0,7);fctx.stroke();
      // heavy vignette around porthole
      fctx.globalCompositeOperation='source-over';const pg=fctx.createRadialGradient(W/2,H/2,pR*.55,W/2,H/2,Math.max(W,H)*.72);pg.addColorStop(0,'rgba(2,8,18,0)');pg.addColorStop(.38,`rgba(2,8,18,${.55*beatA})`);pg.addColorStop(1,`rgba(2,8,18,${.97*beatA})`);fctx.fillStyle=pg;fctx.fillRect(0,0,W,H);
      // city name — appears quietly mid-beat
      if(mirrorGeo?.city&&bt>2&&bt<5.2){const na=smoothstep(Math.min(1,(bt-2)/.7))*smoothstep(Math.min(1,(5.2-bt)/.7));fctx.globalAlpha=na*.75;fctx.font=`300 ${Math.round(H*.034)}px "Cinzel",serif`;fctx.fillStyle='rgba(200,225,240,1)';fctx.textAlign='center';fctx.textBaseline='middle';fctx.fillText(mirrorGeo.city.toUpperCase(),W/2,H*.74);fctx.globalAlpha=1;}}
  }
  /* abyss bioluminescence — always on */
  fctx.globalCompositeOperation='lighter';const abA=Math.max(.1,1-sub*.5);
  abyss.forEach(p=>{p.life+=p.spd*dt;p.y+=p.vy*dt;if(p.life>=1||p.y<-p.r*3){p.life=0;p.x=Math.random()*W;p.y=H+p.r*2;p.r=3+Math.random()*16;p.vy=-(4+Math.random()*12);}
    const a=Math.sin(p.life*Math.PI)*.32*abA;if(a<.005)return;const rg=fctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.r*2.6);rg.addColorStop(0,`rgba(${p.hue},${(a*2.2).toFixed(3)})`);rg.addColorStop(.4,`rgba(${p.hue},${a.toFixed(3)})`);rg.addColorStop(1,`rgba(${p.hue},0)`);fctx.fillStyle=rg;fctx.beginPath();fctx.arc(p.x,p.y,p.r*2.6,0,7);fctx.fill();});
  /* caustic rings */
  const cA=(.05+.03*Math.sin(T*.7))*abA;
  for(let i=0;i<4;i++){const cx=W*(.18+.22*i)+Math.sin(T*(.28+i*.11)+i*2.1)*100;const cy=H*(.15+.23*i)+Math.cos(T*(.19+i*.09)+i)*80;const r=(50+35*Math.sin(T*(.55+i*.13)+i))*Math.max(.2,abA);fctx.strokeStyle=`rgba(127,236,224,${cA})`;fctx.lineWidth=1.2;fctx.beginPath();fctx.arc(cx,cy,r,0,7);fctx.stroke();}
  fctx.globalAlpha=1;
  /* god rays */
  if(!RM&&!LITE){fctx.globalCompositeOperation='lighter';for(let i=0;i<5;i++){const x=(i+.5)/5*W+Math.sin(T*.25+i)*40;const g=fctx.createLinearGradient(x,0,x-110,H);const a=.03+.04*sub;g.addColorStop(0,`rgba(190,238,224,${a})`);g.addColorStop(1,'rgba(190,238,224,0)');fctx.fillStyle=g;fctx.beginPath();fctx.moveTo(x-30,0);fctx.lineTo(x+30,0);fctx.lineTo(x-64,H);fctx.lineTo(x-124,H);fctx.closePath();fctx.fill();}}
  /* marine snow */
  fctx.globalCompositeOperation='lighter';const streak=LITE?0:Math.min(50,vel*380);
  snow.forEach(p=>{p.y-=(5+p.z*10)*dt+vel*200*dt*p.z;p.x+=Math.sin((p.y+T*30)*.01)*.28;if(p.y<-50){p.y=H+10;p.x=Math.random()*W;}
    fctx.globalAlpha=(.04+p.z*.12)*(.35+.65*sub);
    if(streak>3){fctx.strokeStyle='#cdeef2';fctx.lineWidth=p.s;fctx.beginPath();fctx.moveTo(p.x,p.y);fctx.lineTo(p.x,p.y+streak*p.z);fctx.stroke();}
    else{fctx.fillStyle='#cdeef2';fctx.beginPath();fctx.arc(p.x,p.y,p.s,0,7);fctx.fill();}});
  /* bubbles */
  if(!RM&&!LITE&&sub>.2&&Math.random()<.26)bub.push({x:Math.random()*W,y:H+10,r:1+Math.random()*3,l:1});
  bub.forEach(b=>{b.y-=36*dt;b.l-=dt*.24;b.x+=Math.sin(b.y*.05)*.4;fctx.globalAlpha=Math.max(0,b.l)*.38;fctx.strokeStyle='#bfeef2';fctx.lineWidth=1;fctx.beginPath();fctx.arc(b.x,b.y,b.r,0,7);fctx.stroke();});
  bub=bub.filter(b=>b.l>0&&b.y>-10);
  /* Heart glow */
  if(depth>.9){const hp=Math.min(1,(depth-.9)/.1);const rg=fctx.createRadialGradient(W/2,H*.46,4,W/2,H*.46,Math.max(W,H)*.65);rg.addColorStop(0,`rgba(245,220,166,${.14*hp})`);rg.addColorStop(.45,`rgba(127,236,224,${.06*hp})`);rg.addColorStop(1,'rgba(2,8,18,0)');fctx.fillStyle=rg;fctx.fillRect(0,0,W,H);}
  fctx.globalAlpha=1;fctx.globalCompositeOperation='source-over';}

/* ============================================================ HEART SEQUENCE */
function enterHeart(){if(heartShown)return;heartShown=true;dVel=0;
  heartScore();
  const H=document.getElementById('heart');H.classList.add('show');
  const userWord=sanitize(document.getElementById('oword').value)||null;
  const seq=[
    [2600,'l','You arrived at the abyss.'],
    [3000,'l','It remembers everyone who came down.'],
    [3200,'l','Your word will stay here.'],
    [1800,'word',userWord||'—'],
    [4000,'l','You take away the memory of the one before you.'],
    [1800,'word',incomingWord],
  ];
  let acc=0;seq.forEach(item=>{acc+=item[0];setTimeout(()=>{const d=document.createElement('div');d.className='hline '+item[1];d.textContent=item[2];H.insertBefore(d,document.getElementById('surfaceBtn'));requestAnimationFrame(()=>requestAnimationFrame(()=>d.classList.add('show')));if(item[1]==='word'&&item[2]===incomingWord)wordArrive();else if(item[1]==='word')wordDepart();},acc);});
  setTimeout(()=>document.getElementById('surfaceBtn').classList.add('show'),acc+1600);}

document.getElementById('surfaceBtn').addEventListener('click',e=>{e.stopPropagation();startSurface();});
function finish(){document.getElementById('end').classList.remove('hide');startEndWater();}

/* ============================================================ SURFACE ANIMATION */
const sfx=document.getElementById('sfx'),sctx=sfx.getContext('2d');
function sfResize(){const d=Math.min(devicePixelRatio||1,1.5);sfx.width=W*d;sfx.height=H*d;sfx.style.width=W+'px';sfx.style.height=H+'px';sctx.setTransform(d,0,0,d,0,0);}
const SEED_W=['alone','remember','home','gone','afraid','stay','deep','forgotten','light','dark','lost','breathe','still','silence','forever','remain','drift','below','echo','never'];
async function getWords(){let w=[...SEED_W];if(fdb){try{const s=await fdb.collection('traces').orderBy('ts','desc').limit(60).get();const fw=s.docs.map(d=>d.data().word).filter(Boolean);if(fw.length>5)w=fw;}catch(e){}}try{const lw=localStorage.getItem('atlantis_last_word');if(lw&&!w.includes(lw))w.unshift(lw);}catch(e){}return w;}
function makeParts(words){return words.map(word=>({word,x:.08+Math.random()*.84,y:Math.random()*4,z:.12+Math.random()*.88,ph:Math.random()*Math.PI*2,ps:.5+Math.random()*.9}));}
let wParts=[],sfT=0,sfActive=false,sfLast=0;

function sfFrame(ts){if(!sfActive)return;requestAnimationFrame(sfFrame);
  const dt=Math.min(.05,(ts-sfLast)/1000);sfLast=ts;sfT+=dt;const sw=W,sh=H;sctx.clearRect(0,0,sw,sh);
  const rise=smoothstep(Math.min(1,sfT/4.8));const appr=smoothstep(Math.max(0,Math.min(1,(sfT-4.0)/1.8)));
  const breach=smoothstep(Math.max(0,Math.min(1,(sfT-5.6)/.9)));const settle=smoothstep(Math.max(0,Math.min(1,(sfT-6.8)/1.6)));
  const cliff=smoothstep(Math.max(0,Math.min(1,(sfT-8.8)/1.2)));const creep=smoothstep(Math.max(0,Math.min(1,(sfT-10.0)/2.2)));
  if(breach<1){const l=rise*.55+appr*.35;const bg=sctx.createLinearGradient(0,0,0,sh);bg.addColorStop(0,`rgb(${l*210|0},${l*240|0},${l*245|0})`);bg.addColorStop(1,`rgb(${2+l*28|0},${8+l*55|0},${18+l*75|0})`);sctx.fillStyle=bg;sctx.fillRect(0,0,sw,sh);}
  else{const wh=Math.max(.78,1-settle*.2);sctx.fillStyle=`rgb(${wh*248|0},${wh*250|0},${wh*248|0})`;sctx.fillRect(0,0,sw,sh);}
  if(breach<.92){const rOff=sfT*sh*.19;wParts.forEach(p=>{p.ph+=p.ps*dt;const raw=(p.y*sh-rOff),ry=((raw%(sh*4))+(sh*4))%(sh*4)-sh*.5;if(ry<-100||ry>sh+100)return;const sz=Math.round((12+p.z*32)*(.7+appr*.9));const al=(.11+p.z*.72)*(1-breach)*Math.min(1,rise*2.4);if(al<.01)return;const cr=127+(244-127)*p.z|0,cg=236+(220-236)*p.z*.2|0,cb=224+(166-224)*p.z*.6|0;sctx.save();sctx.globalAlpha=al;sctx.font=`300 italic ${sz}px "Cormorant Garamond",serif`;sctx.fillStyle=`rgb(${cr},${cg},${cb})`;sctx.textAlign='center';sctx.textBaseline='middle';sctx.translate(p.x*sw+Math.sin(p.ph)*18,ry);sctx.rotate(Math.sin(p.ph*.3)*.035);sctx.fillText(p.word,0,0);sctx.scale(1,-.36);sctx.globalAlpha=al*.26;sctx.filter=`blur(${1+p.z|0}px)`;sctx.fillText(p.word,0,2+Math.sin(p.ph*2)*3);sctx.restore();});}
  if(breach>0&&breach<1){sctx.fillStyle=`rgba(255,255,255,${breach*.85})`;sctx.fillRect(0,0,sw,sh);}
  if(settle>0){const fs=Math.round(sh*.057);sctx.save();sctx.textAlign='center';sctx.textBaseline='middle';sctx.globalAlpha=Math.min(1,settle*1.4)*(1-creep*.55);sctx.font=`300 italic ${fs}px "Cormorant Garamond",serif`;sctx.fillStyle='rgba(4,18,30,1)';sctx.fillText('You surface.',sw/2,sh*.38);if(cliff>0){sctx.globalAlpha=cliff*(1-creep*.75);sctx.font=`300 italic ${Math.round(fs*.7)}px "Cormorant Garamond",serif`;sctx.fillStyle='rgba(8,28,44,.9)';sctx.fillText('(did you?)',sw/2,sh*.38+fs*1.42);}sctx.restore();}
  if(creep>0){const wTop=sh*(1-creep*.82);const wg=sctx.createLinearGradient(0,wTop-70,0,sh);wg.addColorStop(0,'rgba(2,8,18,0)');wg.addColorStop(.12,`rgba(4,16,30,${.88*creep})`);wg.addColorStop(1,`rgba(2,8,18,${creep})`);sctx.fillStyle=wg;sctx.fillRect(0,wTop-70,sw,sh);const vis=wParts.filter(p=>p.z>.42).slice(0,12);vis.forEach((p,i)=>{const band=(i+1)/(vis.length+1);const wy=wTop+(sh-wTop)*band+Math.sin(sfT*1.4+i)*9;if(wy>sh-12)return;const wa=Math.min(1,(creep-.12)*1.5)*(.45+p.z*.55);if(wa<.02)return;sctx.save();sctx.globalAlpha=wa;sctx.font=`300 italic ${Math.round(13+p.z*20)}px "Cormorant Garamond",serif`;sctx.fillStyle='rgba(127,236,224,1)';sctx.textAlign='center';sctx.textBaseline='middle';sctx.fillText(p.word,p.x*sw,wy);sctx.restore();});for(let i=0;i<4;i++){const cx=sw*(.18+.22*i)+Math.sin(sfT*1.2+i)*55,cy=wTop+6+Math.sin(sfT*.8+i*1.4)*5,r=28+18*Math.sin(sfT*.9+i);sctx.save();sctx.globalAlpha=.1*creep;sctx.strokeStyle='rgba(127,236,224,1)';sctx.lineWidth=1;sctx.beginPath();sctx.arc(cx,cy,r,0,7);sctx.stroke();sctx.restore();}}
  if(sfT>12.5)sfx.style.opacity=Math.max(0,1-(sfT-12.5)/.7).toFixed(3);
  if(sfT>13.6){sfActive=false;sfx.style.opacity='0';finish();}}

async function startSurface(){ended=true;document.getElementById('hint').classList.remove('on');sfResize();sfT=0;sfLast=performance.now();sfActive=true;sfx.style.opacity='1';wParts=makeParts(SEED_W);requestAnimationFrame(sfFrame);getWords().then(words=>{if(words.length>5)wParts=makeParts(words);});if(A){AU.master.gain.setTargetAtTime(0,A.currentTime,2.2);const t=A.currentTime+.1,s=A.createBufferSource();s.buffer=makeNoise(4.5);const lp=A.createBiquadFilter();lp.type='lowpass';lp.frequency.setValueAtTime(100,t);lp.frequency.exponentialRampToValueAtTime(4800,t+5.0);const g=gn(0);s.connect(lp);lp.connect(g);g.connect(A.destination);g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.38,t+1);g.gain.linearRampToValueAtTime(0,t+6);s.start(t);s.stop(t+6.5);}}

/* ============================================================ END WATER CANVAS */
const ew=document.getElementById('endWater'),ewc=ew.getContext('2d');
function ewResize(){const d=Math.min(devicePixelRatio||1,1.5);ew.width=W*d;ew.height=H*d;ew.style.width=W+'px';ew.style.height=H+'px';ewc.setTransform(d,0,0,d,0,0);}
let ewActive=false,ewT=0,ewLast=0,ewRipples=[];
function addRipple(){ewRipples.push({x:.2+Math.random()*.6,y:.15+Math.random()*.7,r:0,maxR:80+Math.random()*140,life:1,spd:.14+Math.random()*.18});}

function ewFrame(ts){if(!ewActive)return;requestAnimationFrame(ewFrame);
  const dt=Math.min(.05,(ts-ewLast)/1000);ewLast=ts;ewT+=dt;const sw=W,sh=H;ewc.clearRect(0,0,sw,sh);
  const bg=ewc.createLinearGradient(0,0,0,sh);bg.addColorStop(0,'rgb(2,4,12)');bg.addColorStop(.5,'rgb(3,7,18)');bg.addColorStop(1,'rgb(4,10,24)');ewc.fillStyle=bg;ewc.fillRect(0,0,sw,sh);
  ewc.globalCompositeOperation='lighter';
  /* moonlight column */
  const moon=ewc.createLinearGradient(sw*.38,0,sw*.62,0);moon.addColorStop(0,'rgba(200,225,240,0)');moon.addColorStop(.35,`rgba(200,225,240,${.05+Math.sin(ewT*.7)*.01})`);moon.addColorStop(.5,`rgba(220,238,248,${.12+Math.sin(ewT*.9+1)*.015})`);moon.addColorStop(.65,`rgba(200,225,240,${.05+Math.sin(ewT*.7)*.01})`);moon.addColorStop(1,'rgba(200,225,240,0)');ewc.fillStyle=moon;ewc.fillRect(0,0,sw,sh);
  /* perspective water lines */
  const horizY=sh*.28;for(let i=0;i<26;i++){const p=i/25;const y=horizY+Math.pow(p,.52)*(sh-horizY);const lineA=(.035+p*.055)*(1+Math.sin(ewT*1.1+p*8)*.3);const wave=Math.sin(ewT*.6+p*12)*11*p;ewc.strokeStyle=`rgba(180,215,235,${lineA.toFixed(3)})`;ewc.lineWidth=.6+p*.8;ewc.beginPath();ewc.moveTo(0,y+wave);ewc.lineTo(sw,y+wave*.5);ewc.stroke();}
  /* slow ripples */
  if(ewT>1&&Math.random()<.005&&ewRipples.length<3)addRipple();
  ewRipples=ewRipples.filter(r=>r.life>0);
  ewRipples.forEach(r=>{r.r+=r.maxR*r.spd*dt*.9;r.life-=r.spd*dt*.55;if(r.life<0)return;ewc.strokeStyle=`rgba(180,215,235,${(r.life*.065).toFixed(3)})`;ewc.lineWidth=1;ewc.beginPath();ewc.ellipse(r.x*sw,r.y*sh,r.r,r.r*.26,0,0,7);ewc.stroke();ewc.strokeStyle=`rgba(180,215,235,${(r.life*.025).toFixed(3)})`;ewc.lineWidth=.6;ewc.beginPath();ewc.ellipse(r.x*sw,r.y*sh,r.r*1.65,r.r*.16,0,0,7);ewc.stroke();});
  /* two exchanged words: huge and barely visible */
  const uWord=sanitize(document.getElementById('oword').value)||null;
  [[uWord,sh*.4,.03],[incomingWord,sh*.62,.022]].forEach(([word,wy,al])=>{if(!word||word==='—')return;const fs=Math.min(sw*.16,sh*.11)|0;ewc.save();ewc.globalAlpha=al+Math.sin(ewT*.5)*.006;ewc.font=`300 italic ${fs}px "Cormorant Garamond",serif`;ewc.fillStyle='rgb(150,210,228)';ewc.textAlign='center';ewc.textBaseline='middle';const rows=Math.round(sh*.016)|1;const th=fs*1.2;for(let row=0;row<rows;row++){const fy=wy-th/2+row*(th/rows);const shift=Math.sin(ewT*.8+row*.4)*4;ewc.fillText(word,sw/2+shift,fy);}ewc.save();ewc.translate(sw/2,wy+th*.4);ewc.scale(1,-.2);ewc.globalAlpha=al*.18;ewc.fillText(word,0,0);ewc.restore();ewc.restore();});
  ewc.globalAlpha=1;ewc.globalCompositeOperation='source-over';}

function startEndWater(){ewResize();ewT=0;ewLast=performance.now();ewActive=true;ew.classList.add('show');for(let i=0;i<4;i++)setTimeout(addRipple,i*600);requestAnimationFrame(ewFrame);}

/* ============================================================ FLOW */
function unlockAudio(){try{if(!A)initAudio();if(A&&A.state==='suspended')A.resume();const b=A.createBuffer(1,1,22050),s=A.createBufferSource();s.buffer=b;s.connect(A.destination);s.start(0);}catch(e){}}
document.getElementById('go').addEventListener('click',e=>{e.stopPropagation();document.getElementById('start').classList.add('hide');document.getElementById('offer').classList.remove('hide');setTimeout(()=>document.getElementById('oword').focus(),700);});
function proceedFromOffer(word){unlockAudio();document.getElementById('offer').classList.add('hide');document.getElementById('end').classList.add('hide');document.getElementById('heart').classList.remove('show');document.getElementById('heart').querySelectorAll('.hline').forEach(n=>n.remove());document.getElementById('surfaceBtn').classList.remove('show');document.getElementById('tools').classList.add('on');document.getElementById('hint').classList.add('on');started=true;ended=false;heartShown=false;heartScorePlaying=false;depth=0;dVel=0;submergedOnce=false;fragIdx=0;capTimer=0;mirrorBeat=false;mirrorBeatT=0;mirrorBeatDone=false;document.getElementById('cap').classList.remove('show');
  initMirror();}
document.getElementById('osubmit').addEventListener('click',e=>{e.stopPropagation();
  const word=sanitize(document.getElementById('oword').value);
  if(word){document.getElementById('offer').classList.add('hide');unlockAudio();if(word)storeWord(word);wordSinkActive=true;wordSinkT=0;wordSinkPending=word;}
  else{proceedFromOffer(null);}});
document.getElementById('oword').addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();const word=sanitize(document.getElementById('oword').value);if(word){document.getElementById('offer').classList.add('hide');unlockAudio();storeWord(word);wordSinkActive=true;wordSinkT=0;wordSinkPending=word;}else proceedFromOffer(null);}});
document.getElementById('oskip').addEventListener('click',e=>{e.stopPropagation();proceedFromOffer(null);});
document.getElementById('again').addEventListener('click',e=>{e.stopPropagation();ewActive=false;ew.classList.remove('show');document.getElementById('end').classList.add('hide');fetchLastWord().then(w=>incomingWord=w);document.getElementById('offer').classList.remove('hide');setTimeout(()=>document.getElementById('oword').focus(),700);});

/* ============================================================ PRELOAD + BOOT */
const SRCS=['01-surface.png','05-flood.jpg','02-descent.png','03-times-square.png','06-bridge.png','04-garden.png'];
let loaded=0;
const hideLoad=()=>{document.getElementById('load').classList.add('hide');introActive=true;introT=0;};
SRCS.forEach(s=>{const im=new Image();im.onload=im.onerror=()=>{if(++loaded>=3)hideLoad();};im.src=s;});
setTimeout(hideLoad,4500);
resize();requestAnimationFrame(frame);
</script>
